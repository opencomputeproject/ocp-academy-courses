<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660" role="img" aria-labelledby="title desc">
  <title id="title">DSFF Uses Two Adjacent SFF Positions</title>
  <desc id="desc">Spec-grounded technical diagram for the OCP NIC 3.0 Academy course.</desc>
  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#8dc63f"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#343895"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill:#f7f9fb; }
      .panel { fill:#fff; stroke:#dbe4ee; stroke-width:1.4; }
      .title { font:800 30px Arial, Helvetica, sans-serif; fill:#232a35; letter-spacing:0; }
      .label { font:700 17px Arial, Helvetica, sans-serif; fill:#232a35; letter-spacing:0; }
      .small { font:400 14px Arial, Helvetica, sans-serif; fill:#5f6b78; letter-spacing:0; }
      .tiny { font:700 12px Arial, Helvetica, sans-serif; fill:#64748b; letter-spacing:0; }
      .green { fill:#8dc63f; }
      .blue { fill:#343895; }
      .gray { fill:#64748b; }
      .line-green { stroke:#8dc63f; stroke-width:4; fill:none; marker-end:url(#arrow-green); }
      .line-blue { stroke:#343895; stroke-width:4; fill:none; marker-end:url(#arrow-blue); }
      .line-gray { stroke:#64748b; stroke-width:3; fill:none; marker-end:url(#arrow-gray); }
      .dash { stroke-dasharray:8 8; }
    </style>
  </defs>
  <rect class="bg" width="1100" height="660" rx="24"/>
  <rect class="panel" x="28" y="28" width="1044" height="604" rx="18"/>
  <rect x="28" y="28" width="1044" height="8" fill="#8dc63f" rx="4"/>
  <text class="title" x="58" y="82">DSFF Uses Two Adjacent SFF Positions</text>

          <g transform="translate(88 145)">
            <text class="label" x="0" y="0">Two SFF slots</text>
            <rect x="0" y="36" width="250" height="190" rx="18" fill="#fff" stroke="#dbe4ee" stroke-width="2"/>
            <rect x="288" y="36" width="250" height="190" rx="18" fill="#fff" stroke="#dbe4ee" stroke-width="2"/>
            <rect x="250" y="58" width="38" height="146" rx="8" fill="#e2e8f0"/>
            <text class="tiny" x="269" y="136" text-anchor="middle" transform="rotate(-90 269 136)">guide rail</text>
            <rect x="68" y="116" width="112" height="36" rx="8" fill="#8dc63f"/>
            <rect x="356" y="116" width="112" height="36" rx="8" fill="#8dc63f"/>
            <text class="small" x="124" y="180" text-anchor="middle">4C+</text>
            <text class="small" x="412" y="180" text-anchor="middle">4C+</text>
          </g>
          <path class="line-blue" d="M650 260 C700 260, 742 260, 790 260"/>
          <text class="label" x="720" y="226" text-anchor="middle">remove rail</text>
          <g transform="translate(790 145)">
            <text class="label" x="0" y="0">One DSFF slot</text>
            <rect x="0" y="36" width="250" height="190" rx="18" fill="#eef7e7" stroke="#8dc63f" stroke-width="2"/>
            <rect x="35" y="116" width="70" height="36" rx="8" fill="#343895"/>
            <rect x="145" y="116" width="70" height="36" rx="8" fill="#343895"/>
            <text class="small" x="70" y="180" text-anchor="middle">Primary</text>
            <text class="small" x="180" y="180" text-anchor="middle">Secondary</text>
          </g>
          <g transform="translate(138 430)">
            <rect x="0" y="0" width="824" height="94" rx="14" fill="#fff" stroke="#dbe4ee"/>
            <text class="label" x="28" y="34">Spec constraints</text>
            <text class="small" x="28" y="60">two 4C+ connector positions, up to 32 PCIe lanes, up to 160 W delivered power</text>
            <text class="small" x="28" y="80">DSFF connector pitch is 81.55 mm; the card-side insulator/backing plate is part of card construction.</text>
          </g>

</svg>
