<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660" role="img" aria-labelledby="title desc">
  <title id="title">4C+ Signal Groups</title>
  <desc id="desc">Spec-grounded technical diagram for the OCP NIC 3.0 Academy course.</desc>
  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8dc63f"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 z" fill="#343895"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" markerWidth="10" markerHeight="10" refX="0" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill:#f7f9fb; }
      .panel { fill:#fff; stroke:#dbe4ee; stroke-width:1.4; }
      .title { font:800 30px Arial, Helvetica, sans-serif; fill:#232a35; letter-spacing:0; }
      .label { font:700 17px Arial, Helvetica, sans-serif; fill:#232a35; letter-spacing:0; }
      .small { font:400 14px Arial, Helvetica, sans-serif; fill:#5f6b78; letter-spacing:0; }
      .tiny { font:700 12px Arial, Helvetica, sans-serif; fill:#64748b; letter-spacing:0; }
      .green { fill:#8dc63f; }
      .blue { fill:#343895; }
      .gray { fill:#64748b; }
      .line-green { stroke:#8dc63f; stroke-width:4; fill:none; marker-end:url(#arrow-green); }
      .line-blue { stroke:#343895; stroke-width:4; fill:none; marker-end:url(#arrow-blue); }
      .line-gray { stroke:#64748b; stroke-width:3; fill:none; marker-end:url(#arrow-gray); }
      .flow-green { stroke:#8dc63f; stroke-width:4; fill:none; stroke-linecap:round; }
      .flow-blue { stroke:#343895; stroke-width:4; fill:none; stroke-linecap:round; }
      .flow-gray { stroke:#64748b; stroke-width:3; fill:none; stroke-linecap:round; }
      .arrowhead-green { fill:#8dc63f; }
      .arrowhead-blue { fill:#343895; }
      .arrowhead-gray { fill:#64748b; }
      .dash { stroke-dasharray:8 8; }
    </style>
  </defs>
  <rect class="bg" width="1100" height="660" rx="24"/>
  <rect class="panel" x="28" y="28" width="1044" height="604" rx="18"/>
  <rect x="28" y="28" width="1044" height="8" fill="#8dc63f" rx="4"/>
  <text class="title" x="58" y="82">4C+ Signal Groups</text>

          <g transform="translate(92 140)">
            <rect x="0" y="0" width="416" height="340" rx="22" fill="#fff" stroke="#343895" stroke-width="2"/>
            <rect x="32" y="50" width="160" height="240" rx="16" fill="#eef3ff" stroke="#343895"/>
            <rect x="224" y="50" width="160" height="240" rx="16" fill="#eef7e7" stroke="#8dc63f"/>
            <text class="label" x="112" y="88" text-anchor="middle">4C base</text>
            <text class="small" x="112" y="124" text-anchor="middle">PCIe lanes</text>
            <text class="small" x="112" y="154" text-anchor="middle">REFCLK</text>
            <text class="small" x="112" y="184" text-anchor="middle">PERST#</text>
            <text class="small" x="112" y="214" text-anchor="middle">PRSNTB / BIF</text>
            <text class="small" x="112" y="244" text-anchor="middle">+3.3V / +12V</text>
            <text class="label" x="304" y="88" text-anchor="middle">OCP Bay</text>
            <text class="small" x="304" y="124" text-anchor="middle">WAKE#</text>
            <text class="small" x="304" y="154" text-anchor="middle">NC-SI over RBT</text>
            <text class="small" x="304" y="184" text-anchor="middle">SMBus / USB</text>
            <text class="small" x="304" y="214" text-anchor="middle">slot ID</text>
            <text class="small" x="304" y="244" text-anchor="middle">scan chain</text>
          </g>
          <g transform="translate(612 142)">
            <rect x="0" y="0" width="360" height="86" rx="14" fill="#fff" stroke="#dbe4ee"/>
            <text class="label" x="26" y="34">Primary connector</text>
            <text class="small">
              <tspan x="26" y="58">lanes 0-15, REFCLK/PERST 0-3</tspan>
              <tspan x="26" y="77">main management path</tspan>
            </text>
            <rect x="0" y="126" width="360" height="86" rx="14" fill="#fff" stroke="#dbe4ee"/>
            <text class="label" x="26" y="160">Secondary connector</text>
            <text class="small" x="26" y="186">DSFF lanes 16-31, REFCLK/PERST 4-7</text>
            <rect x="0" y="252" width="360" height="86" rx="14" fill="#fff" stroke="#dbe4ee"/>
            <text class="label" x="26" y="286">Common rule</text>
            <text class="small">
              <tspan x="26" y="310">pins are common unless the spec calls out</tspan>
              <tspan x="26" y="329">a connector-specific exception</tspan>
            </text>
          </g>
          <path class="flow-blue" d="M520 246 C548 246, 550 184, 586 184"/>
          <polygon class="arrowhead-blue" points="586,174 612,184 586,194"/>
          <path class="flow-green" d="M520 310 L586 310"/>
          <polygon class="arrowhead-green" points="586,300 612,310 586,320"/>

</svg>
