<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660" role="img" aria-labelledby="title desc">
  <title id="title">SFF and TSFF Share the Same Electrical Model</title>
  <desc id="desc">Spec-grounded technical diagram for the OCP NIC 3.0 Academy course.</desc>
  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#8dc63f"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#343895"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill:#f7f9fb; }
      .panel { fill:#fff; stroke:#dbe4ee; stroke-width:1.4; }
      .title { font:800 30px Arial, Helvetica, sans-serif; fill:#232a35; letter-spacing:0; }
      .label { font:700 17px Arial, Helvetica, sans-serif; fill:#232a35; letter-spacing:0; }
      .small { font:400 14px Arial, Helvetica, sans-serif; fill:#5f6b78; letter-spacing:0; }
      .tiny { font:700 12px Arial, Helvetica, sans-serif; fill:#64748b; letter-spacing:0; }
      .green { fill:#8dc63f; }
      .blue { fill:#343895; }
      .gray { fill:#64748b; }
      .line-green { stroke:#8dc63f; stroke-width:4; fill:none; marker-end:url(#arrow-green); }
      .line-blue { stroke:#343895; stroke-width:4; fill:none; marker-end:url(#arrow-blue); }
      .line-gray { stroke:#64748b; stroke-width:3; fill:none; marker-end:url(#arrow-gray); }
      .dash { stroke-dasharray:8 8; }
    </style>
  </defs>
  <rect class="bg" width="1100" height="660" rx="24"/>
  <rect class="panel" x="28" y="28" width="1044" height="604" rx="18"/>
  <rect x="28" y="28" width="1044" height="8" fill="#8dc63f" rx="4"/>
  <text class="title" x="58" y="82">SFF and TSFF Share the Same Electrical Model</text>

          <g transform="translate(86 130)">
            <rect x="0" y="70" width="360" height="170" rx="18" fill="#eef7e7" stroke="#8dc63f" stroke-width="2"/>
            <rect x="28" y="112" width="210" height="86" rx="12" fill="#fff" stroke="#8dc63f" stroke-width="2"/>
            <rect x="244" y="128" width="70" height="52" rx="8" fill="#343895"/>
            <text class="label" x="42" y="150">SFF card</text>
            <text class="small" x="42" y="174">single 4C+ connector</text>
            <text class="tiny" x="279" y="158" text-anchor="middle" fill="#fff">I/O</text>
            <text class="small" x="0" y="278">11.50 mm faceplate height</text>
          </g>
          <g transform="translate(600 88)">
            <rect x="0" y="112" width="360" height="214" rx="18" fill="#eef3ff" stroke="#343895" stroke-width="2"/>
            <rect x="28" y="174" width="210" height="86" rx="12" fill="#fff" stroke="#343895" stroke-width="2"/>
            <rect x="244" y="190" width="70" height="52" rx="8" fill="#343895"/>
            <text class="label" x="42" y="212">TSFF card</text>
            <text class="small" x="42" y="236">same footprint and pins</text>
            <text class="tiny" x="279" y="220" text-anchor="middle" fill="#fff">taller I/O</text>
            <text class="small" x="0" y="364">14.20 mm faceplate height</text>
          </g>
          <path class="line-green" d="M450 260 C500 260, 540 260, 590 260"/>
          <text class="label" x="520" y="222" text-anchor="middle">same 4C+</text>
          <text class="small" text-anchor="middle">
            <tspan x="520" y="292">up to 16 PCIe lanes</tspan>
            <tspan x="520" y="310">up to 80 W</tspan>
          </text>
          <g transform="translate(126 492)">
            <rect x="0" y="0" width="848" height="74" rx="12" fill="#fff" stroke="#dbe4ee"/>
            <text class="label" x="30" y="31">Faceplate targets</text>
            <text class="small" x="30" y="55">up to 2x QSFP, 4x SFP, or 4x RJ45 depending on the card design and cooling envelope</text>
          </g>

</svg>
