<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660" role="img" aria-labelledby="title desc">
  <title id="title">Version 1.6.0 Change Map</title>
  <desc id="desc">Spec-grounded technical diagram for the OCP NIC 3.0 Academy course.</desc>
  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#8dc63f"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#343895"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill:#f7f9fb; }
      .panel { fill:#fff; stroke:#dbe4ee; stroke-width:1.4; }
      .title { font:800 30px Arial, Helvetica, sans-serif; fill:#232a35; letter-spacing:0; }
      .label { font:700 17px Arial, Helvetica, sans-serif; fill:#232a35; letter-spacing:0; }
      .small { font:400 14px Arial, Helvetica, sans-serif; fill:#5f6b78; letter-spacing:0; }
      .tiny { font:700 12px Arial, Helvetica, sans-serif; fill:#64748b; letter-spacing:0; }
      .green { fill:#8dc63f; }
      .blue { fill:#343895; }
      .gray { fill:#64748b; }
      .line-green { stroke:#8dc63f; stroke-width:4; fill:none; marker-end:url(#arrow-green); }
      .line-blue { stroke:#343895; stroke-width:4; fill:none; marker-end:url(#arrow-blue); }
      .line-gray { stroke:#64748b; stroke-width:3; fill:none; marker-end:url(#arrow-gray); }
      .dash { stroke-dasharray:8 8; }
    </style>
  </defs>
  <rect class="bg" width="1100" height="660" rx="24"/>
  <rect class="panel" x="28" y="28" width="1044" height="604" rx="18"/>
  <rect x="28" y="28" width="1044" height="8" fill="#8dc63f" rx="4"/>
  <text class="title" x="58" y="82">Version 1.6.0 Change Map</text>

          <g transform="translate(78 126)">
            <rect x="0" y="0" width="944" height="72" rx="16" fill="#eef3ff" stroke="#343895"/>
            <text class="label" x="26" y="28">PCIe Gen 6 signal-integrity context</text>
            <text class="small" x="26" y="52">CEM 6.0 / 64 GT/s guidance appears with OCP-specific fixture and insertion-loss caveats.</text>
            <rect x="0" y="92" width="944" height="72" rx="16" fill="#eef7e7" stroke="#8dc63f"/>
            <text class="label" x="26" y="120">DSFF capability discovery</text>
            <text class="small" x="26" y="144">PRSNTB encoding plus FRU OEM records D0, D1, and D2 describe DSFF link subdivision.</text>
            <rect x="0" y="184" width="944" height="72" rx="16" fill="#fff" stroke="#dbe4ee"/>
            <text class="label" x="26" y="212">Power-state clarifications</text>
            <text class="small" x="26" y="236">Aux mode uses WAKE# or NC-SI over RBT; Wake is not applicable in Main Power Mode.</text>
            <rect x="0" y="276" width="944" height="72" rx="16" fill="#fff" stroke="#dbe4ee"/>
            <text class="label" x="26" y="304">FRU record renumbering</text>
            <text class="small" x="26" y="328">Extended OEM and Flex I/O records moved to D2 and D3 to avoid MHS M-PNP conflicts.</text>
            <rect x="0" y="368" width="944" height="72" rx="16" fill="#fff7ed" stroke="#f59e0b"/>
            <text class="label" x="26" y="396">LFF deprecation</text>
            <text class="small" x="26" y="420">LFF content is retained in Appendix 9 for historical context; active designs should use SFF or DSFF.</text>
          </g>

</svg>
