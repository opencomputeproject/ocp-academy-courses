<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660" role="img" aria-labelledby="title desc">
  <title id="title">SFF vs DSFF Connector and Lane Map</title>
  <desc id="desc">Spec-grounded technical diagram for the OCP NIC 3.0 Academy course.</desc>
  <defs>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#8dc63f"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#343895"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill:#f7f9fb; }
      .panel { fill:#fff; stroke:#dbe4ee; stroke-width:1.4; }
      .title { font:800 30px Arial, Helvetica, sans-serif; fill:#232a35; letter-spacing:0; }
      .label { font:700 17px Arial, Helvetica, sans-serif; fill:#232a35; letter-spacing:0; }
      .small { font:400 14px Arial, Helvetica, sans-serif; fill:#5f6b78; letter-spacing:0; }
      .tiny { font:700 12px Arial, Helvetica, sans-serif; fill:#64748b; letter-spacing:0; }
      .tiny-light { font:700 12px Arial, Helvetica, sans-serif; fill:#fff; letter-spacing:0; }
      .green { fill:#8dc63f; }
      .blue { fill:#343895; }
      .gray { fill:#64748b; }
      .line-green { stroke:#8dc63f; stroke-width:4; fill:none; marker-end:url(#arrow-green); }
      .line-blue { stroke:#343895; stroke-width:4; fill:none; marker-end:url(#arrow-blue); }
      .line-gray { stroke:#64748b; stroke-width:3; fill:none; marker-end:url(#arrow-gray); }
      .dash { stroke-dasharray:8 8; }
    </style>
  </defs>
  <rect class="bg" width="1100" height="660" rx="24"/>
  <rect class="panel" x="28" y="28" width="1044" height="604" rx="18"/>
  <rect x="28" y="28" width="1044" height="8" fill="#8dc63f" rx="4"/>
  <text class="title" x="58" y="82">SFF vs DSFF Connector and Lane Map</text>

          <g transform="translate(90 150)">
            <text class="label" x="0" y="0">SFF</text>
            <rect x="0" y="34" width="390" height="210" rx="18" fill="#eef3ff" stroke="#343895" stroke-width="2"/>
            <rect x="38" y="78" width="92" height="86" rx="12" fill="#343895"/>
            <text class="tiny-light" x="84" y="114" text-anchor="middle">4C+</text>
            <text class="small" x="164" y="90">Primary only</text>
            <text class="small" x="164" y="122">PCIe lanes 0-15</text>
            <text class="small" x="164" y="154">REFCLK/PERST 0-3</text>
            <text class="small" x="164" y="186">FRU EEPROM on primary path</text>
          </g>
          <g transform="translate(590 150)">
            <text class="label" x="0" y="0">DSFF</text>
            <rect x="0" y="34" width="424" height="210" rx="18" fill="#eef7e7" stroke="#8dc63f" stroke-width="2"/>
            <rect x="36" y="78" width="92" height="86" rx="12" fill="#343895"/>
            <rect x="154" y="78" width="92" height="86" rx="12" fill="#8dc63f"/>
            <text class="tiny-light" x="82" y="114" text-anchor="middle">4C+</text>
            <text class="tiny-light" x="200" y="114" text-anchor="middle">4C+</text>
            <text class="small" x="270" y="90">Primary lanes 0-15</text>
            <text class="small" x="270" y="122">Secondary lanes 16-31</text>
            <text class="small" x="270" y="154">single power domain</text>
            <text class="small" x="270" y="186">management on primary</text>
          </g>
          <g transform="translate(155 438)">
            <rect x="0" y="0" width="790" height="92" rx="14" fill="#fff" stroke="#dbe4ee"/>
            <text class="label" x="28" y="34">Do not model DSFF as two independent NICs</text>
            <text class="small">
              <tspan x="28" y="62">The secondary connector is a repurposed SFF slot position for additional lanes and signals,</tspan>
              <tspan x="28" y="80">not a redundant management channel.</tspan>
            </text>
          </g>

</svg>
