<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240" role="img" aria-labelledby="title desc">
  <title id="title">Definição do Cabeçalho ESUN</title>
  <desc id="desc">O Cabeçalho ESUN tem 32 bits e contém os campos Rev, F, EH-CoS, EH-ECN, Flow Label, TTL, UD e RSVD.</desc>
  <defs><style>
    text{font-family:'Arial','Open Sans','Open Sans',sans-serif;fill:#2430c8}.field{font-size:22px;font-weight:700}.bits{font-size:17px;font-weight:600}.heading{font-size:30px;font-weight:800;fill:#111}
    .cell{fill:#fff;stroke:#8b9097;stroke-width:2}.accent{fill:#f2f8df}.muted{fill:#f1f2f4}
  </style></defs>
  <rect width="1200" height="240" fill="#fff"/>
  <g transform="translate(18 20)">
    <rect class="cell" width="110" height="120"/><text class="field" x="55" y="55" text-anchor="middle">Rev</text><text class="bits" x="55" y="84" text-anchor="middle">2 bits</text>
    <rect class="cell accent" x="110" width="60" height="120"/><text class="field" x="140" y="72" text-anchor="middle">F</text>
    <rect class="cell" x="170" width="170" height="120"/><text class="field" x="255" y="55" text-anchor="middle">EH-CoS</text><text class="bits" x="255" y="84" text-anchor="middle">3 bits</text>
    <rect class="cell accent" x="340" width="150" height="120"/><text class="field" x="415" y="49" text-anchor="middle">EH-</text><text class="field" x="415" y="77" text-anchor="middle">ECN</text><text class="bits" x="415" y="103" text-anchor="middle">2 bits</text>
    <rect class="cell" x="490" width="310" height="120"/><text class="field" x="645" y="55" text-anchor="middle">Flow Label</text><text class="bits" x="645" y="84" text-anchor="middle">16 bits</text>
    <rect class="cell accent" x="800" width="170" height="120"/><text class="field" x="885" y="55" text-anchor="middle">TTL</text><text class="bits" x="885" y="84" text-anchor="middle">4 bits</text>
    <rect class="cell" x="970" width="110" height="120"/><text class="field" x="1025" y="55" text-anchor="middle">UD</text><text class="bits" x="1025" y="84" text-anchor="middle">2 bits</text>
    <rect class="cell muted" x="1080" width="84" height="120"/><text class="field" x="1122" y="55" text-anchor="middle" fill="#888">RSVD</text><text class="bits" x="1122" y="84" text-anchor="middle" fill="#888">2 bits</text>
  </g>
  <text class="heading" x="600" y="205" text-anchor="middle">Definição do Cabeçalho ESUN · 32 bits no total</text>
</svg>
