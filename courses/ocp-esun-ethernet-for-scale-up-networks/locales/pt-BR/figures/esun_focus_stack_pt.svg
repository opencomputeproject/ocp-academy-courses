<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1260 560" role="img" aria-labelledby="title desc">
  <title id="title">Escopo do ESUN e limite com o transporte</title>
  <desc id="desc">Três XPU e suas camadas de transporte ficam sobre Cabeçalho Ethernet, Enlace de Dados e PHY; à direita estão as quatro áreas de foco do ESUN.</desc>
  <defs>
    <style>
      text{font-family:'Arial','Open Sans','Open Sans',sans-serif}.white{fill:#fff}.dark{fill:#20254f}.body{fill:#30343a}
      .head{font-size:25px;font-weight:800}.label{font-size:20px;font-weight:700}.small{font-size:17px;font-weight:600}.bullet{font-size:21px;font-weight:600}
      .layer{fill:#20215a;stroke:#8dc63f;stroke-width:4}.chip{fill:#fff;stroke:#20215a;stroke-width:4}.transport{fill:#656774;stroke:#fff;stroke-width:2}.sue{fill:#8dc63f}
    </style>
  </defs>
  <rect width="1260" height="560" fill="#fff"/>
  <rect x="18" y="18" width="620" height="230" rx="16" fill="#20215a"/>
  <g transform="translate(60 42)">
    <rect class="chip" width="116" height="86" rx="10"/><text class="label dark" x="58" y="38" text-anchor="middle">XPU</text><text class="label dark" x="58" y="66" text-anchor="middle">A</text>
    <rect class="sue" x="-12" y="112" width="140" height="72" rx="12"/><text class="small white" x="58" y="141" text-anchor="middle">OCP SUE</text><text class="small white" x="58" y="165" text-anchor="middle">Transporte</text>
  </g>
  <g transform="translate(252 42)">
    <rect class="chip" width="116" height="86" rx="10"/><text class="label dark" x="58" y="38" text-anchor="middle">XPU</text><text class="label dark" x="58" y="66" text-anchor="middle">B</text>
    <rect class="transport" x="-12" y="112" width="140" height="72" rx="12"/><text class="small white" x="58" y="141" text-anchor="middle">Outro</text><text class="small white" x="58" y="165" text-anchor="middle">Transporte</text>
  </g>
  <g transform="translate(444 42)">
    <rect class="chip" width="116" height="86" rx="10"/><text class="label dark" x="58" y="38" text-anchor="middle">XPU</text><text class="label dark" x="58" y="66" text-anchor="middle">C</text>
    <rect class="transport" x="-12" y="112" width="140" height="72" rx="12"/><text class="small white" x="58" y="141" text-anchor="middle">Outro</text><text class="small white" x="58" y="165" text-anchor="middle">Transporte</text>
  </g>

  <path d="M118 226V275M310 226V275M502 226V275" stroke="#6fa030" stroke-width="4"/>
  <circle cx="118" cy="226" r="5" fill="#6fa030"/><circle cx="118" cy="275" r="5" fill="#6fa030"/>
  <circle cx="310" cy="226" r="5" fill="#6fa030"/><circle cx="310" cy="275" r="5" fill="#6fa030"/>
  <circle cx="502" cy="226" r="5" fill="#6fa030"/><circle cx="502" cy="275" r="5" fill="#6fa030"/>

  <rect class="layer" x="28" y="275" width="600" height="72"/><text class="label white" x="328" y="320" text-anchor="middle">Cabeçalho Ethernet</text>
  <rect class="layer" x="28" y="359" width="600" height="72"/><text class="label white" x="328" y="404" text-anchor="middle">Enlace de Dados Ethernet</text>
  <rect class="layer" x="28" y="443" width="600" height="72"/><text class="label white" x="328" y="488" text-anchor="middle">Ethernet PHY</text>

  <path d="M628 395H690" stroke="#697078" stroke-width="4"/><circle cx="628" cy="395" r="5" fill="#697078"/><circle cx="690" cy="395" r="5" fill="#697078"/>
  <g transform="translate(720 125)">
    <rect width="500" height="62" rx="8" fill="#8dc63f"/>
    <text class="head dark" x="250" y="40" text-anchor="middle">Ethernet para scale-up (ESUN)</text>
    <text class="head body" x="0" y="235">Áreas de foco</text>
    <text class="bullet body" x="18" y="282">•  Enquadramento L2/L3</text>
    <text class="bullet body" x="18" y="326">•  Cabeçalhos eficientes</text>
    <text class="bullet body" x="18" y="370">•  Recuperação de erros</text>
    <text class="bullet body" x="18" y="414">•  Transporte sem perdas</text>
  </g>
</svg>
