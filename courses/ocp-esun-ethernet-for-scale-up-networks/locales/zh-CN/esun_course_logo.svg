<svg viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OCP ESUN">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A6D856"/>
      <stop offset="100%" stop-color="#6FA030"/>
    </linearGradient>
    <style>
      .wm { font: 800 56px 'Open Sans', system-ui, -apple-system, sans-serif; fill: url(#g); letter-spacing: 1px; }
      .ocp { font: 700 14px 'Open Sans', system-ui, sans-serif; fill: #6FA030; letter-spacing: 0.22em; text-transform: uppercase; }
    </style>
  </defs>

  <!-- Background ring of network nodes -->
  <g opacity="0.18">
    <circle cx="120" cy="120" r="92" fill="none" stroke="#6FA030" stroke-width="1.4" stroke-dasharray="3 5"/>
    <circle cx="120" cy="28"  r="5" fill="#6FA030"/>
    <circle cx="212" cy="120" r="5" fill="#6FA030"/>
    <circle cx="120" cy="212" r="5" fill="#6FA030"/>
    <circle cx="28"  cy="120" r="5" fill="#6FA030"/>
    <circle cx="185" cy="55"  r="4" fill="#6FA030"/>
    <circle cx="185" cy="185" r="4" fill="#6FA030"/>
    <circle cx="55"  cy="185" r="4" fill="#6FA030"/>
    <circle cx="55"  cy="55"  r="4" fill="#6FA030"/>
  </g>

  <!-- OCP eyebrow -->
  <text x="120" y="108" text-anchor="middle" class="ocp">OCP</text>

  <!-- Main ESUN wordmark -->
  <text x="120" y="160" text-anchor="middle" class="wm">ESUN</text>
</svg>
