<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 820" role="img" aria-labelledby="title desc">
  <title id="title">AI 集群中的三种网络</title>
  <desc id="desc">前端网络连接用户和存储，纵向扩展网络连接每个机架内的加速器，横向扩展网络连接不同机架。</desc>
  <defs>
    <style>
      text{font-family:'Microsoft YaHei','Noto Sans CJK SC','Open Sans',sans-serif;fill:#34363a}
      .label{font-size:25px;font-weight:700}.small{font-size:18px;font-weight:600}.tiny{font-size:15px;font-weight:600}
      .rack{fill:#fff;stroke:#697078;stroke-width:2}.node{fill:#f7f8fa;stroke:#90979f;stroke-width:1.5}
      .cpu{fill:#e8e9ff;stroke:#3f439e;stroke-width:1.5}.accel{fill:#f2f8df;stroke:#6fa030;stroke-width:1.5}
      .scaleup{fill:#fff4cc;stroke:#c18a10;stroke-width:2}.front{fill:#edf2ff;stroke:#686de0;stroke-width:2}
      .scaleout{fill:#f8ebfb;stroke:#a45bb1;stroke-width:2}.link{fill:none;stroke:#555c63;stroke-width:4}
    </style>
  </defs>
  <rect width="1000" height="820" rx="24" fill="#fbfcfa"/>

  <g aria-label="前端网络">
    <rect class="front" x="250" y="45" width="500" height="90" rx="45"/>
    <circle cx="335" cy="79" r="14" fill="#797ce9"/><path d="M308 118c2-25 15-36 27-36s25 11 27 36" fill="#797ce9"/>
    <ellipse cx="657" cy="75" rx="27" ry="10" fill="#cf9be3"/><path d="M630 75v35c0 6 12 11 27 11s27-5 27-11V75" fill="#cf9be3"/>
    <text class="label" x="500" y="101" text-anchor="middle">前端网络</text>
  </g>

  <path class="link" d="M500 135V177M240 177H760M240 177V215M760 177V215" stroke-dasharray="9 8"/>

  <g aria-label="机架1">
    <rect class="rack" x="55" y="215" width="410" height="430" rx="14"/>
    <text class="small" x="85" y="252">机架1</text>
    <g transform="translate(85 280)">
      <rect class="node" width="270" height="86" rx="10"/><rect class="cpu" x="22" y="18" width="90" height="50" rx="8"/><rect class="accel" x="145" y="18" width="98" height="50" rx="8"/>
      <text class="small" x="67" y="50" text-anchor="middle">CPU</text><text class="small" x="194" y="50" text-anchor="middle">加速器</text>
    </g>
    <g transform="translate(85 390)">
      <rect class="node" width="270" height="86" rx="10"/><rect class="cpu" x="22" y="18" width="90" height="50" rx="8"/><rect class="accel" x="145" y="18" width="98" height="50" rx="8"/>
      <text class="small" x="67" y="50" text-anchor="middle">CPU</text><text class="small" x="194" y="50" text-anchor="middle">加速器</text>
    </g>
    <g transform="translate(85 500)">
      <rect class="node" width="270" height="86" rx="10"/><rect class="cpu" x="22" y="18" width="90" height="50" rx="8"/><rect class="accel" x="145" y="18" width="98" height="50" rx="8"/>
      <text class="small" x="67" y="50" text-anchor="middle">CPU</text><text class="small" x="194" y="50" text-anchor="middle">加速器</text>
    </g>
    <rect class="scaleup" x="370" y="280" width="62" height="306" rx="31"/>
    <text class="small" x="401" y="441" text-anchor="middle" transform="rotate(-90 401 433)">纵向扩展网络</text>
    <path class="link" d="M355 323H370M355 433H370M355 543H370"/>
  </g>

  <g aria-label="机架2">
    <rect class="rack" x="535" y="215" width="410" height="430" rx="14"/>
    <text class="small" x="565" y="252">机架2</text>
    <g transform="translate(565 280)">
      <rect class="node" width="270" height="86" rx="10"/><rect class="cpu" x="22" y="18" width="90" height="50" rx="8"/><rect class="accel" x="145" y="18" width="98" height="50" rx="8"/>
      <text class="small" x="67" y="50" text-anchor="middle">CPU</text><text class="small" x="194" y="50" text-anchor="middle">加速器</text>
    </g>
    <g transform="translate(565 390)">
      <rect class="node" width="270" height="86" rx="10"/><rect class="cpu" x="22" y="18" width="90" height="50" rx="8"/><rect class="accel" x="145" y="18" width="98" height="50" rx="8"/>
      <text class="small" x="67" y="50" text-anchor="middle">CPU</text><text class="small" x="194" y="50" text-anchor="middle">加速器</text>
    </g>
    <g transform="translate(565 500)">
      <rect class="node" width="270" height="86" rx="10"/><rect class="cpu" x="22" y="18" width="90" height="50" rx="8"/><rect class="accel" x="145" y="18" width="98" height="50" rx="8"/>
      <text class="small" x="67" y="50" text-anchor="middle">CPU</text><text class="small" x="194" y="50" text-anchor="middle">加速器</text>
    </g>
    <rect class="scaleup" x="850" y="280" width="62" height="306" rx="31"/>
    <text class="small" x="881" y="441" text-anchor="middle" transform="rotate(-90 881 433)">纵向扩展网络</text>
    <path class="link" d="M835 323H850M835 433H850M835 543H850"/>
  </g>

  <path class="link" d="M260 645V682H740V645" stroke-dasharray="9 8"/>
  <rect class="scaleout" x="260" y="685" width="480" height="88" rx="44"/>
  <text class="label" x="500" y="739" text-anchor="middle">横向扩展网络</text>
</svg>
