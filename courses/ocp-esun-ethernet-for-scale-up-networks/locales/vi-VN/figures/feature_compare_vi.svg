<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 650" role="img" aria-labelledby="title desc">
  <title id="title">So sánh cơ chế mạng của Ethernet tiêu chuẩn và ESUN</title>
  <desc id="desc">So sánh các cơ chế dùng cho tắc nghẽn tạm thời, tắc nghẽn kéo dài, phân loại lưu lượng, khả năng phục hồi và cân bằng tải, cùng tô-pô nhiều hop.</desc>
  <defs><style>
    text{font-family:'Arial','Open Sans',sans-serif;fill:#111}.head{font-size:30px;font-weight:800}.rowhead{font-size:32px;font-weight:800}.body{font-size:27px;font-weight:600}.small{font-size:24px;font-weight:600}
    .grid{stroke:#111;stroke-width:5}.header{fill:#f7f8fa}.standard{fill:#fff3cd}.esun{fill:#b8dc9c}.label{fill:#fff}
  </style></defs>
  <rect width="1920" height="650" fill="#fff"/>
  <g transform="translate(10 10)">
    <rect class="grid label" width="280" height="230"/>
    <rect class="grid header" x="280" width="330" height="230"/>
    <rect class="grid header" x="610" width="310" height="230"/>
    <rect class="grid header" x="920" width="320" height="230"/>
    <rect class="grid header" x="1240" width="380" height="230"/>
    <rect class="grid header" x="1620" width="280" height="230"/>
    <text class="head" x="445" y="72" text-anchor="middle"><tspan x="445">CM cấp liên kết</tspan><tspan x="445" dy="45">Tắc nghẽn tạm thời</tspan></text>
    <text class="head" x="765" y="72" text-anchor="middle"><tspan x="765">Phản hồi fabric</tspan><tspan x="765" dy="45">Tắc nghẽn kéo dài</tspan></text>
    <text class="head" x="1080" y="92" text-anchor="middle"><tspan x="1080">Lưu lượng</tspan><tspan x="1080" dy="45">phân loại</tspan></text>
    <text class="head" x="1430" y="72" text-anchor="middle"><tspan x="1430">Khả năng phục hồi &amp;</tspan><tspan x="1430" dy="45">cân bằng tải</tspan></text>
    <text class="head" x="1760" y="92" text-anchor="middle"><tspan x="1760">Nhiều hop</tspan><tspan x="1760" dy="45">tô-pô</tspan></text>

    <rect class="grid label" y="230" width="280" height="195"/>
    <rect class="grid standard" x="280" y="230" width="330" height="195"/>
    <rect class="grid standard" x="610" y="230" width="310" height="195"/>
    <rect class="grid standard" x="920" y="230" width="320" height="195"/>
    <rect class="grid standard" x="1240" y="230" width="380" height="195"/>
    <rect class="grid standard" x="1620" y="230" width="280" height="195"/>
    <text class="rowhead" x="28" y="300"><tspan x="28">Tiêu chuẩn</tspan><tspan x="28" dy="48">Ethernet</tspan></text>
    <text class="body" x="310" y="340">PFC</text>
    <text class="body" x="640" y="310"><tspan x="640">dựa trên IP</tspan><tspan x="640" dy="44">ECN</tspan></text>
    <text class="body" x="950" y="340">DSCP, 802.1p</text>
    <text class="small" x="1270" y="294"><tspan x="1270">Không có LLR, ECMP,</tspan><tspan x="1270" dy="42">IP Header</tspan></text>
    <text class="small" x="1650" y="294"><tspan x="1650">TTL, dựa trên IP</tspan><tspan x="1650" dy="42">ECN</tspan></text>

    <rect class="grid label" y="425" width="280" height="195"/>
    <rect class="grid esun" x="280" y="425" width="330" height="195"/>
    <rect class="grid esun" x="610" y="425" width="310" height="195"/>
    <rect class="grid esun" x="920" y="425" width="320" height="195"/>
    <rect class="grid esun" x="1240" y="425" width="380" height="195"/>
    <rect class="grid esun" x="1620" y="425" width="280" height="195"/>
    <text class="rowhead" x="28" y="540">ESUN</text>
    <text class="body" x="310" y="540">PFC, CBFC</text>
    <text class="body" x="640" y="540">EH-ECN</text>
    <text class="body" x="950" y="540">EH-CoS</text>
    <text class="small" x="1270" y="515"><tspan x="1270">LLR,</tspan><tspan x="1270" dy="42">EH-Flow Label</tspan></text>
    <text class="small" x="1650" y="515"><tspan x="1650">EH-TTL,</tspan><tspan x="1650" dy="42">EH-ECN</tspan></text>
  </g>
</svg>
