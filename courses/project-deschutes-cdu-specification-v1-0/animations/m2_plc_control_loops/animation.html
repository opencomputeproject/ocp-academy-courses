<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Project Deschutes PLC Control Loops</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 1280px;
      height: 720px;
      margin: 0;
      overflow: hidden;
      background: #f7f8fa;
      font-family: Arial, Helvetica, sans-serif;
    }
    svg { display: block; width: 1280px; height: 720px; }
    text { letter-spacing: 0; }
    .signal-command { stroke-dasharray: 14 13; animation: commandFlow 1.15s linear infinite; }
    .signal-feedback { stroke-dasharray: 8 11; animation: feedbackFlow 1.35s linear infinite; }
    .water-flow { stroke-dasharray: 18 16; animation: waterFlow 1.1s linear infinite; }
    .pump-rotor { transform-box: fill-box; transform-origin: center; animation: spin 1.9s linear infinite; }
    .valve-handle { transform-box: fill-box; transform-origin: center; animation: valve 4s ease-in-out infinite; }
    .needle-left { transform-origin: 290px 530px; animation: needleLeft 5s ease-in-out infinite; }
    .needle-right { transform-origin: 990px 530px; animation: needleRight 5s ease-in-out infinite; }
    .power-a { animation: feedA 6s ease-in-out infinite; }
    .power-b { animation: feedB 6s ease-in-out infinite; }
    .status-pulse { animation: status 2s ease-in-out infinite; }
    @keyframes commandFlow { to { stroke-dashoffset: -27; } }
    @keyframes feedbackFlow { to { stroke-dashoffset: 19; } }
    @keyframes waterFlow { to { stroke-dashoffset: -34; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes valve {
      0%, 20%, 55%, 70%, 100% { transform: rotate(0deg); }
      35% { transform: rotate(-20deg); }
      82% { transform: rotate(16deg); }
    }
    @keyframes needleLeft { 0%, 100% { transform: rotate(-25deg); } 45%, 70% { transform: rotate(0deg); } }
    @keyframes needleRight {
      0%, 20%, 55%, 70%, 100% { transform: rotate(0deg); }
      35% { transform: rotate(12deg); }
      82% { transform: rotate(-8deg); }
    }
    @keyframes feedA { 0%, 42%, 100% { opacity: 1; } 50%, 70% { opacity: .28; } }
    @keyframes feedB { 0%, 42%, 100% { opacity: .55; } 50%, 70% { opacity: 1; } }
    @keyframes status { 0%, 100% { opacity: .45; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <svg viewBox="0 0 1280 720" role="img" aria-labelledby="title desc" xmlns="http://www.w3.org/2000/svg">
    <title id="title">Project Deschutes concurrent PLC control loops</title>
    <desc id="desc">A silent animation shows differential-pressure feedback controlling pump speed, approach-temperature feedback controlling a primary valve, and redundant power feeds maintaining control availability.</desc>
    <defs>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#1b2340" flood-opacity="0.12"/>
      </filter>
    </defs>

    <rect width="1280" height="720" fill="#f7f8fa"/>
    <rect width="1280" height="86" fill="#ffffff"/>
    <rect y="84" width="1280" height="2" fill="#8dc63f"/>
    <text x="52" y="37" font-size="15" font-weight="700" fill="#6fa030">PROJECT DESCHUTES CONTROLS</text>
    <text x="52" y="68" font-size="25" font-weight="700" fill="#19194d">One PLC runs two control loops at the same time</text>
    <g transform="translate(980 23)">
      <rect id="status-box" width="246" height="42" rx="6" fill="#eef6e4" stroke="#8dc63f"/>
      <circle class="status-pulse" cx="22" cy="21" r="6" fill="#6fa030"/>
      <text id="status-text" x="40" y="26" font-size="14" font-weight="700" fill="#315018">Both setpoints maintained</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="488" y="106" width="304" height="118" rx="9" fill="#ffffff" stroke="#8dc63f" stroke-width="3"/>
      <rect x="488" y="106" width="304" height="52" rx="7" fill="#8dc63f"/>
      <text x="640" y="139" text-anchor="middle" font-size="21" font-weight="700" fill="#ffffff">PLC + HMI</text>
      <text x="640" y="182" text-anchor="middle" font-size="15" font-weight="700" fill="#19194d">Modbus/TCP · IPv4 + IPv6</text>
      <text x="640" y="205" text-anchor="middle" font-size="12" fill="#5f6062">Reads feedback · adjusts actuators · reports alarms</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="50" y="260" width="510" height="330" rx="9" fill="#ffffff" stroke="#c9ced7" stroke-width="2"/>
      <rect x="50" y="260" width="510" height="58" rx="7" fill="#eef5fb"/>
      <text x="78" y="286" font-size="17" font-weight="700" fill="#19194d">SECONDARY LOOP · IT SIDE</text>
      <text x="78" y="307" font-size="13" fill="#5f6062">Pump speed responds to differential-pressure feedback</text>

      <g transform="translate(119 350)">
        <circle cx="58" cy="58" r="52" fill="#ffffff" stroke="#5f6062" stroke-width="2"/>
        <g transform="translate(58 58)">
          <g class="pump-rotor" fill="#8dc63f">
            <path d="M0 -35 C26 -28 29 -12 7 -3 Z"/>
            <path d="M35 0 C28 26 12 29 3 7 Z"/>
            <path d="M0 35 C-26 28 -29 12 -7 3 Z"/>
            <path d="M-35 0 C-28 -26 -12 -29 -3 -7 Z"/>
            <circle r="7" fill="#5f6062"/>
          </g>
        </g>
        <text x="58" y="132" text-anchor="middle" font-size="14" font-weight="700" fill="#19194d">VFD pump</text>
        <text x="58" y="151" text-anchor="middle" font-size="12" fill="#5f6062">speed adjusts</text>
      </g>

      <g>
        <path d="M238 408 H340" fill="none" stroke="#2f8fd5" stroke-width="10" stroke-linecap="butt"/>
        <polygon class="arrowhead" points="340,400 355,408 340,416" fill="#2f8fd5"/>
        <path class="water-flow" d="M242 408 H332" fill="none" stroke="#c2e7ff" stroke-width="4" stroke-linecap="round"/>
        <rect id="manifold-box" x="355" y="354" width="164" height="130" rx="7" fill="#f2f4f7" stroke="#aeb4bf"/>
        <text x="437" y="382" text-anchor="middle" font-size="13" font-weight="700" fill="#19194d">Supply / return</text>
        <text x="437" y="402" text-anchor="middle" font-size="13" font-weight="700" fill="#19194d">manifolds</text>
        <circle id="dp-sensor-circle" cx="437" cy="429" r="18" fill="#ffffff" stroke="#2f8fd5" stroke-width="2"/>
        <text x="437" y="434" text-anchor="middle" font-size="12" font-weight="700" fill="#2479b8">dP</text>
        <text id="dp-sensor-label" x="437" y="468" text-anchor="middle" font-size="10" fill="#5f6062">sensor</text>
      </g>

      <g>
        <path d="M250 530 A55 55 0 0 1 330 530" fill="none" stroke="#dfe3e8" stroke-width="11" stroke-linecap="round"/>
        <path d="M250 530 A55 55 0 0 1 330 530" fill="none" stroke="#8dc63f" stroke-width="5" stroke-linecap="round"/>
        <line class="needle-left" x1="290" y1="530" x2="290" y2="507" stroke="#19194d" stroke-width="4" stroke-linecap="round"/>
        <circle cx="290" cy="530" r="6" fill="#19194d"/>
        <text x="290" y="566" text-anchor="middle" font-size="13" font-weight="700" fill="#6fa030">FIXED dP SETPOINT</text>
      </g>
    </g>

    <g filter="url(#shadow)">
      <rect x="720" y="260" width="510" height="330" rx="9" fill="#ffffff" stroke="#c9ced7" stroke-width="2"/>
      <rect x="720" y="260" width="510" height="58" rx="7" fill="#f5f3f8"/>
      <text x="748" y="286" font-size="17" font-weight="700" fill="#19194d">PRIMARY LOOP · FACILITY SIDE</text>
      <text x="748" y="307" font-size="13" fill="#5f6062">Valve position responds to approach-temperature feedback</text>

      <g transform="translate(760 365)">
        <path d="M0 43 H113" stroke="#2f8fd5" stroke-width="10" stroke-linecap="butt"/>
        <polygon class="arrowhead" points="113,35 128,43 113,51" fill="#2f8fd5"/>
        <path class="water-flow" d="M4 43 H105" stroke="#c2e7ff" stroke-width="4" stroke-linecap="round"/>
        <circle cx="58" cy="43" r="28" fill="#ffffff" stroke="#5f6062" stroke-width="2"/>
        <g transform="translate(58 43)">
          <g class="valve-handle">
            <path d="M-20 -17 L20 17 M20 -17 L-20 17" stroke="#8dc63f" stroke-width="8" stroke-linecap="round"/>
          </g>
        </g>
        <text x="64" y="94" text-anchor="middle" font-size="14" font-weight="700" fill="#19194d">Primary valve</text>
        <text x="64" y="113" text-anchor="middle" font-size="12" fill="#5f6062">opening adjusts</text>
      </g>

      <g transform="translate(930 352)">
        <rect width="242" height="112" rx="7" fill="#f2f4f7" stroke="#aeb4bf"/>
        <text x="121" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#19194d">Supply temperature sensors</text>
        <rect x="40" y="45" width="54" height="43" rx="5" fill="#d9edf9" stroke="#2f8fd5"/>
        <text x="67" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#2479b8">FWS</text>
        <rect x="148" y="45" width="54" height="43" rx="5" fill="#d9edf9" stroke="#2f8fd5"/>
        <text x="175" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#2479b8">TCS</text>
        <text x="121" y="104" text-anchor="middle" font-size="11" fill="#5f6062">difference = approach temperature</text>
      </g>

      <g>
        <path d="M950 530 A55 55 0 0 1 1030 530" fill="none" stroke="#dfe3e8" stroke-width="11" stroke-linecap="round"/>
        <path d="M950 530 A55 55 0 0 1 1030 530" fill="none" stroke="#8dc63f" stroke-width="5" stroke-linecap="round"/>
        <line x1="990" y1="484" x2="990" y2="496" stroke="#6fa030" stroke-width="5" stroke-linecap="round"/>
        <text x="990" y="477" text-anchor="middle" font-size="11" font-weight="700" fill="#6fa030">3 °C TARGET</text>
        <line id="approach-needle" class="needle-right" x1="990" y1="530" x2="990" y2="507" stroke="#19194d" stroke-width="4" stroke-linecap="round"/>
        <circle cx="990" cy="530" r="6" fill="#19194d"/>
        <text x="990" y="566" text-anchor="middle" font-size="13" font-weight="700" fill="#6fa030">APPROACH READING</text>
      </g>
    </g>

    <path class="signal-command" d="M552 224 V244 H177 V332" fill="none" stroke="#6fa030" stroke-width="4" stroke-linecap="butt"/>
    <polygon class="arrowhead" points="171,332 183,332 177,344" fill="#6fa030"/>
    <rect x="270" y="226" width="178" height="20" rx="3" fill="#ffffff"/>
    <text x="359" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#6fa030">PUMP-SPEED COMMAND</text>
    <path class="signal-feedback" d="M437 354 V250 H580 V236" fill="none" stroke="#2f8fd5" stroke-width="3" stroke-linecap="butt"/>
    <polygon class="arrowhead" points="574,236 586,236 580,224" fill="#2f8fd5"/>

    <path class="signal-command" d="M728 224 V244 H818 V343" fill="none" stroke="#6fa030" stroke-width="4" stroke-linecap="butt"/>
    <polygon class="arrowhead" points="812,343 824,343 818,355" fill="#6fa030"/>
    <rect id="valve-command-box" x="824" y="202" width="198" height="20" rx="3" fill="#ffffff"/>
    <text id="valve-command-label" x="923" y="216" text-anchor="middle" font-size="12" font-weight="700" fill="#6fa030">VALVE-POSITION COMMAND</text>
    <path id="approach-feedback-path" class="signal-feedback" d="M1051 352 V250 H700 V236" fill="none" stroke="#2f8fd5" stroke-width="3" stroke-linecap="butt"/>
    <polygon class="arrowhead" points="694,236 706,236 700,224" fill="#2f8fd5"/>

    <g transform="translate(52 626)">
      <rect class="panel" width="1176" height="62" rx="7" fill="#ffffff" stroke="#dce0e6"/>
      <text x="22" y="26" font-size="12" font-weight="700" fill="#5f6062">REDUNDANT POWER</text>
      <g class="power-a" transform="translate(172 12)">
        <rect width="190" height="38" rx="5" fill="#eef6e4" stroke="#8dc63f"/>
        <circle cx="20" cy="19" r="6" fill="#6fa030"/>
        <text x="38" y="24" font-size="13" font-weight="700" fill="#315018">AC Feed A · available</text>
      </g>
      <path class="power-a" d="M362 31 H550" stroke="#6fa030" stroke-width="4" stroke-linecap="butt"/>
      <polygon class="power-a arrowhead" points="550,22 568,31 550,40" fill="#6fa030"/>
      <g class="power-b" transform="translate(814 12)">
        <rect width="190" height="38" rx="5" fill="#eef6e4" stroke="#8dc63f"/>
        <circle cx="20" cy="19" r="6" fill="#6fa030"/>
        <text x="38" y="24" font-size="13" font-weight="700" fill="#315018">AC Feed B · available</text>
      </g>
      <path class="power-b" d="M814 31 H626" stroke="#6fa030" stroke-width="4" stroke-linecap="butt"/>
      <polygon class="power-b arrowhead" points="626,22 608,31 626,40" fill="#6fa030"/>
      <rect x="568" y="11" width="40" height="40" rx="5" fill="#f2f4f7" stroke="#5f6062"/>
      <path d="M578 21 H598 M578 31 H598 M578 41 H598" stroke="#5f6062" stroke-width="3"/>
      <text x="1030" y="37" font-size="12" fill="#5f6062">2N preferred</text>
    </g>
  </svg>
</body>
</html>
