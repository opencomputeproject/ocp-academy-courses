<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Project Deschutes CDU Flow Animation</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 1280px;
      height: 720px;
      margin: 0;
      overflow: hidden;
      background: #f7f8fa;
      font-family: Arial, Helvetica, sans-serif;
    }
    svg { display: block; width: 1280px; height: 720px; }
    text { letter-spacing: 0; }
    .flow-line {
      fill: none;
      stroke-width: 12;
      stroke-linecap: butt;
    }
    .flow-trace {
      fill: none;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 18 20;
      animation: dash 1.1s linear infinite;
    }
    .return-trace { animation-direction: reverse; }
    .pump-blade {
      transform-box: fill-box;
      transform-origin: center;
      animation: spin 2.2s linear infinite;
    }
    .hx-cold { animation: coldPulse 4s ease-in-out infinite; }
    .hx-warm { animation: warmPulse 4s ease-in-out infinite; }
    .heat-transfer {
      animation: transfer 2s ease-in-out infinite;
    }
    .status-dot { animation: status 1.8s ease-in-out infinite; }
    .callout { animation: callout 4s ease-in-out infinite; }
    @keyframes dash { to { stroke-dashoffset: -38; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes coldPulse { 0%, 100% { opacity: .95; } 50% { opacity: .52; } }
    @keyframes warmPulse { 0%, 100% { opacity: .50; } 50% { opacity: .95; } }
    @keyframes transfer {
      0%, 100% { opacity: .35; transform: translateX(-5px); }
      50% { opacity: 1; transform: translateX(5px); }
    }
    @keyframes status { 0%, 100% { opacity: .45; } 50% { opacity: 1; } }
    @keyframes callout { 0%, 100% { opacity: .82; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <svg viewBox="0 0 1280 720" role="img" aria-labelledby="title desc" xmlns="http://www.w3.org/2000/svg">
    <title id="title">Project Deschutes CDU flow animation</title>
    <desc id="desc">A silent loop shows cold supply and warm return flow between the facility water system, Project Deschutes CDU, and technology cooling system. The two fluid loops exchange heat without mixing.</desc>
    <defs>
      <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1b2340" flood-opacity="0.12"/>
      </filter>
    </defs>

    <rect width="1280" height="720" fill="#f7f8fa"/>
    <rect x="0" y="0" width="1280" height="86" fill="#ffffff"/>
    <rect x="0" y="84" width="1280" height="2" fill="#8dc63f"/>
    <text x="54" y="38" font-size="15" font-weight="700" fill="#6fa030">PROJECT DESCHUTES ARCHITECTURE</text>
    <text x="54" y="68" font-size="25" font-weight="700" fill="#19194d">Facility water removes heat; technology coolant protects IT</text>
    <g transform="translate(1068 23)">
      <rect width="158" height="42" rx="6" fill="#eef6e4" stroke="#8dc63f"/>
      <circle class="status-dot" cx="24" cy="21" r="6" fill="#6fa030"/>
      <text x="42" y="26" font-size="14" font-weight="700" fill="#315018">2 MW controlled</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="48" y="166" width="276" height="390" rx="8" fill="#ffffff" stroke="#c9ced7" stroke-width="2"/>
      <rect x="48" y="166" width="276" height="70" rx="8" fill="#eef5fb"/>
      <path d="M48 228 H324" stroke="#2f8fd5" stroke-width="2"/>
      <text x="186" y="196" text-anchor="middle" font-size="19" font-weight="700" fill="#19194d">Facility Water System</text>
      <text x="186" y="219" text-anchor="middle" font-size="14" fill="#5f6062">FWS · primary side</text>
      <g transform="translate(114 278)">
        <path d="M0 54 C20 10 49 3 72 32 C94 61 119 45 140 0" fill="none" stroke="#2f8fd5" stroke-width="6" stroke-linecap="round"/>
        <path d="M0 92 C20 48 49 41 72 70 C94 99 119 83 140 38" fill="none" stroke="#79b9e6" stroke-width="6" stroke-linecap="round"/>
      </g>
      <text x="186" y="438" text-anchor="middle" font-size="16" font-weight="700" fill="#2e3342">Building water plant</text>
      <text x="186" y="468" text-anchor="middle" font-size="15" fill="#5f6062">500 GPM · 15–30 psi</text>
      <rect x="91" y="497" width="190" height="38" rx="5" fill="#f2f4f7"/>
      <text x="186" y="522" text-anchor="middle" font-size="13" font-weight="700" fill="#5f6062">Fluid stays on facility side</text>
    </g>

    <g filter="url(#shadow)">
      <rect x="430" y="118" width="420" height="486" rx="10" fill="#ffffff" stroke="#8dc63f" stroke-width="3"/>
      <rect x="430" y="118" width="420" height="72" rx="8" fill="#8dc63f"/>
      <text x="640" y="150" text-anchor="middle" font-size="21" font-weight="700" fill="#ffffff">PROJECT DESCHUTES CDU</text>
      <text x="640" y="176" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">THE CONTROLLED BRIDGE</text>

      <g transform="translate(477 234)">
        <text x="92" y="-17" text-anchor="middle" font-size="13" font-weight="700" fill="#5f6062">3 parallel heat exchangers</text>
        <rect class="hx-cold" x="0" y="0" width="48" height="180" rx="5" fill="#d9edf9" stroke="#2f8fd5" stroke-width="2"/>
        <rect class="hx-warm" x="54" y="0" width="48" height="180" rx="5" fill="#f8dedd" stroke="#d94a45" stroke-width="2"/>
        <rect class="hx-cold" x="108" y="0" width="48" height="180" rx="5" fill="#d9edf9" stroke="#2f8fd5" stroke-width="2"/>
        <g class="heat-transfer" fill="#6fa030">
          <path d="M18 45 H96" stroke="#6fa030" stroke-width="3" stroke-linecap="butt"/>
          <polygon class="arrowhead" points="96,39 108,45 96,51"/>
          <path d="M136 90 H60" stroke="#6fa030" stroke-width="3" stroke-linecap="butt"/>
          <polygon class="arrowhead" points="60,84 48,90 60,96"/>
          <path d="M18 135 H96" stroke="#6fa030" stroke-width="3" stroke-linecap="butt"/>
          <polygon class="arrowhead" points="96,129 108,135 96,141"/>
        </g>
        <text x="78" y="205" text-anchor="middle" font-size="12" font-weight="700" fill="#6fa030">HEAT TRANSFER</text>
        <text x="78" y="223" text-anchor="middle" font-size="11" fill="#5f6062">No fluid mixing</text>
      </g>

      <g transform="translate(702 264)">
        <text x="54" y="-20" text-anchor="middle" font-size="13" font-weight="700" fill="#5f6062">N+1 pumps</text>
        <g transform="translate(54 38)">
          <circle r="34" fill="#ffffff" stroke="#5f6062" stroke-width="2"/>
          <g class="pump-blade" fill="#8dc63f">
            <path d="M0 -23 C18 -18 20 -8 4 -2 Z"/>
            <path d="M23 0 C18 18 8 20 2 4 Z"/>
            <path d="M0 23 C-18 18 -20 8 -4 2 Z"/>
            <path d="M-23 0 C-18 -18 -8 -20 -2 -4 Z"/>
          </g>
          <circle r="5" fill="#5f6062"/>
        </g>
        <g transform="translate(54 124)">
          <circle r="34" fill="#ffffff" stroke="#5f6062" stroke-width="2"/>
          <g class="pump-blade" fill="#8dc63f">
            <path d="M0 -23 C18 -18 20 -8 4 -2 Z"/>
            <path d="M23 0 C18 18 8 20 2 4 Z"/>
            <path d="M0 23 C-18 18 -20 8 -4 2 Z"/>
            <path d="M-23 0 C-18 -18 -8 -20 -2 -4 Z"/>
          </g>
          <circle r="5" fill="#5f6062"/>
        </g>
      </g>

      <g class="callout" transform="translate(480 494)">
        <rect width="320" height="76" rx="7" fill="#eef6e4" stroke="#8dc63f" stroke-width="2"/>
        <text x="160" y="31" text-anchor="middle" font-size="19" font-weight="700" fill="#4d7424">3 °C approach temperature</text>
        <text x="160" y="55" text-anchor="middle" font-size="13" fill="#5f6062">Primary valve adjusts facility-water demand</text>
      </g>
    </g>

    <g filter="url(#shadow)">
      <rect x="956" y="166" width="276" height="390" rx="8" fill="#ffffff" stroke="#c9ced7" stroke-width="2"/>
      <rect x="956" y="166" width="276" height="70" rx="8" fill="#f5f3f8"/>
      <path d="M956 228 H1232" stroke="#5f6062" stroke-width="2"/>
      <text x="1094" y="196" text-anchor="middle" font-size="19" font-weight="700" fill="#19194d">Technology Cooling System</text>
      <text x="1094" y="219" text-anchor="middle" font-size="14" fill="#5f6062">TCS · secondary side</text>
      <g transform="translate(1026 270)">
        <rect width="136" height="166" rx="4" fill="#ffffff" stroke="#5f6062" stroke-width="2"/>
        <rect x="13" y="16" width="110" height="16" rx="2" fill="#e3e6eb"/>
        <rect x="13" y="43" width="110" height="16" rx="2" fill="#d5e8f5"/>
        <rect x="13" y="70" width="110" height="16" rx="2" fill="#e3e6eb"/>
        <rect x="13" y="97" width="110" height="16" rx="2" fill="#d5e8f5"/>
        <rect x="13" y="124" width="110" height="16" rx="2" fill="#e3e6eb"/>
        <circle cx="116" cy="24" r="3" fill="#8dc63f"/>
        <circle cx="116" cy="51" r="3" fill="#8dc63f"/>
        <circle cx="116" cy="78" r="3" fill="#8dc63f"/>
        <circle cx="116" cy="105" r="3" fill="#8dc63f"/>
        <circle cx="116" cy="132" r="3" fill="#8dc63f"/>
      </g>
      <text x="1094" y="470" text-anchor="middle" font-size="16" font-weight="700" fill="#2e3342">Rack cold plates</text>
      <text x="1094" y="499" text-anchor="middle" font-size="15" fill="#5f6062">500 GPM · 80–90 psi</text>
      <rect x="999" y="517" width="190" height="38" rx="5" fill="#f2f4f7"/>
      <text x="1094" y="542" text-anchor="middle" font-size="13" font-weight="700" fill="#5f6062">Fluid stays on technology side</text>
    </g>

    <g>
      <path class="flow-line" d="M324 282 H412" stroke="#2f8fd5"/>
      <polygon class="arrowhead" points="412,273 430,282 412,291" fill="#2f8fd5"/>
      <path class="flow-trace" d="M328 282 H404" stroke="#bfe6ff"/>
      <text x="377" y="258" text-anchor="middle" font-size="13" font-weight="700" fill="#2479b8">COLD SUPPLY</text>

      <path class="flow-line" d="M430 442 H342" stroke="#d94a45"/>
      <polygon class="arrowhead" points="342,433 324,442 342,451" fill="#d94a45"/>
      <path class="flow-trace return-trace" d="M412 442 H350" stroke="#ffd1cf"/>
      <text x="377" y="472" text-anchor="middle" font-size="13" font-weight="700" fill="#b3322f">WARM RETURN</text>

      <path class="flow-line" d="M850 282 H938" stroke="#2f8fd5"/>
      <polygon class="arrowhead" points="938,273 956,282 938,291" fill="#2f8fd5"/>
      <path class="flow-trace" d="M854 282 H930" stroke="#bfe6ff"/>
      <text x="903" y="258" text-anchor="middle" font-size="13" font-weight="700" fill="#2479b8">COLD SUPPLY</text>

      <path class="flow-line" d="M956 442 H868" stroke="#d94a45"/>
      <polygon class="arrowhead" points="868,433 850,442 868,451" fill="#d94a45"/>
      <path class="flow-trace return-trace" d="M938 442 H876" stroke="#ffd1cf"/>
      <text x="903" y="472" text-anchor="middle" font-size="13" font-weight="700" fill="#b3322f">WARM RETURN</text>
    </g>

    <g transform="translate(54 641)">
      <rect class="panel" width="1172" height="48" rx="6" fill="#ffffff" stroke="#dce0e6"/>
      <circle cx="25" cy="24" r="7" fill="#2f8fd5"/>
      <text x="43" y="29" font-size="14" fill="#5f6062">Cold supply</text>
      <circle cx="166" cy="24" r="7" fill="#d94a45"/>
      <text x="184" y="29" font-size="14" fill="#5f6062">Warm return</text>
      <path d="M320 24 H338" stroke="#6fa030" stroke-width="3" stroke-linecap="butt"/>
      <polygon class="arrowhead" points="338,18 350,24 338,30" fill="#6fa030"/>
      <text x="364" y="29" font-size="14" fill="#5f6062">Heat crosses the HX plates; facility and IT fluids remain isolated</text>
    </g>
  </svg>
</body>
</html>
