<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Breadth-First M-PNP Discovery</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 1280px;
      height: 720px;
      margin: 0;
      overflow: hidden;
      background: #f5f7fb;
      font-family: Arial, Helvetica, sans-serif;
    }
    svg { display: block; width: 1280px; height: 720px; }
    text { letter-spacing: 0; }
    .phase-number { font-size: 19px; font-weight: 800; }
    .phase-title { font-size: 18px; font-weight: 800; }
    .node-title { font-size: 24px; font-weight: 800; fill: #1d2554; }
    .node-body { font-size: 16px; font-weight: 700; fill: #5f6062; }
    .status { font-size: 22px; font-weight: 800; fill: #1f2937; }
    .eyebrow { font-size: 16px; font-weight: 800; fill: #343895; }
  </style>
</head>
<body>
<svg viewBox="0 0 1280 720" role="img" aria-label="Silent animation showing breadth-first M-PNP discovery progressing from SCM initialization to the HPM, intermediate peripherals, and endpoint peripherals.">
  <defs>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#27304a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#f5f7fb"/>
  <rect x="28" y="24" width="1224" height="672" rx="22" fill="#ffffff" stroke="#d9dee8" stroke-width="2"/>

  <text x="70" y="68" class="eyebrow">M-PNP DISCOVERY ORDER</text>
  <text x="70" y="102" font-size="28" font-weight="800" fill="#171d48">Each ring's JSON describes the next</text>

  <g id="phase-strip" transform="translate(70 126)">
    <g id="phase-0" transform="translate(0 0)">
      <rect id="phase-bg-0" width="266" height="62" rx="10" fill="#eef0fb" stroke="#343895" stroke-width="3"/>
      <circle id="phase-dot-0" cx="31" cy="31" r="18" fill="#343895"/>
      <text x="31" y="38" text-anchor="middle" class="phase-number" fill="#ffffff">0</text>
      <text id="phase-title-0" x="58" y="38" class="phase-title" fill="#343895">SCM INITIALIZATION</text>
    </g>
    <g id="phase-1" transform="translate(284 0)">
      <rect id="phase-bg-1" width="266" height="62" rx="10" fill="#f8fafc" stroke="#cbd2dc" stroke-width="3"/>
      <circle id="phase-dot-1" cx="31" cy="31" r="18" fill="#a6b0bf"/>
      <text x="31" y="38" text-anchor="middle" class="phase-number" fill="#ffffff">1</text>
      <text id="phase-title-1" x="58" y="38" class="phase-title" fill="#7a8492">HPM</text>
    </g>
    <g id="phase-2" transform="translate(568 0)">
      <rect id="phase-bg-2" width="266" height="62" rx="10" fill="#f8fafc" stroke="#cbd2dc" stroke-width="3"/>
      <circle id="phase-dot-2" cx="31" cy="31" r="18" fill="#a6b0bf"/>
      <text x="31" y="38" text-anchor="middle" class="phase-number" fill="#ffffff">2</text>
      <text id="phase-title-2" x="58" y="38" class="phase-title" fill="#7a8492">INTERMEDIATE</text>
    </g>
    <g id="phase-3" transform="translate(852 0)">
      <rect id="phase-bg-3" width="266" height="62" rx="10" fill="#f8fafc" stroke="#cbd2dc" stroke-width="3"/>
      <circle id="phase-dot-3" cx="31" cy="31" r="18" fill="#a6b0bf"/>
      <text x="31" y="38" text-anchor="middle" class="phase-number" fill="#ffffff">3</text>
      <text id="phase-title-3" x="58" y="38" class="phase-title" fill="#7a8492">ENDPOINTS</text>
    </g>
  </g>

  <path d="M218 382 H1062" fill="none" stroke="#d8dee8" stroke-width="14" stroke-linecap="round"/>
  <path id="completed-path" d="M218 382 H218" fill="none" stroke="#8dc63f" stroke-width="8" stroke-linecap="round"/>

  <g id="node-0" transform="translate(76 245)" filter="url(#soft-shadow)">
    <rect id="node-bg-0" width="260" height="274" rx="18" fill="#eef0fb" stroke="#343895" stroke-width="5"/>
    <circle id="node-badge-0" cx="44" cy="47" r="24" fill="#343895"/>
    <path d="M34 47 H54 M44 37 V57" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <text x="82" y="55" class="node-title">DC-SCM</text>
    <rect x="30" y="91" width="200" height="66" rx="12" fill="#ffffff" stroke="#00a7c4" stroke-width="3"/>
    <text x="130" y="132" text-anchor="middle" font-size="22" font-weight="800" fill="#171d48">BMC</text>
    <rect x="30" y="174" width="200" height="66" rx="12" fill="#ffffff" stroke="#00a7c4" stroke-width="3"/>
    <text x="130" y="214" text-anchor="middle" font-size="20" font-weight="800" fill="#171d48">SCM CPLD</text>
  </g>

  <g id="node-1" transform="translate(376 270)" filter="url(#soft-shadow)">
    <rect id="node-bg-1" width="220" height="224" rx="18" fill="#f8fafc" stroke="#cbd2dc" stroke-width="4"/>
    <circle id="node-badge-1" cx="42" cy="45" r="22" fill="#a6b0bf"/>
    <text x="42" y="53" text-anchor="middle" font-size="23" font-weight="800" fill="#ffffff">1</text>
    <text x="78" y="53" class="node-title">HPM</text>
    <rect x="28" y="88" width="164" height="50" rx="10" fill="#ffffff" stroke="#b7c0cc" stroke-width="3"/>
    <text x="110" y="119" text-anchor="middle" class="node-body">FPGA / CPLD</text>
    <rect x="28" y="151" width="164" height="46" rx="10" fill="#ffffff" stroke="#b7c0cc" stroke-width="3"/>
    <text x="110" y="180" text-anchor="middle" class="node-body">FRU EEPROM</text>
  </g>

  <g id="node-2" transform="translate(636 256)" filter="url(#soft-shadow)">
    <rect id="node-bg-2" width="276" height="252" rx="18" fill="#f8fafc" stroke="#cbd2dc" stroke-width="4"/>
    <circle id="node-badge-2" cx="42" cy="45" r="22" fill="#a6b0bf"/>
    <text x="42" y="53" text-anchor="middle" font-size="23" font-weight="800" fill="#ffffff">2</text>
    <text x="78" y="53" class="node-title">Intermediate</text>
    <rect x="28" y="88" width="220" height="42" rx="9" fill="#ffffff" stroke="#b7c0cc" stroke-width="3"/>
    <text x="138" y="115" text-anchor="middle" class="node-body">Risers</text>
    <rect x="28" y="143" width="220" height="42" rx="9" fill="#ffffff" stroke="#b7c0cc" stroke-width="3"/>
    <text x="138" y="170" text-anchor="middle" class="node-body">Backplanes</text>
    <rect x="28" y="198" width="220" height="28" rx="9" fill="#ffffff" stroke="#b7c0cc" stroke-width="3"/>
    <text x="138" y="219" text-anchor="middle" font-size="15" font-weight="700" fill="#5f6062">PDBs + control panels</text>
  </g>

  <g id="node-3" transform="translate(952 270)" filter="url(#soft-shadow)">
    <rect id="node-bg-3" width="252" height="224" rx="18" fill="#f8fafc" stroke="#cbd2dc" stroke-width="4"/>
    <circle id="node-badge-3" cx="42" cy="45" r="22" fill="#a6b0bf"/>
    <text x="42" y="53" text-anchor="middle" font-size="23" font-weight="800" fill="#ffffff">3</text>
    <text x="78" y="53" class="node-title">Endpoints</text>
    <rect x="28" y="88" width="196" height="42" rx="9" fill="#ffffff" stroke="#b7c0cc" stroke-width="3"/>
    <text x="126" y="115" text-anchor="middle" class="node-body">NICs + drives</text>
    <rect x="28" y="143" width="196" height="42" rx="9" fill="#ffffff" stroke="#b7c0cc" stroke-width="3"/>
    <text x="126" y="170" text-anchor="middle" class="node-body">OCP CEM cards</text>
    <text x="126" y="206" text-anchor="middle" font-size="15" font-weight="700" fill="#5f6062">M-CRPS supplies</text>
  </g>

  <g id="json-token" transform="translate(196 209)" opacity="1">
    <rect x="-31" y="-27" width="62" height="54" rx="9" fill="#ffffff" stroke="#8dc63f" stroke-width="4"/>
    <path d="M14 -27 L31 -10 H14 Z" fill="#dff1c8" stroke="#8dc63f" stroke-width="3" stroke-linejoin="round"/>
    <text x="0" y="8" text-anchor="middle" font-size="15" font-weight="800" fill="#343895">JSON</text>
  </g>

  <g>
    <rect id="status-bg" x="76" y="566" width="1128" height="84" rx="18" fill="#eef0fb" stroke="#343895" stroke-width="3"/>
    <circle id="status-dot" cx="118" cy="608" r="12" fill="#343895"/>
    <text id="status" x="148" y="616" class="status">Phase 0: initialize the SCM and establish the discovery starting point.</text>
  </g>
</svg>

<script>
  const duration = 16;
  const nodeCenters = [206, 486, 774, 1078];
  const phaseTitles = ['SCM INITIALIZATION', 'HPM', 'INTERMEDIATE', 'ENDPOINTS'];
  const statuses = [
    'Phase 0: initialize the SCM and establish the discovery starting point.',
    'Phase 1: read HPM FRU information and discover the HPM resources.',
    'Phase 2: fan out to risers, backplanes, PDBs, and control panels.',
    'Phase 3: finish with endpoint peripherals such as NICs, drives, and supplies.'
  ];

  function clamp(value, min = 0, max = 1) { return Math.min(max, Math.max(min, value)); }
  function smooth(value) { const x = clamp(value); return x * x * (3 - 2 * x); }

  function currentPhase(t) {
    if (t < 4) return 0;
    if (t < 8) return 1;
    if (t < 12) return 2;
    return 3;
  }

  function setPhaseStrip(phase) {
    for (let index = 0; index < 4; index += 1) {
      const active = index === phase;
      const complete = index < phase;
      const accent = active ? '#343895' : complete ? '#8dc63f' : '#a6b0bf';
      const pale = active ? '#eef0fb' : complete ? '#f4faef' : '#f8fafc';
      document.getElementById(`phase-bg-${index}`).setAttribute('fill', pale);
      document.getElementById(`phase-bg-${index}`).setAttribute('stroke', accent);
      document.getElementById(`phase-bg-${index}`).setAttribute('stroke-width', active ? '4' : '3');
      document.getElementById(`phase-dot-${index}`).setAttribute('fill', accent);
      document.getElementById(`phase-title-${index}`).setAttribute('fill', active ? '#343895' : complete ? '#5f8f22' : '#7a8492');
      document.getElementById(`phase-title-${index}`).textContent = phaseTitles[index];
    }
  }

  function setNodes(phase, local) {
    for (let index = 0; index < 4; index += 1) {
      const active = index === phase;
      const complete = index < phase;
      const settled = index <= phase;
      const pulse = active ? 0.5 + 0.5 * Math.sin(local * Math.PI * 1.3) : 0;
      const stroke = active ? '#343895' : complete ? '#8dc63f' : '#cbd2dc';
      const fill = active ? '#eef0fb' : complete ? '#f4faef' : '#f8fafc';
      document.getElementById(`node-bg-${index}`).setAttribute('fill', fill);
      document.getElementById(`node-bg-${index}`).setAttribute('stroke', stroke);
      document.getElementById(`node-bg-${index}`).setAttribute('stroke-width', active ? String(5 + pulse * 2) : settled ? '5' : '4');
      document.getElementById(`node-badge-${index}`).setAttribute('fill', active ? '#343895' : complete ? '#8dc63f' : '#a6b0bf');
    }
  }

  function setProgress(phase, local) {
    const start = nodeCenters[0];
    const target = nodeCenters[phase];
    const reveal = phase === 0 ? 1 : smooth((local - 0.15) / 1.65);
    const end = phase === 0 ? start : nodeCenters[phase - 1] + (target - nodeCenters[phase - 1]) * reveal;
    document.getElementById('completed-path').setAttribute('d', `M${start} 382 H${end}`);

    const token = document.getElementById('json-token');
    let tokenX = target;
    let tokenY = 225;
    let opacity = 1;
    if (phase > 0) {
      const travel = smooth((local - 0.2) / 1.55);
      tokenX = nodeCenters[phase - 1] + (target - nodeCenters[phase - 1]) * travel;
      tokenY = 225 - Math.sin(travel * Math.PI) * 32;
      opacity = clamp((local - 0.05) / 0.25) * clamp((2.5 - local) / 0.35);
    }
    token.setAttribute('transform', `translate(${tokenX} ${tokenY})`);
    token.setAttribute('opacity', String(opacity));
  }

  window.renderAt = function renderAt(rawTime) {
    const t = ((rawTime % duration) + duration) % duration;
    const phase = currentPhase(t);
    const local = t % 4;
    setPhaseStrip(phase);
    setNodes(phase, local);
    setProgress(phase, local);

    document.getElementById('status').textContent = statuses[phase];
    document.getElementById('status-bg').setAttribute('fill', phase === 0 ? '#eef0fb' : '#f4faef');
    document.getElementById('status-bg').setAttribute('stroke', phase === 0 ? '#343895' : '#8dc63f');
    document.getElementById('status-dot').setAttribute('fill', phase === 0 ? '#343895' : '#8dc63f');
  };

  window.renderAt(0);
</script>
</body>
</html>
