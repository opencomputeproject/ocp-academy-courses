<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>M-PNP Adoption and Conformance Loop</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 1280px;
      height: 720px;
      margin: 0;
      overflow: hidden;
      background: #f5f7fb;
      font-family: Arial, Helvetica, sans-serif;
    }
    svg { display: block; width: 1280px; height: 720px; }
    text { letter-spacing: 0; }
    .eyebrow { font-size: 16px; font-weight: 800; fill: #343895; }
    .heading { font-size: 27px; font-weight: 800; fill: #171d48; }
    .node-title { font-size: 21px; font-weight: 800; fill: #171d48; }
    .node-body { font-size: 15px; font-weight: 700; fill: #5f6062; }
    .status { font-size: 20px; font-weight: 800; fill: #1f2937; }
  </style>
</head>
<body>
<svg viewBox="0 0 1280 720" role="img" aria-label="Silent animation showing M-PNP schemas flowing through worked examples, tooling, implementations, validation, and community feedback.">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#27304a" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="#f5f7fb"/>
  <rect x="28" y="24" width="1224" height="672" rx="22" fill="#ffffff" stroke="#d9dee8" stroke-width="2"/>
  <text x="70" y="68" class="eyebrow">ADOPTION AND CONFORMANCE</text>
  <text x="70" y="103" class="heading">Specifications improve when implementations return evidence</text>

  <path id="arrow-0" d="M790 174 C830 174 855 212 880 236" fill="none" stroke="#cbd2dc" stroke-width="6"/>
  <polygon id="arrowhead-0" class="arrowhead" points="868.9,247.5 905,260 891.1,224.5" fill="#cbd2dc"/>
  <path id="arrow-1" d="M1055 358 C1055 398 1008 414 982 439" fill="none" stroke="#cbd2dc" stroke-width="6"/>
  <polygon id="arrowhead-1" class="arrowhead" points="970.9,427.5 956,464 993.1,450.5" fill="#cbd2dc"/>
  <path id="arrow-2" d="M791 522 C720 570 610 522 552 522" fill="none" stroke="#cbd2dc" stroke-width="6"/>
  <polygon id="arrowhead-2" class="arrowhead" points="552,506 526,522 552,538" fill="#cbd2dc"/>
  <path id="arrow-3" d="M361 464 C300 445 255 410 238 384" fill="none" stroke="#cbd2dc" stroke-width="6"/>
  <polygon id="arrowhead-3" class="arrowhead" points="250.6,375.8 221,358 225.4,392.2" fill="#cbd2dc"/>
  <path id="arrow-4" d="M371 268 C404 238 436 206 463 190" fill="none" stroke="#cbd2dc" stroke-width="6"/>
  <polygon id="arrowhead-4" class="arrowhead" points="470.7,203 490,174 455.3,177" fill="#cbd2dc"/>

  <g id="node-0" transform="translate(490 116)" filter="url(#shadow)">
    <rect id="node-bg-0" width="300" height="116" rx="15" fill="#f8fafc" stroke="#cbd2dc" stroke-width="4"/>
    <circle id="node-badge-0" cx="40" cy="42" r="22" fill="#a6b0bf"/>
    <path d="M29 29 H46 L53 36 V55 H29 Z M46 29 V36 H53" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
    <text x="82" y="43" class="node-title">Schemas</text>
    <text x="82" y="74" class="node-body">Define the data shape</text>
    <text x="82" y="97" class="node-body">and required fields</text>
  </g>

  <g id="node-1" transform="translate(905 242)" filter="url(#shadow)">
    <rect id="node-bg-1" width="300" height="116" rx="15" fill="#f8fafc" stroke="#cbd2dc" stroke-width="4"/>
    <circle id="node-badge-1" cx="40" cy="42" r="22" fill="#a6b0bf"/>
    <path d="M28 34 H52 M28 43 H52 M28 52 H45" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <text x="82" y="43" class="node-title">Worked examples</text>
    <text x="82" y="74" class="node-body">Make definitions concrete</text>
    <text x="82" y="97" class="node-body">and inspectable</text>
  </g>

  <g id="node-2" transform="translate(791 464)" filter="url(#shadow)">
    <rect id="node-bg-2" width="330" height="116" rx="15" fill="#f8fafc" stroke="#cbd2dc" stroke-width="4"/>
    <circle id="node-badge-2" cx="40" cy="42" r="22" fill="#a6b0bf"/>
    <path d="M29 42 H51 M40 31 V53 M32 34 L48 50 M48 34 L32 50" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <text x="82" y="43" class="node-title">Tooling</text>
    <circle cx="86" cy="67" r="5" fill="#8dc63f"/>
    <text x="100" y="72" class="node-body">frupack.py available</text>
    <circle cx="86" cy="93" r="5" fill="#f2b134"/>
    <text x="100" y="98" class="node-body">FPGA to JSON planned</text>
  </g>

  <g id="node-3" transform="translate(196 464)" filter="url(#shadow)">
    <rect id="node-bg-3" width="330" height="116" rx="15" fill="#f8fafc" stroke="#cbd2dc" stroke-width="4"/>
    <circle id="node-badge-3" cx="40" cy="42" r="22" fill="#a6b0bf"/>
    <path d="M27 51 H53 V33 H27 Z M33 33 V27 H47 V33" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
    <text x="82" y="43" class="node-title">Implementation</text>
    <text x="82" y="74" class="node-body">Prototype on real BMC,</text>
    <text x="82" y="98" class="node-body">BIOS, FPGA, and peripherals</text>
  </g>

  <g id="node-4" transform="translate(71 242)" filter="url(#shadow)">
    <rect id="node-bg-4" width="300" height="116" rx="15" fill="#f8fafc" stroke="#cbd2dc" stroke-width="4"/>
    <circle id="node-badge-4" cx="40" cy="42" r="22" fill="#a6b0bf"/>
    <path d="M29 33 H51 V48 H41 L35 55 V48 H29 Z" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
    <text x="82" y="43" class="node-title">Feedback</text>
    <text x="82" y="74" class="node-body">Return issues, code,</text>
    <text x="82" y="97" class="node-body">and conformance findings</text>
  </g>

  <g transform="translate(454 275)" filter="url(#shadow)">
    <rect id="hub-bg" width="372" height="144" rx="20" fill="#eef0fb" stroke="#343895" stroke-width="4"/>
    <text x="186" y="45" text-anchor="middle" font-size="16" font-weight="800" fill="#343895">M-PNP SPECIFICATION BUNDLE</text>
    <text id="hub-version" x="186" y="84" text-anchor="middle" font-size="31" font-weight="800" fill="#171d48">v0.5</text>
    <text id="hub-message" x="186" y="115" text-anchor="middle" font-size="16" font-weight="700" fill="#5f6062">A starting point for implementation</text>
  </g>

  <g>
    <rect id="status-bg" x="70" y="606" width="1140" height="58" rx="15" fill="#eef0fb" stroke="#343895" stroke-width="3"/>
    <circle id="status-dot" cx="108" cy="635" r="10" fill="#343895"/>
    <text id="status" x="136" y="642" class="status">Schemas establish a shared, machine-readable contract.</text>
  </g>
</svg>

<script>
  const duration = 16;
  const statuses = [
    'Schemas establish a shared, machine-readable contract.',
    'Worked examples show how the contract describes real platform components.',
    'Tools package, validate, generate, and ingest the definitions.',
    'Implementations test the specification against real hardware behavior.',
    'Findings return to the workstream and shape the next revision.'
  ];

  function activeStage(t) {
    if (t < 3.2) return 0;
    if (t < 6.4) return 1;
    if (t < 9.6) return 2;
    if (t < 12.8) return 3;
    return 4;
  }

  window.renderAt = function renderAt(rawTime) {
    const t = ((rawTime % duration) + duration) % duration;
    const active = activeStage(t);
    const local = t - active * 3.2;
    const pulse = 0.5 + 0.5 * Math.sin(local * Math.PI * 1.3);

    for (let index = 0; index < 5; index += 1) {
      const current = index === active;
      const complete = index < active;
      const accent = current ? '#343895' : complete ? '#8dc63f' : '#a6b0bf';
      const fill = current ? '#eef0fb' : complete ? '#f4faef' : '#f8fafc';
      const background = document.getElementById(`node-bg-${index}`);
      background.setAttribute('fill', fill);
      background.setAttribute('stroke', accent);
      background.setAttribute('stroke-width', current ? String(4 + pulse * 2) : '4');
      document.getElementById(`node-badge-${index}`).setAttribute('fill', accent);

      const arrow = document.getElementById(`arrow-${index}`);
      const outgoing = index === active;
      const arrowColor = outgoing ? '#00a7c4' : complete ? '#8dc63f' : '#cbd2dc';
      arrow.setAttribute('stroke', arrowColor);
      arrow.setAttribute('stroke-width', outgoing ? String(6 + pulse * 2) : '6');
      document.getElementById(`arrowhead-${index}`).setAttribute('fill', arrowColor);
    }

    document.getElementById('status').textContent = statuses[active];
    const feedback = active === 4;
    document.getElementById('status-bg').setAttribute('fill', feedback ? '#f4faef' : '#eef0fb');
    document.getElementById('status-bg').setAttribute('stroke', feedback ? '#8dc63f' : '#343895');
    document.getElementById('status-dot').setAttribute('fill', feedback ? '#8dc63f' : '#343895');
    document.getElementById('hub-version').textContent = feedback && local > 1.6 ? 'v0.5 -> v1.0' : 'v0.5';
    document.getElementById('hub-message').textContent = feedback && local > 1.6
      ? 'Evidence drives the next stable revision'
      : 'A starting point for implementation';
    document.getElementById('hub-bg').setAttribute('fill', feedback && local > 1.6 ? '#f4faef' : '#eef0fb');
    document.getElementById('hub-bg').setAttribute('stroke', feedback && local > 1.6 ? '#8dc63f' : '#343895');
  };

  window.renderAt(0);
</script>
</body>
</html>
