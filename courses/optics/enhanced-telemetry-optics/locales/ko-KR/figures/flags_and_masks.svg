<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 360" role="img" aria-label="플래그와 마스크">
  <style>text { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; letter-spacing: 0; }</style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L9,3 L0,6 Z" fill="#8DC63F"/></marker>
  </defs>
  <rect width="768" height="360" fill="#FFFFFF"/>

  <text x="384" y="42" text-anchor="middle" font-size="24" font-weight="800" fill="#343895">플래그는 요약하고 마스크는 반영 항목을 조정합니다</text>
  <rect x="72" y="92" width="250" height="172" rx="14" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="197" y="130" text-anchor="middle" font-size="21" font-weight="800" fill="#343895">플래그 요약</text>
  <circle cx="122" cy="166" r="12" fill="#8DC63F"/><text x="150" y="172" font-size="17" fill="#5F6062">정상 범위</text>
  <circle cx="122" cy="206" r="12" fill="#F97316"/><text x="150" y="212" font-size="17" fill="#5F6062">임계값 이벤트</text>
  <line x1="330" y1="178" x2="435" y2="178" stroke="#8DC63F" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="444" y="92" width="250" height="172" rx="14" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="569" y="130" text-anchor="middle" font-size="21" font-weight="800" fill="#343895">마스크 제어</text>
  <rect x="500" y="154" width="34" height="24" rx="6" fill="#8DC63F"/><text x="548" y="173" font-size="17" fill="#5F6062">포함</text>
  <rect x="500" y="196" width="34" height="24" rx="6" fill="#D0D7DE"/><text x="548" y="215" font-size="17" fill="#5F6062">제외</text>
  <text x="384" y="314" text-anchor="middle" font-size="17" fill="#5F6062">운영자는 불필요하거나 관련성이 낮은 카운터에 방해받지 않고 간결한 상태를 확인할 수 있습니다.</text>

</svg>
