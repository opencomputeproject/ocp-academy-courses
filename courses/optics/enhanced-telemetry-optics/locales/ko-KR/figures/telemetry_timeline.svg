<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 360" role="img" aria-label="Telemetry timeline">
  <style>text { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; letter-spacing: 0; }</style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 Z" fill="#8DC63F"/></marker>
  </defs>
  <rect width="768" height="360" fill="#FFFFFF"/>

  <text x="384" y="42" text-anchor="middle" font-size="24" font-weight="800" fill="#343895">텔레메트리 수집은 링크 타임라인을 구축합니다</text>
  <line x1="86" y1="182" x2="682" y2="182" stroke="#D0D7DE" stroke-width="7" stroke-linecap="round"/>
  <circle cx="124" cy="182" r="15" fill="#8DC63F"/><text x="124" y="134" text-anchor="middle" font-size="18" font-weight="800" fill="#343895">폴링</text><text x="124" y="226" text-anchor="middle" font-size="15" fill="#5F6062">현재 지표</text>
  <circle cx="292" cy="182" r="15" fill="#F97316"/><text x="292" y="134" text-anchor="middle" font-size="18" font-weight="800" fill="#343895">이벤트</text><text x="292" y="226" text-anchor="middle" font-size="15" fill="#5F6062">임계값 초과</text>
  <circle cx="460" cy="182" r="15" fill="#8DC63F"/><text x="460" y="134" text-anchor="middle" font-size="18" font-weight="800" fill="#343895">원격</text><text x="460" y="226" text-anchor="middle" font-size="15" fill="#5F6062">상대편 조회</text>
  <circle cx="628" cy="182" r="15" fill="#343895"/><text x="628" y="134" text-anchor="middle" font-size="18" font-weight="800" fill="#343895">맵</text><text x="628" y="226" text-anchor="middle" font-size="15" fill="#5F6062">패브릭 상태</text>
  <text x="384" y="306" text-anchor="middle" font-size="17" fill="#5F6062">현재 상태와 사건 이력을 연결할 수 있을 때 운영이 개선됩니다.</text>

</svg>
