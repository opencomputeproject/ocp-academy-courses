<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 360" role="img" aria-label="확장 페이로드">
  <style>text { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; letter-spacing: 0; }</style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L9,3 L0,6 Z" fill="#8DC63F"/></marker>
  </defs>
  <rect width="768" height="360" fill="#FFFFFF"/>

  <text x="384" y="42" text-anchor="middle" font-size="24" font-weight="800" fill="#343895">확장 페이로드는 더 큰 전송을 처리할 수 있습니다</text>
  <rect x="86" y="110" width="180" height="120" rx="12" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="176" y="154" text-anchor="middle" font-size="19" font-weight="800" fill="#343895">로컬 페이로드</text>
  <text x="176" y="184" text-anchor="middle" font-size="16" fill="#5F6062">소규모 응답</text>
  <line x1="272" y1="170" x2="343" y2="170" stroke="#8DC63F" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="352" y="92" width="330" height="156" rx="12" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="517" y="126" text-anchor="middle" font-size="19" font-weight="800" fill="#343895">확장 페이로드 페이지</text>
  <rect x="386" y="156" width="48" height="46" rx="6" fill="#EEF7E6" stroke="#8DC63F"/>
  <rect x="446" y="156" width="48" height="46" rx="6" fill="#EEF7E6" stroke="#8DC63F"/>
  <rect x="506" y="156" width="48" height="46" rx="6" fill="#EEF7E6" stroke="#8DC63F"/>
  <rect x="566" y="156" width="48" height="46" rx="6" fill="#EEF7E6" stroke="#8DC63F"/>
  <text x="410" y="184" text-anchor="middle" font-size="15" fill="#343895">A0h</text>
  <text x="470" y="184" text-anchor="middle" font-size="15" fill="#343895">A1h</text>
  <text x="530" y="184" text-anchor="middle" font-size="15" fill="#343895">...</text>
  <text x="590" y="184" text-anchor="middle" font-size="15" fill="#343895">AFh</text>
  <text x="517" y="224" text-anchor="middle" font-size="16" fill="#5F6062">최대 2048바이트</text>
  <text x="384" y="304" text-anchor="middle" font-size="17" fill="#5F6062">호스트는 여전히 명령, 상태, 응답을 따릅니다. 오직 페이로드 면적만 커집니다.</text>

</svg>
