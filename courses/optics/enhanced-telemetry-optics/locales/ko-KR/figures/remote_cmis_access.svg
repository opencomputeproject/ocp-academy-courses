<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 360" role="img" aria-label="Remote CMIS access">
  <style>text { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; letter-spacing: 0; }</style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 Z" fill="#8DC63F"/></marker>
  </defs>
  <rect width="768" height="360" fill="#FFFFFF"/>

  <text x="384" y="42" text-anchor="middle" font-size="24" font-weight="800" fill="#343895">원격 CMIS 액세스로 원격 엔드포인트에 도달</text>
  <rect x="74" y="104" width="276" height="142" rx="14" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="212" y="142" text-anchor="middle" font-size="20" font-weight="800" fill="#343895">바이트 접근</text>
  <text x="212" y="176" text-anchor="middle" font-size="16" fill="#5F6062">소규모 타겟 리드</text>
  <text x="212" y="204" text-anchor="middle" font-size="16" fill="#5F6062">상태 또는 현장 점검</text>
  <rect x="418" y="104" width="276" height="142" rx="14" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="556" y="142" text-anchor="middle" font-size="20" font-weight="800" fill="#343895">페이지 접근</text>
  <text x="556" y="176" text-anchor="middle" font-size="16" fill="#5F6062">전체 페이지 수집</text>
  <text x="556" y="204" text-anchor="middle" font-size="16" fill="#5F6062">더 큰 CMIS 스냅샷</text>
  <text x="384" y="306" text-anchor="middle" font-size="17" fill="#5F6062">두 가지 모두 동일한 운영 개념을 유지합니다: 로컬 호스트, 로컬 모듈, 원격 파트너.</text>

</svg>
