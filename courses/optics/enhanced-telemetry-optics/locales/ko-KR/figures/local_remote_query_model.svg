<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 360" role="img" aria-label="로컬 및 원격 쿼리 모델">
  <style>text { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; letter-spacing: 0; }</style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L9,3 L0,6 Z" fill="#8DC63F"/></marker>
  </defs>
  <rect width="768" height="360" fill="#FFFFFF"/>

  <text x="384" y="42" text-anchor="middle" font-size="24" font-weight="800" fill="#343895">단일 호스트 뷰, 로컬 및 원격 엔드포인트</text>
  <rect x="52" y="124" width="144" height="92" rx="12" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="124" y="162" text-anchor="middle" font-size="19" font-weight="800" fill="#343895">스위치 호스트</text>
  <text x="124" y="191" text-anchor="middle" font-size="16" fill="#5F6062">운영자 도구</text>
  <line x1="202" y1="170" x2="275" y2="170" stroke="#8DC63F" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="240" y="150" text-anchor="middle" font-size="15" fill="#5F6062">I2C</text>
  <rect x="284" y="112" width="160" height="116" rx="12" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="364" y="154" text-anchor="middle" font-size="19" font-weight="800" fill="#343895">로컬 모듈</text>
  <text x="364" y="184" text-anchor="middle" font-size="16" fill="#5F6062">로컬 데이터 서비스</text>
  <line x1="450" y1="170" x2="545" y2="170" stroke="#8DC63F" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="499" y="150" text-anchor="middle" font-size="15" fill="#5F6062">인밴드</text>
  <rect x="554" y="112" width="160" height="116" rx="12" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="634" y="154" text-anchor="middle" font-size="19" font-weight="800" fill="#343895">원격 모듈</text>
  <text x="634" y="184" text-anchor="middle" font-size="16" fill="#5F6062">파트너 텔레메트리</text>
  <rect x="84" y="270" width="600" height="42" rx="21" fill="#EEF7E6"/>
  <text x="384" y="297" text-anchor="middle" font-size="18" font-weight="700" fill="#343895">호스트는 로컬 모듈에 질의하고, 로컬 모듈은 원격 파트너에 접근합니다.</text>

</svg>
