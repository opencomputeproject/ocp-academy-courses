<!doctype html>
<html lang="ko-KR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CDB 명령-응답 워크플로우</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 1280px;
      height: 720px;
      margin: 0;
      overflow: hidden;
      background: #f7f9fc;
      font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
    }
    svg { display: block; width: 1280px; height: 720px; }
    text { letter-spacing: 0; }
    .title { font-size: 34px; font-weight: 800; fill: #343895; }
    .subtitle { font-size: 20px; font-weight: 700; fill: #5f6062; }
    .node-label { font-size: 25px; font-weight: 800; fill: #ffffff; }
    .node-note { font-size: 17px; font-weight: 700; fill: #eef0fb; }
    .page-label { font-size: 24px; font-weight: 800; fill: #343895; }
    .field-label { font-size: 15px; font-weight: 800; fill: #343895; }
    .step-title { font-size: 19px; font-weight: 800; fill: #343895; }
    .step-note { font-size: 14px; font-weight: 700; fill: #5f6062; }
    .status { font-size: 25px; font-weight: 800; fill: #1f2937; }
    .pill { font-size: 20px; font-weight: 800; fill: #ffffff; }
  </style>
</head>
<body>
<svg viewBox="0 0 1280 720" role="img" aria-label="CDB 준비, 트리거, 폴링, 응답 수집 워크플로우를 보여주는 무음 애니메이션.">
  <defs>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1f2937" flood-opacity="0.14"/>
    </filter>
    <filter id="glow-green" x="-140%" y="-140%" width="380%" height="380%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feFlood flood-color="#8dc63f" flood-opacity="0.8"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-cyan" x="-140%" y="-140%" width="380%" height="380%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feFlood flood-color="#00a7c4" flood-opacity="0.78"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="1" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1 1 L11 6 L1 11 Z" fill="#8dc63f"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="12" markerHeight="12" refX="1" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1 1 L11 6 L1 11 Z" fill="#00a7c4"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="#f7f9fc"/>
  <rect x="34" y="28" width="1212" height="664" rx="24" fill="#ffffff" stroke="#d7dde8" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="82" text-anchor="middle" class="title">CDB는 명령-응답 워크플로우입니다</text>
  <text x="640" y="114" text-anchor="middle" class="subtitle">요청을 작성하고, 실행을 트리거하고, 상태를 확인하고, 응답을 읽습니다.</text>

  <g id="host" transform="translate(82 230)">
    <rect width="240" height="152" rx="22" fill="#343895" filter="url(#shadow)"/>
    <text x="120" y="62" text-anchor="middle" class="node-label">호스트 소프트웨어</text>
    <text x="120" y="94" text-anchor="middle" class="node-note">요청 작성</text>
    <rect x="60" y="112" width="120" height="18" rx="9" fill="#eef0fb" opacity="0.95"/>
  </g>

  <g id="module" transform="translate(958 230)">
    <rect width="240" height="152" rx="22" fill="#343895" filter="url(#shadow)"/>
    <text x="120" y="62" text-anchor="middle" class="node-label">모듈</text>
    <text x="120" y="94" text-anchor="middle" class="node-note">명령 실행</text>
    <rect x="60" y="112" width="120" height="18" rx="9" fill="#eef0fb" opacity="0.95"/>
  </g>

  <g id="page" transform="translate(456 182)">
    <rect width="368" height="260" rx="24" fill="#eef0fb" stroke="#343895" stroke-width="5" filter="url(#shadow)"/>
    <text x="184" y="44" text-anchor="middle" class="page-label">9Fh 페이지</text>
    <g id="cmd-fields">
      <rect id="cmd-header" x="42" y="72" width="284" height="44" rx="10" fill="#ffffff" stroke="#d6dce7" stroke-width="2"/>
      <text x="184" y="100" text-anchor="middle" class="field-label">명령 헤더</text>
      <rect id="cmd-payload" x="42" y="124" width="284" height="44" rx="10" fill="#ffffff" stroke="#d6dce7" stroke-width="2"/>
      <text x="184" y="152" text-anchor="middle" class="field-label">페이로드</text>
    </g>
    <g id="reply-fields">
      <rect id="reply-header" x="42" y="176" width="284" height="34" rx="10" fill="#ffffff" stroke="#d6dce7" stroke-width="2"/>
      <text x="184" y="199" text-anchor="middle" class="field-label">응답 헤더</text>
      <rect id="reply-payload" x="42" y="218" width="284" height="34" rx="10" fill="#ffffff" stroke="#d6dce7" stroke-width="2"/>
      <text x="184" y="241" text-anchor="middle" class="field-label">응답 페이로드</text>
    </g>
  </g>

  <path id="request-path" d="M322 306 H446 M824 306 H948" fill="none" stroke="#8dc63f" stroke-width="9" stroke-linecap="round" marker-end="url(#arrow-green)" opacity="0.46"/>
  <path id="reply-path" d="M958 354 H834 M456 354 H332" fill="none" stroke="#00a7c4" stroke-width="9" stroke-linecap="round" marker-end="url(#arrow-cyan)" opacity="0.34"/>

  <g id="status-register" transform="translate(499 474)">
    <rect width="282" height="62" rx="31" fill="#f8fafc" stroke="#d6dce7" stroke-width="2" filter="url(#shadow)"/>
    <rect id="status-pill" x="16" y="12" width="118" height="38" rx="19" fill="#8dc63f"/>
    <text id="status-pill-text" x="75" y="38" text-anchor="middle" class="pill">준비</text>
    <text id="status-register-text" x="204" y="39" text-anchor="middle" class="field-label">상태 레지스터</text>
  </g>

  <g id="steps" transform="translate(88 574)">
    <g id="step-0" transform="translate(0 0)">
      <rect id="step-bg-0" width="252" height="86" rx="16" fill="#f4faef" stroke="#8dc63f" stroke-width="3"/>
      <text x="20" y="32" class="step-title">1. 준비</text>
      <text x="20" y="60" class="step-note">헤더 및 페이로드</text>
    </g>
    <g id="step-1" transform="translate(300 0)">
      <rect id="step-bg-1" width="252" height="86" rx="16" fill="#f4faef" stroke="#8dc63f" stroke-width="3"/>
      <text x="20" y="32" class="step-title">2. 트리거</text>
      <text x="20" y="60" class="step-note">명령 실행</text>
    </g>
    <g id="step-2" transform="translate(600 0)">
      <rect id="step-bg-2" width="252" height="86" rx="16" fill="#eef0fb" stroke="#343895" stroke-width="3"/>
      <text x="20" y="32" class="step-title">3. 폴링</text>
      <text x="20" y="60" class="step-note">'Busy' 및 'Complete'</text>
    </g>
    <g id="step-3" transform="translate(900 0)">
      <rect id="step-bg-3" width="252" height="86" rx="16" fill="#eef7f9" stroke="#00a7c4" stroke-width="3"/>
      <text x="20" y="32" class="step-title">4. 응답 수집</text>
      <text x="20" y="60" class="step-note">응답 헤더와 데이터</text>
    </g>
  </g>

  <g id="message-token">
    <circle id="token-glow" cx="0" cy="0" r="20" fill="#8dc63f" opacity="0.18" filter="url(#glow-green)"/>
    <circle id="token" cx="0" cy="0" r="12" fill="#8dc63f" filter="url(#glow-green)"/>
  </g>
  <g>
    <rect x="184" y="132" width="912" height="46" rx="23" fill="#f8fafc" stroke="#d6dce7" stroke-width="2"/>
    <text id="status" x="640" y="163" text-anchor="middle" class="status">CDB는 호스트-모듈 트랜잭션을 구조화하고 관찰 가능하게 유지합니다.</text>
  </g>
</svg>

<script>
  const duration = 16;
  const token = document.getElementById('token');
  const tokenGlow = document.getElementById('token-glow');
  const requestPath = document.getElementById('request-path');
  const replyPath = document.getElementById('reply-path');

  function clamp(v, min = 0, max = 1) { return Math.min(max, Math.max(min, v)); }
  function smooth(v) { const x = clamp(v); return x * x * (3 - 2 * x); }
  function mix(a, b, p) { return a + (b - a) * p; }
  function windowValue(v, start, end, feather = 0.12) {
    return clamp(Math.min(smooth((v - start) / feather), 1 - smooth((v - (end - feather)) / feather)));
  }
  function setField(id, strength, color) {
    const el = document.getElementById(id);
    el.setAttribute('stroke', color);
    el.setAttribute('stroke-width', String(2 + strength * 4));
    el.setAttribute('fill', strength > 0.12 ? (color === '#00a7c4' ? '#eef7f9' : '#f4faef') : '#ffffff');
  }
  function setStep(index, strength) {
    const bg = document.getElementById(`step-bg-${index}`);
    const colors = ['#8dc63f', '#8dc63f', '#343895', '#00a7c4'];
    bg.setAttribute('stroke', colors[index]);
    bg.setAttribute('stroke-width', String(3 + strength * 4));
    bg.style.filter = strength > 0.2 ? 'url(#shadow)' : '';
  }
  function pointOn(path, progress) {
    return path.getPointAtLength(path.getTotalLength() * clamp(progress));
  }

  window.renderAt = function renderAt(rawTime) {
    const t = ((rawTime % duration) + duration) % duration;
    const prepare = windowValue(t, 0.8, 4.2, 0.7);
    const trigger = windowValue(t, 3.6, 7.0, 0.7);
    const poll = windowValue(t, 6.3, 10.9, 0.7);
    const retrieve = windowValue(t, 10.2, 14.8, 0.7);
    [prepare, trigger, poll, retrieve].forEach((strength, index) => setStep(index, strength));

    setField('cmd-header', prepare, '#8dc63f');
    setField('cmd-payload', prepare, '#8dc63f');
    setField('reply-header', retrieve, '#00a7c4');
    setField('reply-payload', retrieve, '#00a7c4');

    requestPath.setAttribute('opacity', String(0.32 + trigger * 0.46));
    replyPath.setAttribute('opacity', String(0.24 + retrieve * 0.56));

    let p;
    let color = '#8dc63f';
    let glow = 'url(#glow-green)';
    if (t < 4.1) {
      p = pointOn(requestPath, smooth(t / 4.1) * 0.46);
    } else if (t < 7.0) {
      p = pointOn(requestPath, 0.46 + smooth((t - 4.1) / 2.9) * 0.54);
    } else if (t < 10.4) {
      p = { x: mix(1050, 640, smooth((t - 7.0) / 3.4)), y: mix(306, 504, smooth((t - 7.0) / 3.4)) };
      color = '#d88911';
      glow = 'url(#glow-green)';
    } else {
      p = pointOn(replyPath, smooth((t - 10.4) / 4.2));
      color = '#00a7c4';
      glow = 'url(#glow-cyan)';
    }
    token.setAttribute('cx', p.x);
    token.setAttribute('cy', p.y);
    tokenGlow.setAttribute('cx', p.x);
    tokenGlow.setAttribute('cy', p.y);
    token.setAttribute('fill', color);
    token.setAttribute('filter', glow);

    const pill = document.getElementById('status-pill');
    const pillText = document.getElementById('status-pill-text');
    const busyPulse = poll * (0.65 + 0.35 * Math.sin(t * Math.PI * 4) ** 2);
    if (t >= 6.5 && t < 9.6) {
      pill.setAttribute('fill', '#d88911');
      pillText.textContent = '처리 중';
      pill.setAttribute('width', String(106 + busyPulse * 24));
    } else if (t >= 9.6 && t < 14.6) {
      pill.setAttribute('fill', '#00a7c4');
      pillText.textContent = '완료';
      pill.setAttribute('width', '118');
    } else {
      pill.setAttribute('fill', '#8dc63f');
      pillText.textContent = '준비';
      pill.setAttribute('width', '118');
    }

    let status = 'CDB는 호스트-모듈 트랜잭션을 구조화하고 관찰 가능하게 유지합니다.';
    if (t >= 0.8 && t < 3.8) status = '호스트는 명령 헤더와 페이로드를 준비합니다.';
    else if (t >= 3.8 && t < 6.7) status = '트리거가 모듈에 요청을 전달합니다.';
    else if (t >= 6.7 && t < 10.3) status = '폴링은 작업이 진행 중인지 완료되었는지 보여 줍니다.';
    else if (t >= 10.3 && t < 14.6) status = '응답 헤더와 페이로드는 완료 후 반환됩니다.';
    else if (t >= 14.6) status = '동일한 패턴이 텔레메트리, 로그, 더 큰 페이로드를 지원합니다.';
    document.getElementById('status').textContent = status;
  };

  window.renderAt(0);
</script>
</body>
</html>
