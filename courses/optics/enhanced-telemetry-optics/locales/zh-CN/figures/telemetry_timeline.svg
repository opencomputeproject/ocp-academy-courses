<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 360" role="img" aria-label="Telemetry timeline">
  <style>text { font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; letter-spacing: 0; }</style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 Z" fill="#8DC63F"/></marker>
  </defs>
  <rect width="768" height="360" fill="#FFFFFF"/>

  <text x="384" y="42" text-anchor="middle" font-size="24" font-weight="800" fill="#343895">遥测采集构建链路时间线</text>
  <line x1="86" y1="182" x2="682" y2="182" stroke="#D0D7DE" stroke-width="7" stroke-linecap="round"/>
  <circle cx="124" cy="182" r="15" fill="#8DC63F"/><text x="124" y="134" text-anchor="middle" font-size="18" font-weight="800" fill="#343895">轮询</text><text x="124" y="226" text-anchor="middle" font-size="15" fill="#5F6062">当前指标</text>
  <circle cx="292" cy="182" r="15" fill="#F97316"/><text x="292" y="134" text-anchor="middle" font-size="18" font-weight="800" fill="#343895">事件</text><text x="292" y="226" text-anchor="middle" font-size="15" fill="#5F6062">越过阈值</text>
  <circle cx="460" cy="182" r="15" fill="#8DC63F"/><text x="460" y="134" text-anchor="middle" font-size="18" font-weight="800" fill="#343895">远端</text><text x="460" y="226" text-anchor="middle" font-size="15" fill="#5F6062">对端查询</text>
  <circle cx="628" cy="182" r="15" fill="#343895"/><text x="628" y="134" text-anchor="middle" font-size="18" font-weight="800" fill="#343895">视图</text><text x="628" y="226" text-anchor="middle" font-size="15" fill="#5F6062">网络健康</text>
  <text x="384" y="306" text-anchor="middle" font-size="17" fill="#5F6062">将当前状态与事件历史串联起来，能够提升运维效率。</text>

</svg>
