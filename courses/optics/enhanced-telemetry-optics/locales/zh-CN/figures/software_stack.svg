<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 360" role="img" aria-label="遥测软件栈">
  <style>text { font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; letter-spacing: 0; }</style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L9,3 L0,6 Z" fill="#8DC63F"/></marker>
  </defs>
  <rect width="768" height="360" fill="#FFFFFF"/>

  <text x="384" y="44" text-anchor="middle" font-size="24" font-weight="800" fill="#343895">遥测软件栈</text>
  <rect x="64" y="80" width="190" height="150" rx="12" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="159" y="120" text-anchor="middle" font-size="20" font-weight="800" fill="#343895">收发器</text>
  <text x="159" y="152" text-anchor="middle" font-size="17" fill="#5F6062">固件</text>
  <text x="159" y="178" text-anchor="middle" font-size="17" fill="#5F6062">指标</text>
  <text x="159" y="204" text-anchor="middle" font-size="17" fill="#5F6062">事件日志</text>
  <line x1="260" y1="155" x2="315" y2="155" stroke="#8DC63F" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="324" y="80" width="190" height="150" rx="12" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="419" y="120" text-anchor="middle" font-size="20" font-weight="800" fill="#343895">交换机主机</text>
  <text x="419" y="152" text-anchor="middle" font-size="17" fill="#5F6062">软件</text>
  <text x="419" y="178" text-anchor="middle" font-size="17" fill="#5F6062">轮询</text>
  <text x="419" y="204" text-anchor="middle" font-size="17" fill="#5F6062">运维 API</text>
  <line x1="520" y1="155" x2="575" y2="155" stroke="#8DC63F" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="584" y="80" width="130" height="150" rx="12" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="649" y="120" text-anchor="middle" font-size="20" font-weight="800" fill="#343895">遥测</text>
  <text x="649" y="146" text-anchor="middle" font-size="20" font-weight="800" fill="#343895">服务器</text>
  <text x="649" y="180" text-anchor="middle" font-size="17" fill="#5F6062">网络健康</text>
  <text x="649" y="206" text-anchor="middle" font-size="17" fill="#5F6062">视图</text>
  <rect x="112" y="270" width="544" height="42" rx="21" fill="#EEF7E6"/>
  <text x="384" y="297" text-anchor="middle" font-size="18" font-weight="700" fill="#343895">从模块数据到大规模运维的统一接口</text>

</svg>
