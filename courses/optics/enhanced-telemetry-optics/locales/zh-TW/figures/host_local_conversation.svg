<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 360" role="img" aria-label="主機本地互動">
  <style>text { font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; letter-spacing: 0; }</style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L9,3 L0,6 Z" fill="#8DC63F"/></marker>
  </defs>
  <rect width="768" height="360" fill="#FFFFFF"/>

  <text x="384" y="42" text-anchor="middle" font-size="24" font-weight="800" fill="#343895">主機軟體負責本地互動</text>
  <rect x="58" y="112" width="160" height="112" rx="12" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="138" y="154" text-anchor="middle" font-size="19" font-weight="800" fill="#343895">交換機主機</text>
  <text x="138" y="184" text-anchor="middle" font-size="16" fill="#5F6062">SDK 與 CLI</text>
  <line x1="224" y1="168" x2="303" y2="168" stroke="#8DC63F" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="264" y="148" text-anchor="middle" font-size="15" fill="#5F6062">I2C</text>
  <rect x="312" y="96" width="168" height="144" rx="12" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="396" y="140" text-anchor="middle" font-size="19" font-weight="800" fill="#343895">本地光模組</text>
  <text x="396" y="170" text-anchor="middle" font-size="16" fill="#5F6062">本地應答</text>
  <text x="396" y="196" text-anchor="middle" font-size="16" fill="#5F6062">遠端代理</text>
  <line x1="486" y1="168" x2="567" y2="168" stroke="#8DC63F" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="527" y="148" text-anchor="middle" font-size="15" fill="#5F6062">帶內</text>
  <rect x="576" y="112" width="134" height="112" rx="12" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="643" y="154" text-anchor="middle" font-size="19" font-weight="800" fill="#343895">遠端</text>
  <text x="643" y="184" text-anchor="middle" font-size="16" fill="#5F6062">對端</text>
  <text x="384" y="306" text-anchor="middle" font-size="17" fill="#5F6062">主機無需建立通往遠端模組的獨立直連路徑。</text>

</svg>
