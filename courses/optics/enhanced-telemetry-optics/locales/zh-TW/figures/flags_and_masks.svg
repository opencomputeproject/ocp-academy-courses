<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 360" role="img" aria-label="旗標與掩碼">
  <style>text { font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; letter-spacing: 0; }</style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L9,3 L0,6 Z" fill="#8DC63F"/></marker>
  </defs>
  <rect width="768" height="360" fill="#FFFFFF"/>

  <text x="384" y="42" text-anchor="middle" font-size="24" font-weight="800" fill="#343895">旗標彙總狀態；掩碼控制計入項</text>
  <rect x="72" y="92" width="250" height="172" rx="14" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="197" y="130" text-anchor="middle" font-size="21" font-weight="800" fill="#343895">旗標彙總</text>
  <circle cx="122" cy="166" r="12" fill="#8DC63F"/><text x="150" y="172" font-size="17" fill="#5F6062">健康範圍</text>
  <circle cx="122" cy="206" r="12" fill="#F97316"/><text x="150" y="212" font-size="17" fill="#5F6062">閾值事件</text>
  <line x1="330" y1="178" x2="435" y2="178" stroke="#8DC63F" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="444" y="92" width="250" height="172" rx="14" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="569" y="130" text-anchor="middle" font-size="21" font-weight="800" fill="#343895">掩碼控制</text>
  <rect x="500" y="154" width="34" height="24" rx="6" fill="#8DC63F"/><text x="548" y="173" font-size="17" fill="#5F6062">計入</text>
  <rect x="500" y="196" width="34" height="24" rx="6" fill="#D0D7DE"/><text x="548" y="215" font-size="17" fill="#5F6062">排除</text>
  <text x="384" y="314" text-anchor="middle" font-size="17" fill="#5F6062">在保留計數器控制能力的同時，為運維人員提供簡明的健康檢視。</text>

</svg>
