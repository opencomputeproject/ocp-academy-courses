<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 360" role="img" aria-label="Remote CMIS access">
  <style>text { font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; letter-spacing: 0; }</style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 Z" fill="#8DC63F"/></marker>
  </defs>
  <rect width="768" height="360" fill="#FFFFFF"/>

  <text x="384" y="42" text-anchor="middle" font-size="24" font-weight="800" fill="#343895">遠端 CMIS 存取觸達遠端</text>
  <rect x="74" y="104" width="276" height="142" rx="14" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="212" y="142" text-anchor="middle" font-size="20" font-weight="800" fill="#343895">位元組訪問</text>
  <text x="212" y="176" text-anchor="middle" font-size="16" fill="#5F6062">小型定向讀取</text>
  <text x="212" y="204" text-anchor="middle" font-size="16" fill="#5F6062">狀態或欄位檢查</text>
  <rect x="418" y="104" width="276" height="142" rx="14" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="556" y="142" text-anchor="middle" font-size="20" font-weight="800" fill="#343895">頁面訪問</text>
  <text x="556" y="176" text-anchor="middle" font-size="16" fill="#5F6062">整頁檢索</text>
  <text x="556" y="204" text-anchor="middle" font-size="16" fill="#5F6062">更大的 CMIS 快照</text>
  <text x="384" y="306" text-anchor="middle" font-size="17" fill="#5F6062">兩者採用同一運維模型：本地主機、本地模組、遠端對端。</text>

</svg>
