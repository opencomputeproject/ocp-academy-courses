<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 360" role="img" aria-label="遙測檢索流程">
  <style>text { font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; letter-spacing: 0; }</style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L9,3 L0,6 Z" fill="#8DC63F"/></marker>
  </defs>
  <rect width="768" height="360" fill="#FFFFFF"/>

  <text x="384" y="42" text-anchor="middle" font-size="24" font-weight="800" fill="#343895">遙測檢索遵循同一模式</text>
  <rect x="58" y="110" width="136" height="92" rx="12" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="126" y="151" text-anchor="middle" font-size="18" font-weight="800" fill="#343895">主機</text>
  <text x="126" y="178" text-anchor="middle" font-size="15" fill="#5F6062">請求指標</text>
  <line x1="200" y1="156" x2="285" y2="156" stroke="#8DC63F" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="294" y="94" width="180" height="124" rx="12" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="384" y="136" text-anchor="middle" font-size="18" font-weight="800" fill="#343895">本地模組</text>
  <text x="384" y="164" text-anchor="middle" font-size="15" fill="#5F6062">收集本地</text>
  <text x="384" y="188" text-anchor="middle" font-size="15" fill="#5F6062">或遠端資料</text>
  <line x1="480" y1="156" x2="571" y2="156" stroke="#8DC63F" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="580" y="110" width="136" height="92" rx="12" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="648" y="151" text-anchor="middle" font-size="18" font-weight="800" fill="#343895">應答</text>
  <text x="648" y="178" text-anchor="middle" font-size="15" fill="#5F6062">健康欄位</text>
  <rect x="180" y="262" width="408" height="42" rx="21" fill="#EEF7E6"/>
  <text x="384" y="289" text-anchor="middle" font-size="18" font-weight="700" fill="#343895">同一工作流程支援多種運維命令。</text>

</svg>
