<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 360" role="img" aria-label="本地與遠端查詢模型">
  <style>text { font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif; letter-spacing: 0; }</style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L9,3 L0,6 Z" fill="#8DC63F"/></marker>
  </defs>
  <rect width="768" height="360" fill="#FFFFFF"/>

  <text x="384" y="42" text-anchor="middle" font-size="24" font-weight="800" fill="#343895">一個主機檢視覆蓋本地與遠端端點</text>
  <rect x="52" y="124" width="144" height="92" rx="12" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="124" y="162" text-anchor="middle" font-size="19" font-weight="800" fill="#343895">交換機主機</text>
  <text x="124" y="191" text-anchor="middle" font-size="16" fill="#5F6062">運維工具</text>
  <line x1="202" y1="170" x2="275" y2="170" stroke="#8DC63F" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="240" y="150" text-anchor="middle" font-size="15" fill="#5F6062">I2C</text>
  <rect x="284" y="112" width="160" height="116" rx="12" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="364" y="154" text-anchor="middle" font-size="19" font-weight="800" fill="#343895">本地模組</text>
  <text x="364" y="184" text-anchor="middle" font-size="16" fill="#5F6062">提供本地資料</text>
  <line x1="450" y1="170" x2="545" y2="170" stroke="#8DC63F" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="499" y="150" text-anchor="middle" font-size="15" fill="#5F6062">帶內</text>
  <rect x="554" y="112" width="160" height="116" rx="12" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="634" y="154" text-anchor="middle" font-size="19" font-weight="800" fill="#343895">遠端模組</text>
  <text x="634" y="184" text-anchor="middle" font-size="16" fill="#5F6062">對端遙測</text>
  <rect x="84" y="270" width="600" height="42" rx="21" fill="#EEF7E6"/>
  <text x="384" y="297" text-anchor="middle" font-size="18" font-weight="700" fill="#343895">主機在本地發起查詢；本地模組訪問遠端。</text>

</svg>
