<!doctype html>
<html lang="vi-VN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Từ dao động liên kết đến nguyên nhân gốc</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 1280px;
      height: 720px;
      margin: 0;
      overflow: hidden;
      background: #f7f9fc;
      font-family: Arial, Helvetica, sans-serif;
    }
    svg { display: block; width: 1280px; height: 720px; }
    text { letter-spacing: 0; }.title { font-size: 34px; font-weight: 800; fill: #343895; }.subtitle { font-size: 20px; font-weight: 700; fill: #5f6062; }.flow-title { font-size: 18px; font-weight: 800; fill: #343895; }.flow-note { font-size: 13px; font-weight: 700; fill: #5f6062; }.bundle-title { font-size: 25px; font-weight: 800; fill: #343895; }.tile-title { font-size: 17px; font-weight: 800; fill: #343895; }.tile-note { font-size: 13px; font-weight: 700; fill: #5f6062; }.action-title { font-size: 23px; font-weight: 800; fill: #343895; }.action-note { font-size: 16px; font-weight: 700; fill: #5f6062; }.status { font-size: 25px; font-weight: 800; fill: #1f2937; }.icon { font-size: 30px; font-weight: 900; fill: #ffffff; }
  </style>
</head>
<body>
<svg viewBox="0 0 1280 720" role="img" aria-label="Hoạt ảnh im lặng hiển thị quá trình điều tra liên kết từ cảnh báo đến hành động dựa trên bằng chứng.">
  <defs>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1f2937" flood-opacity="0.14"/>
    </filter>
    <filter id="glow-green" x="-130%" y="-130%" width="360%" height="360%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feFlood flood-color="#8dc63f" flood-opacity="0.8"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-amber" x="-130%" y="-130%" width="360%" height="360%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#d88911" flood-opacity="0.75"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="1" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1 1 L11 6 L1 11 Z" fill="#343895"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="#f7f9fc"/>
  <rect x="34" y="28" width="1212" height="664" rx="24" fill="#ffffff" stroke="#d7dde8" stroke-width="2" filter="url(#shadow)"/>
  <text x="640" y="82" text-anchor="middle" class="title">Từ dao động liên kết đến nguyên nhân gốc</text>
  <text x="640" y="114" text-anchor="middle" class="subtitle">Đo từ xa nâng cao biến một sự cố thành dấu vết bằng chứng có cấu trúc.</text>

  <path id="flow-path" d="M130 260 H324 H518 H712 H906 H1018" fill="none" stroke="#343895" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow-blue)" opacity="0.18"/>

  <g id="flow-card-0" transform="translate(58 180)">
    <rect id="flow-bg-0" width="144" height="150" rx="16" fill="#fff7e8" stroke="#d88911" stroke-width="3"/>
    <circle cx="72" cy="42" r="22" fill="#d88911"/>
    <text x="72" y="53" text-anchor="middle" class="icon">!</text>
    <text x="72" y="87" text-anchor="middle" class="flow-title">Cảnh báo dao động</text>
    <text x="72" y="116" text-anchor="middle" class="flow-note">xuất hiện triệu chứng</text>
  </g>
  <g id="flow-card-1" transform="translate(252 180)">
    <rect id="flow-bg-1" width="144" height="150" rx="16" fill="#eef0fb" stroke="#343895" stroke-width="3"/>
    <circle cx="72" cy="42" r="22" fill="#343895"/>
    <text x="72" y="53" text-anchor="middle" class="icon">42</text>
    <text x="72" y="87" text-anchor="middle" class="flow-title">Điểm tình trạng</text>
    <text x="72" y="116" text-anchor="middle" class="flow-note">hạng mục yếu</text>
  </g>
  <g id="flow-card-2" transform="translate(446 180)">
    <rect id="flow-bg-2" width="144" height="150" rx="16" fill="#f4faef" stroke="#8dc63f" stroke-width="3"/>
    <circle cx="72" cy="42" r="22" fill="#8dc63f"/>
    <text x="72" y="53" text-anchor="middle" class="icon">M</text>
    <text x="72" y="87" text-anchor="middle" class="flow-title">Số liệu</text>
    <text x="72" y="116" text-anchor="middle" class="flow-note">trường hiện tại</text>
  </g>
  <g id="flow-card-3" transform="translate(640 180)">
    <rect id="flow-bg-3" width="144" height="150" rx="16" fill="#f8fafc" stroke="#a6b0bf" stroke-width="3"/>
    <circle cx="72" cy="42" r="22" fill="#5f6062"/>
    <text x="72" y="53" text-anchor="middle" class="icon">L</text>
    <text x="72" y="87" text-anchor="middle" class="flow-title">Nhật ký sự kiện</text>
    <text x="72" y="116" text-anchor="middle" class="flow-note">chuỗi sự kiện</text>
  </g>
  <g id="flow-card-4" transform="translate(834 180)">
    <rect id="flow-bg-4" width="144" height="150" rx="16" fill="#eef7f9" stroke="#00a7c4" stroke-width="3"/>
    <circle cx="72" cy="42" r="22" fill="#00a7c4"/>
    <text x="72" y="53" text-anchor="middle" class="icon">R</text>
    <text x="72" y="87" text-anchor="middle" class="flow-title">Truy vấn từ xa</text>
    <text x="72" y="116" text-anchor="middle" class="flow-note">đầu xa</text>
  </g>
  <g id="flow-card-5" transform="translate(1028 180)">
    <rect id="flow-bg-5" width="144" height="150" rx="16" fill="#eef0fb" stroke="#343895" stroke-width="3"/>
    <circle cx="72" cy="42" r="22" fill="#343895"/>
    <text x="72" y="53" text-anchor="middle" class="icon">T</text>
    <text x="72" y="87" text-anchor="middle" class="flow-title">Dòng thời gian host</text>
    <text x="72" y="116" text-anchor="middle" class="flow-note">góc nhìn hệ thống</text>
  </g>

  <g id="pulse">
    <circle id="pulse-glow" r="20" fill="#8dc63f" opacity="0.24" filter="url(#glow-green)"/>
    <circle id="pulse-dot" r="10" fill="#8dc63f" filter="url(#glow-green)"/>
  </g>

  <g id="bundle" transform="translate(88 400)">
    <rect width="664" height="210" rx="22" fill="#f8fafc" stroke="#d6dce7" stroke-width="2" filter="url(#shadow)"/>
    <text x="332" y="42" text-anchor="middle" class="bundle-title">Gói bằng chứng</text>
    <g id="tile-0" transform="translate(34 70)" opacity="0">
      <rect width="178" height="56" rx="12" fill="#fff7e8" stroke="#d88911" stroke-width="2"/>
      <text x="18" y="24" class="tile-title">Điểm tình trạng</text>
      <text x="18" y="44" class="tile-note">loại quang học yếu</text>
    </g>
    <g id="tile-1" transform="translate(244 70)" opacity="0">
      <rect width="178" height="56" rx="12" fill="#f4faef" stroke="#8dc63f" stroke-width="2"/>
      <text x="18" y="24" class="tile-title">Số liệu</text>
      <text x="18" y="44" class="tile-note">công suất và xu hướng BER</text>
    </g>
    <g id="tile-2" transform="translate(454 70)" opacity="0">
      <rect width="178" height="56" rx="12" fill="#ffffff" stroke="#a6b0bf" stroke-width="2"/>
      <text x="18" y="24" class="tile-title">Thứ tự sự kiện</text>
      <text x="18" y="44" class="tile-note">cảnh báo trước dao động</text>
    </g>
    <g id="tile-3" transform="translate(34 142)" opacity="0">
      <rect width="178" height="56" rx="12" fill="#eef7f9" stroke="#00a7c4" stroke-width="2"/>
      <text x="18" y="24" class="tile-title">Điểm cuối từ xa</text>
      <text x="18" y="44" class="tile-note">phía xa xác nhận</text>
    </g>
    <g id="tile-4" transform="translate(244 142)" opacity="0">
      <rect width="178" height="56" rx="12" fill="#eef0fb" stroke="#343895" stroke-width="2"/>
      <text x="18" y="24" class="tile-title">Dòng thời gian host</text>
      <text x="18" y="44" class="tile-note">các sự kiện host đồng bộ</text>
    </g>
    <g id="tile-5" transform="translate(454 142)" opacity="0">
      <rect width="178" height="56" rx="12" fill="#f4faef" stroke="#8dc63f" stroke-width="2"/>
      <text x="18" y="24" class="tile-title">Bản ghi hành động</text>
      <text x="18" y="44" class="tile-note">quyết định có thể kiểm tra</text>
    </g>
  </g>

  <g id="action" transform="translate(808 400)">
    <rect id="action-bg" width="384" height="210" rx="22" fill="#f4faef" stroke="#8dc63f" stroke-width="3" filter="url(#shadow)"/>
    <text x="192" y="42" text-anchor="middle" class="action-title">Hành động dựa trên bằng chứng</text>
    <g id="action-choice-0" transform="translate(36 72)">
      <rect width="142" height="44" rx="12" fill="#ffffff" stroke="#d6dce7" stroke-width="2"/>
      <text x="71" y="29" text-anchor="middle" class="action-note">Vệ sinh/lắp lại</text>
    </g>
    <g id="action-choice-1" transform="translate(206 72)">
      <rect width="142" height="44" rx="12" fill="#ffffff" stroke="#d6dce7" stroke-width="2"/>
      <text x="71" y="29" text-anchor="middle" class="action-note">Thay quang</text>
    </g>
    <g id="action-choice-2" transform="translate(36 132)">
      <rect width="142" height="44" rx="12" fill="#ffffff" stroke="#d6dce7" stroke-width="2"/>
      <text x="71" y="29" text-anchor="middle" class="action-note">Cập nhật firmware</text>
    </g>
    <g id="action-choice-3" transform="translate(206 132)">
      <rect id="selected-action" width="142" height="44" rx="12" fill="#ffffff" stroke="#d6dce7" stroke-width="2"/>
      <text x="71" y="29" text-anchor="middle" class="action-note">Yêu cầu nhà cung cấp</text>
    </g>
  </g>

  <g>
    <rect x="180" y="632" width="920" height="46" rx="23" fill="#eef0fb" stroke="#d6dce7" stroke-width="2"/>
    <text id="status" x="640" y="663" text-anchor="middle" class="status">Bắt đầu từ dao động liên kết, rồi thu thập bằng chứng trước khi hành động.</text>
  </g>
</svg>

<script>
  const duration = 18;
  const flowPath = document.getElementById('flow-path');
  const pulse = document.getElementById('pulse-dot');
  const pulseGlow = document.getElementById('pulse-glow');

  function clamp(v, min = 0, max = 1) { return Math.min(max, Math.max(min, v)); }
  function smooth(v) { const x = clamp(v); return x * x * (3 - 2 * x); }
  function windowValue(v, start, end, feather = 0.12) {
    return clamp(Math.min(smooth((v - start) / feather), 1 - smooth((v - (end - feather)) / feather)));
  }
  function setFlow(index, strength) {
    const bg = document.getElementById(`flow-bg-${index}`);
    const colors = ['#d88911', '#343895', '#8dc63f', '#5f6062', '#00a7c4', '#343895'];
    bg.setAttribute('stroke-width', String(3 + strength * 5));
    bg.setAttribute('stroke', colors[index]);
    bg.style.filter = strength > 0.2? (index === 0? 'url(#glow-amber)': 'url(#shadow)'): '';
  }
  function setTile(index, strength) {
    const tile = document.getElementById(`tile-${index}`);
    tile.setAttribute('opacity', String(clamp(strength)));
    tile.setAttribute('transform', `translate(${index % 3 === 0? 34: index % 3 === 1? 244: 454} ${index < 3? 70: 142 + (1 - smooth(strength)) * 18})`);
  }

  window.renderAt = function renderAt(rawTime) {
    const t = ((rawTime % duration) + duration) % duration;
    const stage = clamp((t - 1.0) / 12.8);
    const p = flowPath.getPointAtLength(flowPath.getTotalLength() * stage);
    pulse.setAttribute('cx', p.x);
    pulse.setAttribute('cy', p.y);
    pulseGlow.setAttribute('cx', p.x);
    pulseGlow.setAttribute('cy', p.y);
    pulse.setAttribute('fill', t < 2.8? '#d88911': '#8dc63f');
    pulseGlow.setAttribute('fill', t < 2.8? '#d88911': '#8dc63f');

    const cardWindows = [
      windowValue(t, 0.7, 3.2, 0.55),
      windowValue(t, 2.5, 5.0, 0.55),
      windowValue(t, 4.3, 6.8, 0.55),
      windowValue(t, 6.1, 8.8, 0.55),
      windowValue(t, 8.2, 11.2, 0.55),
      windowValue(t, 10.5, 13.7, 0.55),
    ];
    cardWindows.forEach((value, index) => setFlow(index, value));
    [3.2, 5.0, 6.8, 8.8, 11.2, 13.5].forEach((start, index) => {
      setTile(index, smooth((t - start) / 0.8));
    });

    const actionStrength = smooth((t - 13.4) / 2.0) * (1 - smooth((t - 17.0) / 0.9));
    const selected = document.getElementById('selected-action');
    selected.setAttribute('fill', actionStrength > 0.15? '#f4faef': '#ffffff');
    selected.setAttribute('stroke', actionStrength > 0.15? '#8dc63f': '#d6dce7');
    selected.setAttribute('stroke-width', String(2 + actionStrength * 4));
    document.getElementById('action-bg').setAttribute('stroke-width', String(3 + actionStrength * 3));

    let status = 'Bắt đầu từ dao động liên kết, rồi thu thập bằng chứng trước khi hành động.';
    if (t >= 1.0 && t < 3.2) status = 'Cảnh báo dao động là một triệu chứng, không phải kết luận.';
    else if (t >= 3.2 && t < 5.4) status = 'Điểm tình trạng chỉ vào loại yếu nhất.';
    else if (t >= 5.4 && t < 8.6) status = 'Số liệu hiện tại và thứ tự sự kiện cho thấy lỗi phát triển như thế nào.';
    else if (t >= 8.6 && t < 12.6) status = 'Dữ liệu điểm cuối từ xa và dòng thời gian của máy chủ thu hẹp phạm vi.';
    else if (t >= 12.6 && t < 16.4) status = 'Hành động bây giờ có bằng chứng đằng sau nó.';
    else if (t >= 16.4) status = 'Ghi lại hành động để sự việc tiếp theo có bối cảnh.';
    document.getElementById('status').textContent = status;
  };

  window.renderAt(0);
</script>
</body>
</html>
