  <rect x="88" y="88" width="592" height="210" rx="14" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <rect x="122" y="126" width="148" height="116" rx="10" fill="#EEF7E6" stroke="#8DC63F" stroke-width="3"/>
  <text x="196" y="166" text-anchor="middle" font-size="18" font-weight="800" fill="#343895">Tiêu đề</text>
  <text x="196" y="194" text-anchor="middle" font-size="15" fill="#5F6062">lệnh</text>
