  <rect x="498" y="126" width="148" height="116" rx="10" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="3"/>
  <text x="572" y="166" text-anchor="middle" font-size="18" font-weight="800" fill="#343895">Dữ liệu tải</text>
