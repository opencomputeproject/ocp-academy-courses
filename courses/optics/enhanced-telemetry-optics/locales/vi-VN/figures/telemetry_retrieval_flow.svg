<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 360" role="img" aria-label="Luồng truy xuất từ xa">
  <style>text { font-family: "Open Sans", Arial, Helvetica, sans-serif; letter-spacing: 0; }</style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L9,3 L0,6 Z" fill="#8DC63F"/></marker>
  </defs>
  <rect width="768" height="360" fill="#FFFFFF"/>

  <text x="384" y="42" text-anchor="middle" font-size="24" font-weight="800" fill="#343895">Truy xuất dữ liệu đo từ xa theo cùng một mẫu</text>
  <rect x="58" y="110" width="136" height="92" rx="12" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="126" y="151" text-anchor="middle" font-size="18" font-weight="800" fill="#343895">Máy chủ</text>
  <text x="126" y="178" text-anchor="middle" font-size="15" fill="#5F6062">yêu cầu chỉ số</text>
  <line x1="200" y1="156" x2="285" y2="156" stroke="#8DC63F" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="294" y="94" width="180" height="124" rx="12" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="384" y="136" text-anchor="middle" font-size="18" font-weight="800" fill="#343895">Mô-đun cục bộ</text>
  <text x="384" y="164" text-anchor="middle" font-size="15" fill="#5F6062">thu thập dữ liệu cục bộ</text>
  <text x="384" y="188" text-anchor="middle" font-size="15" fill="#5F6062">hoặc từ xa</text>
  <line x1="480" y1="156" x2="571" y2="156" stroke="#8DC63F" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="580" y="110" width="136" height="92" rx="12" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="648" y="151" text-anchor="middle" font-size="18" font-weight="800" fill="#343895">phản hồi</text>
  <text x="648" y="178" text-anchor="middle" font-size="15" fill="#5F6062">trường tình trạng</text>
  <rect x="180" y="262" width="408" height="42" rx="21" fill="#EEF7E6"/>
  <text x="384" y="289" text-anchor="middle" font-size="18" font-weight="700" fill="#343895">Cùng một quy trình, nhiều lệnh vận hành.</text>

</svg>
