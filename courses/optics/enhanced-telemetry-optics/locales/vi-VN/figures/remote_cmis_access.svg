<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 360" role="img" aria-label="Truy cập CMIS từ xa">
  <style>text { font-family: "Open Sans", Arial, Helvetica, sans-serif; letter-spacing: 0; }</style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 Z" fill="#8DC63F"/></marker>
  </defs>
  <rect width="768" height="360" fill="#FFFFFF"/>

  <text x="384" y="42" text-anchor="middle" font-size="24" font-weight="800" fill="#343895">Truy cập CMIS từ xa đến đầu xa</text>
  <rect x="74" y="104" width="276" height="142" rx="14" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="212" y="142" text-anchor="middle" font-size="20" font-weight="800" fill="#343895">Truy cập byte</text>
  <text x="212" y="176" text-anchor="middle" font-size="16" fill="#5F6062">lần đọc nhỏ có mục tiêu</text>
  <text x="212" y="204" text-anchor="middle" font-size="16" fill="#5F6062">kiểm tra trạng thái hoặc trường dữ liệu dữ liệu dữ liệu</text>
  <rect x="418" y="104" width="276" height="142" rx="14" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="556" y="142" text-anchor="middle" font-size="20" font-weight="800" fill="#343895">Truy cập trang</text>
  <text x="556" y="176" text-anchor="middle" font-size="16" fill="#5F6062">truy xuất toàn trang</text>
  <text x="556" y="204" text-anchor="middle" font-size="16" fill="#5F6062">ảnh chụp nhanh CMIS lớn hơn</text>
  <text x="384" y="306" text-anchor="middle" font-size="17" fill="#5F6062">Cả hai đều có cùng một ý tưởng vận hành: host cục bộ, mô-đun cục bộ, đầu xa.</text>

</svg>
