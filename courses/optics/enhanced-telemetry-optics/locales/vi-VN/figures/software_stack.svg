<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 360" role="img" aria-label="Ngăn xếp phần mềm đo từ xa">
  <style>text { font-family: "Open Sans", Arial, Helvetica, sans-serif; letter-spacing: 0; }</style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L9,3 L0,6 Z" fill="#8DC63F"/></marker>
  </defs>
  <rect width="768" height="360" fill="#FFFFFF"/>

  <text x="384" y="44" text-anchor="middle" font-size="24" font-weight="800" fill="#343895">Ngăn xếp phần mềm đo từ xa</text>
  <rect x="64" y="80" width="190" height="150" rx="12" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="159" y="120" text-anchor="middle" font-size="20" font-weight="800" fill="#343895">Bộ thu phát</text>
  <text x="159" y="152" text-anchor="middle" font-size="17" fill="#5F6062">firmware</text>
  <text x="159" y="178" text-anchor="middle" font-size="17" fill="#5F6062">số liệu</text>
  <text x="159" y="204" text-anchor="middle" font-size="17" fill="#5F6062">nhật ký sự kiện</text>
  <line x1="260" y1="155" x2="315" y2="155" stroke="#8DC63F" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="324" y="80" width="190" height="150" rx="12" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="419" y="120" text-anchor="middle" font-size="20" font-weight="800" fill="#343895">Host bộ chuyển mạch</text>
  <text x="419" y="152" text-anchor="middle" font-size="17" fill="#5F6062">phần mềm</text>
  <text x="419" y="178" text-anchor="middle" font-size="17" fill="#5F6062">thăm dò</text>
  <text x="419" y="204" text-anchor="middle" font-size="17" fill="#5F6062">API nhân viên vận hành</text>
  <line x1="520" y1="155" x2="575" y2="155" stroke="#8DC63F" stroke-width="5" marker-end="url(#arrow)"/>
  <rect x="584" y="80" width="130" height="150" rx="12" fill="#F8FAFC" stroke="#343895" stroke-width="3"/>
  <text x="649" y="120" text-anchor="middle" font-size="20" font-weight="800" fill="#343895">Máy chủ</text>
  <text x="649" y="146" text-anchor="middle" font-size="20" font-weight="800" fill="#343895">telemetry</text>
  <text x="649" y="180" text-anchor="middle" font-size="17" fill="#5F6062">bản đồ tình trạng</text>
  <text x="649" y="206" text-anchor="middle" font-size="17" fill="#5F6062">toàn mạng</text>
  <rect x="112" y="270" width="544" height="42" rx="21" fill="#EEF7E6"/>
  <text x="384" y="297" text-anchor="middle" font-size="18" font-weight="700" fill="#343895">Giao diện chung từ dữ liệu mô-đun đến vận hành toàn mạng</text>

</svg>
