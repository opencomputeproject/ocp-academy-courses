<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>反諧振空芯導光</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 1280px;
      height: 720px;
      margin: 0;
      overflow: hidden;
      background: #f7f9fc;
      font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans CJK TC", Arial, sans-serif;
    }
    svg { display: block; width: 1280px; height: 720px; }
    text { letter-spacing: 0; }.eyebrow { font-size: 15px; font-weight: 800; fill: #6fa030; }.label { font-size: 21px; font-weight: 800; fill: #343895; }.note { font-size: 16px; font-weight: 600; fill: #5f6062; }.status { font-size: 23px; font-weight: 800; fill: #1f2937; }
  </style>
</head>
<body>
<svg viewBox="0 0 1280 720" role="img" aria-label="反諧振空芯光纖概念動畫：光集中在由巢狀薄壁玻璃膜包圍的充氣空芯中。">
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#1f2937" flood-opacity="0.14"/>
    </filter>
    <filter id="glow-cyan" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#00a7c4" flood-opacity="0.72"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#8dc63f" flood-opacity="0.56"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="mode-glow">
      <stop offset="0" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.25" stop-color="#80e2f0" stop-opacity="0.98"/>
      <stop offset="0.58" stop-color="#00a7c4" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#00a7c4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="air-core" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#eefbfd"/>
      <stop offset="0.5" stop-color="#dff7fb"/>
      <stop offset="1" stop-color="#eefbfd"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="720" fill="#f7f9fc"/>
  <rect x="34" y="28" width="1212" height="664" rx="22" fill="#ffffff" stroke="#d7dde8" stroke-width="2" filter="url(#shadow)"/>

  <text x="78" y="83" class="eyebrow">概念場分佈</text>
  <text x="78" y="112" class="label">橫截面</text>
  <text x="476" y="112" class="label">縱向剖面</text>

  <g id="longitudinal">
    <rect x="430" y="156" width="760" height="358" rx="42" fill="#f1f4f8" stroke="#a6b0bf" stroke-width="3"/>
    <rect x="458" y="197" width="704" height="72" rx="34" fill="#ffffff" stroke="#b8c1ce" stroke-width="6"/>
    <rect x="480" y="215" width="660" height="36" rx="18" fill="#f7f9fc" stroke="#d3d9e2" stroke-width="4"/>
    <rect x="458" y="401" width="704" height="72" rx="34" fill="#ffffff" stroke="#b8c1ce" stroke-width="6"/>
    <rect x="480" y="419" width="660" height="36" rx="18" fill="#f7f9fc" stroke="#d3d9e2" stroke-width="4"/>
    <rect id="air-core-long" x="456" y="292" width="708" height="86" rx="43" fill="url(#air-core)" stroke="#00a7c4" stroke-width="3"/>
    <path d="M486 335 H1138" fill="none" stroke="#00a7c4" stroke-width="5" stroke-linecap="round" opacity="0.22"/>
    <g id="membrane-highlight" opacity="0">
      <rect x="458" y="197" width="704" height="72" rx="34" fill="none" stroke="#8dc63f" stroke-width="7" filter="url(#glow-green)"/>
      <rect x="458" y="401" width="704" height="72" rx="34" fill="none" stroke="#8dc63f" stroke-width="7" filter="url(#glow-green)"/>
    </g>
    <text x="820" y="226" text-anchor="middle" class="note">巢狀薄壁玻璃膜</text>
    <text x="820" y="326" text-anchor="middle" class="note">充氣空芯</text>
    <text x="820" y="365" text-anchor="middle" class="note">大部分光功率保持在空氣中</text>
    <g id="long-field-overlap" opacity="0">
      <path id="overlap-top" d="M690 322 C690 300 690 288 690 270" fill="none" stroke="#00a7c4" stroke-width="4" stroke-dasharray="7 7"/>
      <path id="overlap-bottom" d="M690 348 C690 370 690 382 690 400" fill="none" stroke="#00a7c4" stroke-width="4" stroke-dasharray="7 7"/>
    </g>
    <g id="long-pulses"></g>
  </g>

  <path d="M360 225 C397 208 414 201 450 207" fill="none" stroke="#8dc63f" stroke-width="3" stroke-dasharray="7 7"/>
  <path d="M365 410 C401 419 417 429 450 440" fill="none" stroke="#8dc63f" stroke-width="3" stroke-dasharray="7 7"/>

  <g id="cross-section" transform="translate(238 333)">
    <circle r="142" fill="#f4f6f9" stroke="#8f9aaa" stroke-width="4" filter="url(#shadow)"/>
    <circle cx="0" cy="-82" r="38" fill="#ffffff" stroke="#b8c1ce" stroke-width="7"/>
    <circle cx="71" cy="-41" r="38" fill="#ffffff" stroke="#b8c1ce" stroke-width="7"/>
    <circle cx="71" cy="41" r="38" fill="#ffffff" stroke="#b8c1ce" stroke-width="7"/>
    <circle cx="0" cy="82" r="38" fill="#ffffff" stroke="#b8c1ce" stroke-width="7"/>
    <circle cx="-71" cy="41" r="38" fill="#ffffff" stroke="#b8c1ce" stroke-width="7"/>
    <circle cx="-71" cy="-41" r="38" fill="#ffffff" stroke="#b8c1ce" stroke-width="7"/>

    <circle cx="0" cy="-96" r="16" fill="#f7f9fc" stroke="#d3d9e2" stroke-width="4"/>
    <circle cx="83" cy="-48" r="16" fill="#f7f9fc" stroke="#d3d9e2" stroke-width="4"/>
    <circle cx="83" cy="48" r="16" fill="#f7f9fc" stroke="#d3d9e2" stroke-width="4"/>
    <circle cx="0" cy="96" r="16" fill="#f7f9fc" stroke="#d3d9e2" stroke-width="4"/>
    <circle cx="-83" cy="48" r="16" fill="#f7f9fc" stroke="#d3d9e2" stroke-width="4"/>
    <circle cx="-83" cy="-48" r="16" fill="#f7f9fc" stroke="#d3d9e2" stroke-width="4"/>

    <circle r="58" fill="#e7f8fb" stroke="#00a7c4" stroke-width="4"/>
    <circle id="mode-core" r="44" fill="url(#mode-glow)"/>
    <circle id="mode-ring" r="50" fill="none" stroke="#00a7c4" stroke-width="4" opacity="0" filter="url(#glow-cyan)"/>

    <g id="field-arms" fill="none" stroke="#00a7c4" stroke-width="4" stroke-dasharray="6 6" opacity="0">
      <path d="M0 -50 L0 -70"/>
      <path d="M43 -25 L61 -35"/>
      <path d="M43 25 L61 35"/>
      <path d="M0 50 L0 70"/>
      <path d="M-43 25 L-61 35"/>
      <path d="M-43 -25 L-61 -35"/>
    </g>

    <g id="cross-membrane-highlight" fill="none" stroke="#8dc63f" stroke-width="7" opacity="0" filter="url(#glow-green)">
      <circle cx="0" cy="-82" r="38"/>
      <circle cx="71" cy="-41" r="38"/>
      <circle cx="71" cy="41" r="38"/>
      <circle cx="0" cy="82" r="38"/>
      <circle cx="-71" cy="41" r="38"/>
      <circle cx="-71" cy="-41" r="38"/>
    </g>
  </g>

  <text x="238" y="503" text-anchor="middle" class="label">空氣芯</text>
  <text x="238" y="529" text-anchor="middle" class="note">由巢狀玻璃管包圍</text>

  <g id="status-band">
    <rect x="212" y="575" width="856" height="76" rx="18" fill="#eefbfd" stroke="#00a7c4" stroke-width="3"/>
    <circle cx="260" cy="613" r="13" fill="#00a7c4"/>
    <text id="status-text" x="650" y="622" text-anchor="middle" class="status">空氣芯由精心設計的玻璃微結構包圍</text>
  </g>
</svg>

<script>
  const duration = 16;
  const pulseGroup = document.getElementById('long-pulses');
  const modeCore = document.getElementById('mode-core');
  const modeRing = document.getElementById('mode-ring');
  const fieldArms = document.getElementById('field-arms');
  const longFieldOverlap = document.getElementById('long-field-overlap');
  const overlapTop = document.getElementById('overlap-top');
  const overlapBottom = document.getElementById('overlap-bottom');
  const membraneHighlight = document.getElementById('membrane-highlight');
  const crossMembraneHighlight = document.getElementById('cross-membrane-highlight');
  const airCoreLong = document.getElementById('air-core-long');
  const statusText = document.getElementById('status-text');
  const statusRect = document.querySelector('#status-band rect');
  const trail = [];

  for (let i = 0; i < 11; i += 1) {
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('r', i === 0? '12': String(Math.max(3, 9 - i * 0.55)));
    circle.setAttribute('fill', i === 0? '#ffffff': '#00a7c4');
    circle.setAttribute('stroke', '#00a7c4');
    circle.setAttribute('stroke-width', i === 0? '5': '1');
    circle.setAttribute('filter', 'url(#glow-cyan)');
    circle.setAttribute('opacity', '0');
    pulseGroup.appendChild(circle);
    trail.push(circle);
  }

  function clamp(value, min = 0, max = 1) {
    return Math.min(max, Math.max(min, value));
  }

  function smoothstep(value) {
    const x = clamp(value);
    return x * x * (3 - 2 * x);
  }

  function windowValue(value, start, end, feather = 0.08) {
    const enter = smoothstep((value - start) / feather);
    const leave = 1 - smoothstep((value - (end - feather)) / feather);
    return clamp(Math.min(enter, leave));
  }

  function setStatus(t) {
    let message = '空氣芯由精心設計的玻璃微結構包圍';
    if (t >= 1.2 && t < 4.6) message = '光進入空芯空氣區域';
    else if (t >= 4.6 && t < 8.0) message = '有效波長僅與玻璃發生弱相互作用';
    else if (t >= 8.0 && t < 11.6) message = '反諧振膜抑制光耦合進入包層';
    else if (t >= 11.6 && t < 14.6) message = '導模持續集中在空氣中';
    statusText.textContent = message;
    const active = t < 1.2 || t > 14.8? 0: Math.sin(Math.PI * clamp((t - 1.2) / 13.6));
    statusRect.setAttribute('fill', active > 0.3? '#e3f8fb': '#eefbfd');
  }

  window.renderAt = function renderAt(rawTime) {
    const t = ((rawTime % duration) + duration) % duration;
    const movement = clamp((t - 1.2) / 12.9);
    const progress = smoothstep(movement);
    let opacity = smoothstep((t - 0.8) / 0.6);
    if (t > 14.35) opacity *= 1 - smoothstep((t - 14.35) / 0.65);

    const x = 490 + progress * 638;
    const y = 335;
    trail.forEach((circle, index) => {
      const px = x - index * 12;
      if (px < 482 || opacity <= 0.001) {
        circle.setAttribute('opacity', '0');
        return;
      }
      circle.setAttribute('cx', String(px));
      circle.setAttribute('cy', String(y));
      circle.setAttribute('opacity', String(opacity * Math.max(0.08, 1 - index * 0.085)));
    });

    const interaction = windowValue(progress, 0.25, 0.68, 0.12);
    const confinement = windowValue(progress, 0.42, 0.94, 0.12);
    const breathe = 0.55 + 0.45 * Math.sin(t * Math.PI * 1.3) ** 2;
    modeCore.setAttribute('r', String(42 + 6 * breathe));
    modeRing.setAttribute('r', String(48 + 8 * breathe));
    modeRing.setAttribute('opacity', String(opacity * (0.25 + 0.55 * confinement)));
    fieldArms.setAttribute('opacity', String(interaction * 0.34));
    longFieldOverlap.setAttribute('opacity', String(interaction * 0.38));
    membraneHighlight.setAttribute('opacity', String(confinement * 0.72));
    crossMembraneHighlight.setAttribute('opacity', String(confinement * 0.72));
    airCoreLong.setAttribute('stroke-width', String(3 + confinement * 2));
    airCoreLong.style.filter = confinement > 0.18? 'url(#glow-cyan)': '';

    overlapTop.setAttribute('d', `M${x} 322 C${x} 300 ${x} 288 ${x} 270`);
    overlapBottom.setAttribute('d', `M${x} 348 C${x} 370 ${x} 382 ${x} 400`);
    setStatus(t);
  };

  window.renderAt(0);
</script>
</body>
</html>
