<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 880" role="img" aria-labelledby="fig-title fig-desc">
  <title id="fig-title">Single-core fiber versus multicore fiber</title>
  <desc id="fig-desc">Cross-section and side-view comparison of single-core fiber and four-core multicore fiber.</desc>

  <defs>
    <pattern id="coatHatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(40)">
      <rect width="6" height="6" fill="#D8F0A8"/>
      <line x1="0" y1="0" x2="0" y2="6" stroke="#8DC63F" stroke-width="2"/>
    </pattern>
    <linearGradient id="cladFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FC"/>
      <stop offset="100%" stop-color="#A8D0EE"/>
    </linearGradient>
    <linearGradient id="coreFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE58A"/>
      <stop offset="100%" stop-color="#E0A820"/>
    </linearGradient>
    <filter id="cardShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3.5" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrRed" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 1.5 L9 5 L0 8.5 Z" fill="#D32F2F"/>
    </marker>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="0" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 1.5 L9 5 L0 8.5 Z" fill="#1565C0"/>
    </marker>
  </defs>

  <rect width="1000" height="880" fill="#EEF1F4"/>

  <!-- ========== SCF ========== -->
  <text x="32" y="30" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#5B3F96">SCF</text>
  <text x="88" y="30" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#5F6062">Single-core fiber — one optical path</text>
  <rect x="32" y="36" width="40" height="4" rx="2" fill="#8DC63F"/>

  <g filter="url(#cardShadow)">
    <rect x="20" y="48" width="960" height="360" rx="16" fill="#FFFFFF" stroke="#7B68A6" stroke-width="2"/>
  </g>

  <!-- SCF cross-section: concentric circles (true layer stack) -->
  <!-- Center at (280, 220). Coating r=100, cladding r=62, core r=14 -->
  <g>
    <text x="280" y="88" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#5F6062">Cross-section</text>

    <!-- Coating (outer) -->
    <circle cx="280" cy="220" r="100" fill="url(#coatHatch)" stroke="#6FA030" stroke-width="1.8"/>
    <!-- Cladding (middle) — fully inside coating -->
    <circle cx="280" cy="220" r="62" fill="url(#cladFill)" stroke="#5A9BC8" stroke-width="1.8"/>
    <!-- Core (center) — fully inside cladding -->
    <circle cx="280" cy="220" r="14" fill="url(#coreFill)" stroke="#C49210" stroke-width="1.2"/>

    <!-- Dimension: coating OD (left of disk) -->
    <g stroke="#3D5A80" fill="#3D5A80" font-family="Helvetica, Arial, sans-serif">
      <line x1="150" y1="120" x2="150" y2="320" stroke-width="1.4"/>
      <line x1="142" y1="120" x2="158" y2="120" stroke-width="1.4"/>
      <line x1="142" y1="320" x2="158" y2="320" stroke-width="1.4"/>
      <!-- tick to coating rim -->
      <line x1="150" y1="120" x2="180" y2="120" stroke-width="1" stroke-dasharray="3 2"/>
      <line x1="150" y1="320" x2="180" y2="320" stroke-width="1" stroke-dasharray="3 2"/>
      <text x="136" y="228" text-anchor="middle" font-size="12" font-weight="700" transform="rotate(-90 136 228)">250 μm</text>
      <text x="120" y="228" text-anchor="middle" font-size="11" transform="rotate(-90 120 228)">coating OD</text>
    </g>

    <!-- Dimension: cladding OD (label stays left of the fiber disk) -->
    <g stroke="#3D5A80" fill="#3D5A80" font-family="Helvetica, Arial, sans-serif">
      <line x1="178" y1="158" x2="178" y2="282" stroke-width="1.3"/>
      <line x1="170" y1="158" x2="186" y2="158" stroke-width="1.3"/>
      <line x1="170" y1="282" x2="186" y2="282" stroke-width="1.3"/>
      <line x1="178" y1="158" x2="218" y2="158" stroke-width="1" stroke-dasharray="3 2"/>
      <line x1="178" y1="282" x2="218" y2="282" stroke-width="1" stroke-dasharray="3 2"/>
      <text x="164" y="228" text-anchor="middle" font-size="12" font-weight="700" transform="rotate(-90 164 228)">125 μm cladding OD</text>
    </g>

    <!-- Layer callouts: leaders to correct rings only -->
    <g font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700">
      <!-- Coating: outer ring at bottom -->
      <line x1="280" y1="320" x2="280" y2="360" stroke="#4A7A18" stroke-width="1.6"/>
      <line x1="280" y1="360" x2="230" y2="360" stroke="#4A7A18" stroke-width="1.6"/>
      <circle cx="280" cy="320" r="3" fill="#4A7A18"/>
      <text x="224" y="364" text-anchor="end" fill="#4A7A18">Coating</text>

      <!-- Cladding: cladding rim at lower-right (on r=62 circle, not outer) -->
      <!-- point on cladding circle at ~40° below right: 280+62*cos(40°), 220+62*sin(40°) ≈ 327, 260 -->
      <line x1="327" y1="260" x2="360" y2="300" stroke="#1E5A96" stroke-width="1.6"/>
      <line x1="360" y1="300" x2="360" y2="360" stroke="#1E5A96" stroke-width="1.6"/>
      <circle cx="327" cy="260" r="3" fill="#1E5A96"/>
      <text x="360" y="378" text-anchor="middle" fill="#1E5A96">Cladding</text>

      <!-- Core: top of core circle -->
      <line x1="280" y1="206" x2="280" y2="170" stroke="#8A6A00" stroke-width="1.6"/>
      <line x1="280" y1="170" x2="330" y2="170" stroke="#8A6A00" stroke-width="1.6"/>
      <circle cx="280" cy="206" r="3" fill="#8A6A00"/>
      <text x="336" y="174" fill="#8A6A00">Core</text>
    </g>
  </g>

  <!-- SCF side view -->
  <g transform="translate(520, 100)">
    <text x="160" y="0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#5F6062">Side view — guided light path</text>

    <!-- coating shell -->
    <rect x="20" y="40" width="300" height="160" rx="12" fill="url(#coatHatch)" stroke="#6FA030" stroke-width="1.5"/>
    <!-- cladding shell (inset) -->
    <rect x="34" y="62" width="272" height="116" rx="8" fill="url(#cladFill)" stroke="#5A9BC8" stroke-width="1.4"/>
    <!-- single core on axis -->
    <rect x="34" y="108" width="272" height="24" rx="3" fill="url(#coreFill)" stroke="#C49210" stroke-width="1"/>
    <!-- light -->
    <line x1="50" y1="120" x2="280" y2="120" stroke="#D32F2F" stroke-width="3" marker-end="url(#arrRed)"/>

    <!-- tiny legend under side view -->
    <g font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#5F6062">
      <rect x="40" y="220" width="14" height="10" rx="2" fill="url(#coatHatch)" stroke="#6FA030"/>
      <text x="58" y="229">Coating</text>
      <rect x="120" y="220" width="14" height="10" rx="2" fill="url(#cladFill)" stroke="#5A9BC8"/>
      <text x="138" y="229">Cladding</text>
      <rect x="210" y="220" width="14" height="10" rx="2" fill="url(#coreFill)" stroke="#C49210"/>
      <text x="228" y="229">Core</text>
    </g>
  </g>

  <!-- ========== MCF ========== -->
  <text x="32" y="450" font-family="Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#5B3F96">MCF</text>
  <text x="92" y="450" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#5F6062">Multicore fiber — space-division multiplexing</text>
  <rect x="32" y="456" width="40" height="4" rx="2" fill="#8DC63F"/>

  <g filter="url(#cardShadow)">
    <rect x="20" y="468" width="960" height="340" rx="16" fill="#FFFFFF" stroke="#7B68A6" stroke-width="2"/>
  </g>

  <!-- MCF cross-section: same outer geometry, 4 cores inside cladding -->
  <!-- Center (280, 630). Coating r=100, cladding r=62, cores r=11 at offset 28 from center -->
  <g>
    <text x="280" y="500" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#5F6062">Cross-section</text>

    <circle cx="280" cy="630" r="100" fill="url(#coatHatch)" stroke="#6FA030" stroke-width="1.8"/>
    <circle cx="280" cy="630" r="62" fill="url(#cladFill)" stroke="#5A9BC8" stroke-width="1.8"/>

    <!-- Four cores, square lattice, all fully inside cladding (cladding r=62, core center offset 26 + core r 11 = 37 < 62) -->
    <circle cx="254" cy="604" r="11" fill="url(#coreFill)" stroke="#C49210" stroke-width="1.1"/>
    <circle cx="306" cy="604" r="11" fill="url(#coreFill)" stroke="#C49210" stroke-width="1.1"/>
    <circle cx="254" cy="656" r="11" fill="url(#coreFill)" stroke="#C49210" stroke-width="1.1"/>
    <circle cx="306" cy="656" r="11" fill="url(#coreFill)" stroke="#C49210" stroke-width="1.1"/>

    <!-- Callouts -->
    <g font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700">
      <!-- Coating outer bottom -->
      <line x1="280" y1="730" x2="280" y2="770" stroke="#4A7A18" stroke-width="1.6"/>
      <line x1="280" y1="770" x2="230" y2="770" stroke="#4A7A18" stroke-width="1.6"/>
      <circle cx="280" cy="730" r="3" fill="#4A7A18"/>
      <text x="224" y="774" text-anchor="end" fill="#4A7A18">Coating</text>

      <!-- Cladding rim -->
      <line x1="327" y1="670" x2="360" y2="710" stroke="#1E5A96" stroke-width="1.6"/>
      <line x1="360" y1="710" x2="360" y2="770" stroke="#1E5A96" stroke-width="1.6"/>
      <circle cx="327" cy="670" r="3" fill="#1E5A96"/>
      <text x="360" y="788" text-anchor="middle" fill="#1E5A96">Cladding</text>

      <!-- Cores cluster -->
      <line x1="306" y1="604" x2="360" y2="560" stroke="#8A6A00" stroke-width="1.6"/>
      <line x1="360" y1="560" x2="400" y2="560" stroke="#8A6A00" stroke-width="1.6"/>
      <circle cx="306" cy="604" r="3" fill="#8A6A00"/>
      <text x="408" y="564" fill="#8A6A00">4 cores</text>
    </g>
  </g>

  <!-- MCF side view: four stacked cores in shared cladding/coating -->
  <g transform="translate(520, 510)">
    <text x="160" y="0" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#5F6062">Side view — parallel light paths</text>

    <rect x="20" y="20" width="300" height="200" rx="12" fill="url(#coatHatch)" stroke="#6FA030" stroke-width="1.5"/>
    <rect x="34" y="36" width="272" height="168" rx="8" fill="url(#cladFill)" stroke="#5A9BC8" stroke-width="1.4"/>

    <!-- four cores, evenly spaced inside cladding -->
    <rect x="34" y="52" width="272" height="16" rx="2" fill="url(#coreFill)" stroke="#C49210" stroke-width="0.8"/>
    <rect x="34" y="92" width="272" height="16" rx="2" fill="url(#coreFill)" stroke="#C49210" stroke-width="0.8"/>
    <rect x="34" y="132" width="272" height="16" rx="2" fill="url(#coreFill)" stroke="#C49210" stroke-width="0.8"/>
    <rect x="34" y="172" width="272" height="16" rx="2" fill="url(#coreFill)" stroke="#C49210" stroke-width="0.8"/>

    <line x1="50" y1="60" x2="280" y2="60" stroke="#1565C0" stroke-width="2.4" marker-end="url(#arrBlue)"/>
    <line x1="50" y1="100" x2="280" y2="100" stroke="#D32F2F" stroke-width="2.4" marker-end="url(#arrRed)"/>
    <line x1="50" y1="140" x2="280" y2="140" stroke="#1565C0" stroke-width="2.4" marker-end="url(#arrBlue)"/>
    <line x1="50" y1="180" x2="280" y2="180" stroke="#D32F2F" stroke-width="2.4" marker-end="url(#arrRed)"/>
  </g>

  <!-- Caption -->
  <rect x="20" y="826" width="960" height="42" rx="10" fill="#FFFFFF" stroke="#D0D5DB" stroke-width="1"/>
  <text x="40" y="846" font-family="Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#2C2C2E">Multiple cores in a common cladding</text>
  <text x="40" y="862" font-family="Helvetica, Arial, sans-serif" font-size="12.5" fill="#5F6062">Same outer outline · higher path density · space-division multiplexing (SDM)</text>
</svg>
