<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-label="Hard water ions, scale and microchannel risk">
  <style>.title{font:700 30px Open Sans,Arial;fill:#333}.h{font:700 22px Open Sans,Arial;fill:#333}.body{font:600 17px Open Sans,Arial;fill:#5F6062}.box{fill:#fff;stroke:#d1d5db;stroke-width:3;rx:18}.arrowLine{fill:none;stroke:#8DC63F;stroke-width:8;stroke-linecap:round}.arrowHead{fill:#8DC63F}.particle{fill:#343895}.scale{fill:#8DC63F}</style>
  <text x="500" y="42" text-anchor="middle" class="title">Impurities can become an availability problem</text>
  <rect x="55" y="130" width="210" height="190" class="box"/><text x="160" y="185" text-anchor="middle" class="h">Ca and Mg</text><text x="160" y="218" text-anchor="middle" class="body">from water quality</text><text x="160" y="246" text-anchor="middle" class="body">or hose fillers</text>
  <path d="M282 225 H358" class="arrowLine"/>
  <polygon points="390,225 358,207 358,243" class="arrowHead"/>
  <rect x="400" y="130" width="210" height="190" class="box"/><text x="505" y="185" text-anchor="middle" class="h">Precipitate</text><text x="505" y="218" text-anchor="middle" class="body">scale or deposits</text><circle cx="470" cy="260" r="10" class="particle"/><circle cx="505" cy="270" r="13" class="scale"/><circle cx="545" cy="255" r="9" class="particle"/>
  <path d="M627 225 H703" class="arrowLine"/>
  <polygon points="735,225 703,207 703,243" class="arrowHead"/>
  <rect x="745" y="130" width="210" height="190" class="box"/><text x="850" y="185" text-anchor="middle" class="h">Microchannels</text><text x="850" y="218" text-anchor="middle" class="body">filter loading</text><text x="850" y="246" text-anchor="middle" class="body">thermal degradation</text>
  <text x="500" y="405" text-anchor="middle" class="body">Hard-water stability and filtration are practical uptime controls.</text>
</svg>
