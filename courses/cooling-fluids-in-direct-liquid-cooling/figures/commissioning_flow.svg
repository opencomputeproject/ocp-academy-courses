<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-label="New system cleaning and filling sequence">
  <style>.title{font:700 30px Open Sans,Arial;fill:#333}.h{font:700 21px Open Sans,Arial;fill:#333}.body{font:600 16px Open Sans,Arial;fill:#5F6062}.step{fill:#fff;stroke:#d1d5db;stroke-width:3;rx:16}.num{fill:#8DC63F}.numt{font:800 20px Open Sans,Arial;fill:#fff}.arrowLine{fill:none;stroke:#8DC63F;stroke-width:7;stroke-linecap:round}.arrowHead{fill:#8DC63F}</style>
  <text x="500" y="42" text-anchor="middle" class="title">New-system fill protects cold plates from construction debris</text>
  <g transform="translate(40 120)"><rect width="160" height="210" class="step"/><circle cx="80" cy="42" r="24" class="num"/><text x="80" y="49" text-anchor="middle" class="numt">1</text><text x="80" y="90" text-anchor="middle" class="h">Filter in</text><text x="80" y="120" text-anchor="middle" class="body">install new</text><text x="80" y="146" text-anchor="middle" class="body">inline filters</text></g>
  <path d="M212 225 H246" class="arrowLine"/>
  <polygon points="270,225 246,211 246,239" class="arrowHead"/>
  <g transform="translate(285 120)"><rect width="160" height="210" class="step"/><circle cx="80" cy="42" r="24" class="num"/><text x="80" y="49" text-anchor="middle" class="numt">2</text><text x="80" y="90" text-anchor="middle" class="h">Flush</text><text x="80" y="120" text-anchor="middle" class="body">clean water</text><text x="80" y="146" text-anchor="middle" class="body">cold plates isolated</text></g>
  <path d="M457 225 H491" class="arrowLine"/>
  <polygon points="515,225 491,211 491,239" class="arrowHead"/>
  <g transform="translate(530 120)"><rect width="160" height="210" class="step"/><circle cx="80" cy="42" r="24" class="num"/><text x="80" y="49" text-anchor="middle" class="numt">3</text><text x="80" y="90" text-anchor="middle" class="h">Repeat</text><text x="80" y="120" text-anchor="middle" class="body">cold plates</text><text x="80" y="146" text-anchor="middle" class="body">connected</text></g>
  <path d="M702 225 H736" class="arrowLine"/>
  <polygon points="760,225 736,211 736,239" class="arrowHead"/>
  <g transform="translate(775 120)"><rect width="180" height="210" class="step"/><circle cx="90" cy="42" r="24" class="num"/><text x="90" y="49" text-anchor="middle" class="numt">4</text><text x="90" y="90" text-anchor="middle" class="h">Fill and sample</text><text x="90" y="120" text-anchor="middle" class="body">final fluid</text><text x="90" y="146" text-anchor="middle" class="body">baseline record</text></g>
  <text x="500" y="430" text-anchor="middle" class="body">The sequence is simple. The discipline is in cleanliness, compatibility, and records.</text>
</svg>
