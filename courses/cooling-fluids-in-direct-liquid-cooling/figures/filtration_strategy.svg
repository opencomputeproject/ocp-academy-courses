<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 510" role="img" aria-label="Inline and sidestream filtration strategy">
  <style>.title{font:700 30px Open Sans,Arial;fill:#333}.h{font:700 22px Open Sans,Arial;fill:#333}.body{font:600 17px Open Sans,Arial;fill:#5F6062}.box{fill:#fff;stroke:#d1d5db;stroke-width:3;rx:18}.green{stroke:#8DC63F;stroke-width:6}.flow{fill:none;stroke:#8DC63F;stroke-width:10;stroke-linecap:round}.mesh{fill:#f3f4f6;stroke:#5F6062;stroke-width:2}.pipe{fill:#f8fafc;stroke:#5F6062;stroke-width:3}.filterBody{fill:#eaf7d9;stroke:#8DC63F;stroke-width:4}.filterEnd{fill:#fff;stroke:#8DC63F;stroke-width:4}.hole{fill:#5F6062}</style>
  <text x="500" y="42" text-anchor="middle" class="title">Use filters where they are serviceable, not inside the cold plate</text>
  <rect x="80" y="120" width="250" height="240" class="box green"/><text x="205" y="170" text-anchor="middle" class="h">Inline mesh</text><g aria-label="Perforated cylindrical filter inserted into a pipe"><rect x="132" y="230" width="146" height="42" rx="21" class="pipe"/><ellipse cx="132" cy="251" rx="12" ry="21" fill="#fff" stroke="#5F6062" stroke-width="3"/><rect x="158" y="218" width="92" height="66" rx="10" class="filterBody"/><ellipse cx="158" cy="251" rx="12" ry="33" class="filterEnd"/><ellipse cx="250" cy="251" rx="12" ry="33" fill="#d7efb8" stroke="#8DC63F" stroke-width="4"/><circle cx="180" cy="236" r="3.5" class="hole"/><circle cx="200" cy="236" r="3.5" class="hole"/><circle cx="220" cy="236" r="3.5" class="hole"/><circle cx="190" cy="251" r="3.5" class="hole"/><circle cx="210" cy="251" r="3.5" class="hole"/><circle cx="230" cy="251" r="3.5" class="hole"/><circle cx="180" cy="266" r="3.5" class="hole"/><circle cx="200" cy="266" r="3.5" class="hole"/><circle cx="220" cy="266" r="3.5" class="hole"/></g><text x="205" y="326" text-anchor="middle" class="body">25 to 75 um context</text>
  <path d="M330 240 H670" class="flow"/>
  <rect x="670" y="120" width="250" height="240" class="box green"/><text x="795" y="170" text-anchor="middle" class="h">Sidestream</text><rect x="735" y="210" width="120" height="80" class="mesh"/><circle cx="770" cy="250" r="18" fill="#8DC63F"/><circle cx="820" cy="250" r="10" fill="#343895"/><text x="795" y="326" text-anchor="middle" class="body">below 5 um recommended</text>
  <text x="500" y="430" text-anchor="middle" class="body">Project Deschutes example: four 25 um inline filters and one 0.2 um sidestream filter.</text>
</svg>
