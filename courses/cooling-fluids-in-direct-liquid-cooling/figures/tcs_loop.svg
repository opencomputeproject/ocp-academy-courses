<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" role="img" aria-label="Technology Cooling System loop between CDU and cold plates">
  <style>
    .title{font:700 28px Open Sans,Arial,sans-serif;fill:#222}
    .label{font:700 23px Open Sans,Arial,sans-serif;fill:#222}
    .small{font:600 17px Open Sans,Arial,sans-serif;fill:#5f6062}
    .tiny{font:600 15px Open Sans,Arial,sans-serif;fill:#5f6062}
    .box{fill:#fff;stroke:#5f6062;stroke-width:3}
    .soft{fill:#f8fafc;stroke:#cbd5e1;stroke-width:2}
    .scope{fill:#f6fbef;stroke:#8dc63f;stroke-width:4;stroke-dasharray:12 10}
    .flow{fill:none;stroke:#8dc63f;stroke-width:10;stroke-linecap:butt;stroke-linejoin:round}
    .return{fill:none;stroke:#8dc63f;stroke-width:8;stroke-linecap:butt;stroke-linejoin:round}
    .fwsLine{fill:none;stroke:#343895;stroke-width:7;stroke-linecap:round;stroke-dasharray:12 10}
    .greenText{font:700 18px Open Sans,Arial,sans-serif;fill:#4d7f18}
    .blueText{font:700 18px Open Sans,Arial,sans-serif;fill:#343895}
    .arrowGreen{fill:#8dc63f}
  </style>

  <text x="500" y="38" text-anchor="middle" class="title">Single-phase DLC guidance applies to the TCS loop</text>

  <rect x="50" y="70" width="900" height="360" rx="24" class="scope"/>
  <text x="80" y="105" class="greenText">Technology Cooling System (TCS): closed secondary loop</text>

  <rect x="95" y="175" width="210" height="150" rx="18" class="box"/>
  <text x="200" y="224" text-anchor="middle" class="label">CDU</text>
  <text x="200" y="256" text-anchor="middle" class="small">heat exchanger</text>
  <text x="200" y="282" text-anchor="middle" class="small">pumps, filters</text>

  <rect x="395" y="150" width="220" height="200" rx="18" class="box"/>
  <text x="505" y="202" text-anchor="middle" class="label">Rack Manifold</text>
  <text x="505" y="235" text-anchor="middle" class="small">supply / return</text>
  <text x="505" y="261" text-anchor="middle" class="small">QDs, hoses</text>
  <text x="505" y="287" text-anchor="middle" class="small">sensors</text>

  <rect x="725" y="120" width="190" height="260" rx="18" class="box"/>
  <text x="820" y="169" text-anchor="middle" class="label">IT Tray</text>
  <rect x="765" y="205" width="110" height="48" rx="10" class="soft"/>
  <text x="820" y="235" text-anchor="middle" class="tiny">cold plate</text>
  <rect x="765" y="275" width="110" height="48" rx="10" class="soft"/>
  <text x="820" y="305" text-anchor="middle" class="tiny">cold plate</text>

  <line x1="305" y1="220" x2="371" y2="220" class="flow"/>
  <polygon points="395,220 371,207 371,233" class="arrowGreen"/>
  <text x="342" y="200" text-anchor="middle" class="tiny">supply</text>

  <line x1="615" y1="220" x2="701" y2="220" class="flow"/>
  <polygon points="725,220 701,207 701,233" class="arrowGreen"/>
  <text x="675" y="200" text-anchor="middle" class="tiny">to cold plates</text>

  <line x1="725" y1="320" x2="639" y2="320" class="return"/>
  <polygon points="615,320 639,307 639,333" class="arrowGreen"/>
  <text x="678" y="346" text-anchor="middle" class="tiny">return</text>

  <line x1="395" y1="320" x2="329" y2="320" class="return"/>
  <polygon points="305,320 329,307 329,333" class="arrowGreen"/>
  <text x="358" y="346" text-anchor="middle" class="tiny">return</text>

  <line x1="160" y1="325" x2="160" y2="450" class="fwsLine"/>
  <line x1="240" y1="325" x2="240" y2="450" class="fwsLine"/>
  <rect x="80" y="450" width="300" height="78" rx="18" class="soft"/>
  <text x="230" y="481" text-anchor="middle" class="blueText">Facility Water System (FWS)</text>
  <text x="230" y="507" text-anchor="middle" class="small">outside this fluid guidance</text>

  <text x="650" y="470" text-anchor="middle" class="small">Course focus: TCS fluid identity, chemistry,</text>
  <text x="650" y="497" text-anchor="middle" class="small">compatibility, monitoring, and maintenance</text>
</svg>
