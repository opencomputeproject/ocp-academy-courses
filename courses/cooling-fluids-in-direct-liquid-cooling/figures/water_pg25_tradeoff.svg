<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-label="Tradeoffs between treated water and PG25">
  <style>.title{font:700 30px Open Sans,Arial;fill:#333}.h{font:700 24px Open Sans,Arial;fill:#333}.body{font:600 18px Open Sans,Arial;fill:#5F6062}.box{fill:#fff;stroke:#d1d5db;stroke-width:3;rx:18}.green{stroke:#8DC63F;stroke-width:6}.bar{fill:#8DC63F}.bar2{fill:#343895}</style>
  <text x="500" y="44" text-anchor="middle" class="title">Water and PG25 solve different operating problems</text>
  <rect x="80" y="105" width="390" height="330" class="box green"/>
  <text x="275" y="155" text-anchor="middle" class="h">Treated water</text>
  <rect x="170" y="210" width="210" height="28" rx="14" class="bar"/><text x="170" y="198" text-anchor="start" class="body">Thermal performance</text>
  <rect x="170" y="290" width="130" height="28" rx="14" class="bar2"/><text x="170" y="278" text-anchor="start" class="body">Biostatic margin</text>
  <text x="275" y="365" text-anchor="middle" class="body">More water chemistry attention</text>
  <rect x="530" y="105" width="390" height="330" class="box green"/>
  <text x="725" y="155" text-anchor="middle" class="h">PG25</text>
  <rect x="620" y="210" width="160" height="28" rx="14" class="bar"/><text x="620" y="198" text-anchor="start" class="body">Thermal performance</text>
  <rect x="620" y="290" width="220" height="28" rx="14" class="bar2"/><text x="620" y="278" text-anchor="start" class="body">Biostatic margin</text>
  <text x="725" y="365" text-anchor="middle" class="body">Maintain concentration at or above 25%</text>
</svg>
