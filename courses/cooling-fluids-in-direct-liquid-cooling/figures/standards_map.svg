  <rect x="700" y="95" width="230" height="105" class="node"/><text x="815" y="140" text-anchor="middle" class="h">ASTM</text><text x="815" y="170" text-anchor="middle" class="body">test methods</text>
  <rect x="700" y="305" width="230" height="105" class="node"/><text x="815" y="350" text-anchor="middle" class="h">Supplier Plan</text><text x="815" y="380" text-anchor="middle" class="body">local treatment detail</text>
  <path d="M300 150 L390 220" class="line"/><path d="M300 360 L390 270" class="line"/><path d="M700 150 L610 220" class="line"/><path d="M700 360 L610 270" class="line"/>
