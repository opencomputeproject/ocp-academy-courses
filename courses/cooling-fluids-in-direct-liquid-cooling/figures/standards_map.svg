  <style>.title{font:700 30px Open Sans,Arial;fill:#333}.h{font:700 23px Open Sans,Arial;fill:#333}.body{font:600 17px Open Sans,Arial;fill:#5F6062}.node{fill:#fff;stroke:#d1d5db;stroke-width:3;rx:18}.core{stroke:#8DC63F;stroke-width:6}.line{stroke:#8DC63F;stroke-width:5;stroke-linecap:round}</style>
