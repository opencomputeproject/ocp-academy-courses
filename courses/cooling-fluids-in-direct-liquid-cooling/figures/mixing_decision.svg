<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" role="img" aria-label="Fluid mixing decision logic">
  <style>
    .title{font:700 30px Open Sans,Arial,sans-serif;fill:#333}
    .h{font:700 21px Open Sans,Arial,sans-serif;fill:#333}
    .body{font:600 16px Open Sans,Arial,sans-serif;fill:#5f6062}
    .small{font:600 15px Open Sans,Arial,sans-serif;fill:#5f6062}
    .box{fill:#fff;stroke:#d1d5db;stroke-width:3}
    .warn{stroke:#343895;stroke-width:5}
    .green{stroke:#8dc63f;stroke-width:6}
    .arrowLine{fill:none;stroke:#8dc63f;stroke-width:7;stroke-linecap:round}
    .arrowHead{fill:#8dc63f}
  </style>

  <rect width="1000" height="540" fill="#fff"/>
  <text x="500" y="44" text-anchor="middle" class="title">Mixing is an operational event, not a category rule</text>

  <rect x="45" y="112" width="280" height="250" rx="18" class="box warn"/>
  <text x="185" y="176" text-anchor="middle" class="h">Can it be avoided?</text>
  <text x="185" y="230" text-anchor="middle" class="body">flush residue</text>
  <text x="185" y="259" text-anchor="middle" class="body">top-off</text>
  <text x="185" y="288" text-anchor="middle" class="body">operator error</text>

  <path d="M338 237 H357" class="arrowLine"/>
  <polygon points="378,237 357,225 357,249" class="arrowHead"/>

  <rect x="380" y="112" width="280" height="250" rx="18" class="box green"/>
  <text x="520" y="164" text-anchor="middle" class="h">Evaluate fluid</text>
  <text x="520" y="191" text-anchor="middle" class="h">by fluid</text>
  <text x="520" y="238" text-anchor="middle" class="body">storage stability</text>
  <text x="520" y="267" text-anchor="middle" class="body">corrosion testing</text>
  <text x="520" y="296" text-anchor="middle" class="body">supplier guidance</text>

  <path d="M673 237 H692" class="arrowLine"/>
  <polygon points="713,237 692,225 692,249" class="arrowHead"/>

  <rect x="715" y="112" width="240" height="250" rx="18" class="box warn"/>
  <text x="835" y="164" text-anchor="middle" class="h">Reset monitoring</text>
  <text x="835" y="191" text-anchor="middle" class="h">plan</text>
  <text x="835" y="238" text-anchor="middle" class="small">baseline changes</text>
  <text x="835" y="267" text-anchor="middle" class="small">inhibitor targets shift</text>
  <text x="835" y="296" text-anchor="middle" class="small">corrections get harder</text>

  <text x="500" y="440" text-anchor="middle" class="body">Do not say OAT plus OAT is always safe, or IAT plus OAT is always unsafe.</text>
</svg>
