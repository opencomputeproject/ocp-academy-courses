<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-label="Fluid health monitoring framework">
  <style>.title{font:700 30px Open Sans,Arial;fill:#333}.h{font:700 23px Open Sans,Arial;fill:#333}.body{font:600 17px Open Sans,Arial;fill:#5F6062}.box{fill:#fff;stroke:#d1d5db;stroke-width:3;rx:18}.green{stroke:#8DC63F;stroke-width:6}.blue{stroke:#343895;stroke-width:5}.line{stroke:#8DC63F;stroke-width:5;stroke-linecap:round}</style>
  <text x="500" y="42" text-anchor="middle" class="title">Separate system health from fluid health</text>
  <rect x="90" y="120" width="360" height="300" class="box green"/>
  <text x="270" y="170" text-anchor="middle" class="h">System health signals</text>
  <text x="270" y="220" text-anchor="middle" class="body">Cu, Fe, Zn and other metals</text>
  <text x="270" y="260" text-anchor="middle" class="body">Ca, Mg, sulfate, silicon</text>
  <text x="270" y="300" text-anchor="middle" class="body">turbidity and filter loading</text>
  <text x="270" y="340" text-anchor="middle" class="body">thermal performance drift</text>
  <rect x="550" y="120" width="360" height="300" class="box blue"/>
  <text x="730" y="170" text-anchor="middle" class="h">Fluid health signals</text>
  <text x="730" y="220" text-anchor="middle" class="body">inhibitor levels and azoles</text>
  <text x="730" y="260" text-anchor="middle" class="body">pH, conductivity and TDS</text>
  <text x="730" y="300" text-anchor="middle" class="body">glycol degradation products</text>
  <text x="730" y="340" text-anchor="middle" class="body">PG concentration when applicable</text>
  <text x="500" y="470" text-anchor="middle" class="body">Good decisions come from trends against a clean baseline, not one isolated reading.</text>
</svg>
