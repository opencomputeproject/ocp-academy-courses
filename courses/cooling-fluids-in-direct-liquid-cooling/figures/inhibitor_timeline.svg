<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" role="img" aria-label="Coolant inhibitor chemistry timeline">
  <style>
    .title{font:700 30px Open Sans,Arial,sans-serif;fill:#333}
    .label{font:700 24px Open Sans,Arial,sans-serif;fill:#343895}
    .body{font:600 16px Open Sans,Arial,sans-serif;fill:#5f6062}
    .line{stroke:#8dc63f;stroke-width:10;stroke-linecap:round}
    .connector{stroke:#9ca3af;stroke-width:3;stroke-linecap:round;stroke-dasharray:5 7}
    .dot{fill:#fff;stroke:#8dc63f;stroke-width:8}
    .dotCore{fill:#8dc63f}
    .card{fill:#fff;stroke:#d1d5db;stroke-width:3}
  </style>

  <rect width="1000" height="500" fill="#fff"/>
  <text x="500" y="44" text-anchor="middle" class="title">Inhibitor chemistry changed to extend life and compatibility</text>

  <path d="M110 250 H890" class="line"/>

  <line x1="150" y1="250" x2="150" y2="312" class="connector"/>
  <line x1="380" y1="250" x2="380" y2="190" class="connector"/>
  <line x1="620" y1="250" x2="620" y2="312" class="connector"/>
  <line x1="850" y1="250" x2="850" y2="190" class="connector"/>

  <circle cx="150" cy="250" r="22" class="dot"/>
  <circle cx="150" cy="250" r="8" class="dotCore"/>
  <circle cx="380" cy="250" r="22" class="dot"/>
  <circle cx="380" cy="250" r="8" class="dotCore"/>
  <circle cx="620" cy="250" r="22" class="dot"/>
  <circle cx="620" cy="250" r="8" class="dotCore"/>
  <circle cx="850" cy="250" r="22" class="dot"/>
  <circle cx="850" cy="250" r="8" class="dotCore"/>

  <rect x="40" y="320" width="220" height="112" rx="16" class="card"/>
  <text x="150" y="356" text-anchor="middle" class="label">Water</text>
  <text x="150" y="386" text-anchor="middle" class="body">good heat transfer</text>
  <text x="150" y="412" text-anchor="middle" class="body">corrosion + biology risk</text>

  <rect x="270" y="78" width="220" height="112" rx="16" class="card"/>
  <text x="380" y="114" text-anchor="middle" class="label">IAT</text>
  <text x="380" y="144" text-anchor="middle" class="body">surface film forms fast</text>
  <text x="380" y="170" text-anchor="middle" class="body">shorter life; sensitive</text>

  <rect x="510" y="320" width="220" height="112" rx="16" class="card"/>
  <text x="620" y="356" text-anchor="middle" class="label">OAT</text>
  <text x="620" y="386" text-anchor="middle" class="body">long-life organic acids</text>
  <text x="620" y="412" text-anchor="middle" class="body">broader metal support</text>

  <rect x="740" y="78" width="220" height="112" rx="16" class="card"/>
  <text x="850" y="114" text-anchor="middle" class="label">HOAT</text>
  <text x="850" y="144" text-anchor="middle" class="body">hybrid fast + long-life</text>
  <text x="850" y="170" text-anchor="middle" class="body">better hard-water stability</text>
</svg>
