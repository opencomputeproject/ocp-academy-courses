<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 530" role="img" aria-label="Wetted materials compatibility map">
  <style>.title{font:700 30px Open Sans,Arial;fill:#333}.h{font:700 22px Open Sans,Arial;fill:#333}.body{font:600 17px Open Sans,Arial;fill:#5F6062}.node{fill:#fff;stroke:#d1d5db;stroke-width:3;rx:18}.core{stroke:#8DC63F;stroke-width:6}.line{stroke:#8DC63F;stroke-width:5;stroke-linecap:round}</style>
  <text x="500" y="44" text-anchor="middle" class="title">Compatibility follows every surface the fluid touches</text>
  <rect x="400" y="210" width="200" height="100" class="node core"/><text x="500" y="246" text-anchor="middle" class="h">TCS Fluid</text><text x="500" y="274" text-anchor="middle" class="body">plus operating</text><text x="500" y="298" text-anchor="middle" class="body">conditions</text>
  <rect x="70" y="95" width="230" height="92" class="node"/><text x="185" y="133" text-anchor="middle" class="h">Metals</text><text x="185" y="160" text-anchor="middle" class="body">copper, steel, brass</text>
  <rect x="70" y="335" width="230" height="92" class="node"/><text x="185" y="373" text-anchor="middle" class="h">Elastomers</text><text x="185" y="400" text-anchor="middle" class="body">seals and hoses</text>
  <rect x="385" y="55" width="230" height="92" class="node"/><text x="500" y="93" text-anchor="middle" class="h">Connectors</text><text x="500" y="120" text-anchor="middle" class="body">QDs, valves, fittings</text>
  <rect x="700" y="95" width="230" height="92" class="node"/><text x="815" y="133" text-anchor="middle" class="h">Cold plates</text><text x="815" y="160" text-anchor="middle" class="body">microchannels, brazing</text>
  <rect x="700" y="335" width="230" height="92" class="node"/><text x="815" y="373" text-anchor="middle" class="h">Pumps and filters</text><text x="815" y="400" text-anchor="middle" class="body">media, seals, bearings</text>
  <path d="M300 150 L400 230" class="line"/><path d="M300 380 L400 285" class="line"/><path d="M500 147 V210" class="line"/><path d="M700 150 L600 230" class="line"/><path d="M700 380 L600 285" class="line"/>
</svg>
