<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" role="img" aria-label="Single-phase and two-phase fluid heat transfer are different">
  <style>
    .title{font:700 28px Open Sans,Arial,sans-serif;fill:#333}
    .h{font:700 24px Open Sans,Arial,sans-serif;fill:#333}
    .body{font:600 18px Open Sans,Arial,sans-serif;fill:#5f6062}
    .small{font:600 16px Open Sans,Arial,sans-serif;fill:#5f6062}
    .box{fill:#fff;stroke:#d1d5db;stroke-width:3}
    .focus{stroke:#8dc63f;stroke-width:6}
    .defer{stroke:#343895;stroke-width:4}
    .green{fill:#8dc63f}
    .blue{fill:#343895}
    .iconStroke{fill:none;stroke:#5f6062;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
    .steam{fill:none;stroke:#343895;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}
    .steamLight{fill:none;stroke:#8dc63f;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}
  </style>

  <rect width="1000" height="540" fill="#fff"/>
  <text x="500" y="44" text-anchor="middle" class="title">Do not apply two-phase fluid rules to single-phase loops</text>

  <rect x="65" y="92" width="410" height="360" rx="18" class="box focus"/>
  <text x="270" y="142" text-anchor="middle" class="h">Single-phase</text>
  <text x="270" y="172" text-anchor="middle" class="h">water or PG25</text>
  <text x="270" y="216" text-anchor="middle" class="body">Sensible heat</text>
  <g aria-label="Thermometer showing temperature rise">
    <rect x="250" y="236" width="40" height="100" rx="20" fill="#fff" stroke="#5f6062" stroke-width="7"/>
    <line x1="270" y1="318" x2="270" y2="260" stroke="#8dc63f" stroke-width="20" stroke-linecap="round"/>
    <circle cx="270" cy="354" r="35" fill="#fff" stroke="#5f6062" stroke-width="7"/>
    <circle cx="270" cy="354" r="22" class="green"/>
    <line x1="310" y1="258" x2="342" y2="258" class="iconStroke"/>
    <line x1="310" y1="292" x2="331" y2="292" class="iconStroke"/>
    <line x1="310" y1="326" x2="342" y2="326" class="iconStroke"/>
  </g>
  <text x="270" y="424" text-anchor="middle" class="small">Fluid stays liquid as temperature rises.</text>

  <rect x="525" y="92" width="410" height="360" rx="18" class="box defer"/>
  <text x="730" y="142" text-anchor="middle" class="h">Two-phase dielectric</text>
  <text x="730" y="172" text-anchor="middle" class="h">refrigerant</text>
  <text x="730" y="216" text-anchor="middle" class="body">Latent heat</text>
  <g aria-label="Liquid drop turning into vapor">
    <path d="M672 330 C672 296 715 257 730 233 C745 257 788 296 788 330 C788 365 761 389 730 389 C699 389 672 365 672 330 Z" fill="#e8f3ff" stroke="#343895" stroke-width="7" stroke-linejoin="round"/>
    <path d="M693 332 C693 354 709 369 730 369" class="defer" opacity="0.55"/>
    <path d="M673 306 C657 291 657 276 674 264 C687 255 687 244 674 236" class="steam"/>
    <path d="M730 306 C714 290 715 276 733 264 C747 254 747 244 732 235" class="steamLight"/>
    <path d="M787 306 C803 291 803 276 786 264 C773 255 773 244 786 236" class="steam"/>
    <circle cx="701" cy="267" r="8" class="blue" opacity="0.35"/>
    <circle cx="760" cy="264" r="7" class="green" opacity="0.55"/>
  </g>
  <text x="730" y="424" text-anchor="middle" class="small">Phase change carries the heat.</text>

  <text x="500" y="486" text-anchor="middle" class="body">Examples include R-515B, R-1233zd(E), and R-1336mzz(Z).</text>
</svg>
