<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" role="img" aria-label="Fluid families in single-phase and two-phase DLC">
  <style>.title{font:700 30px Open Sans,Arial;fill:#333}.h{font:700 24px Open Sans,Arial;fill:#333}.body{font:600 18px Open Sans,Arial;fill:#5F6062}.card{fill:#fff;stroke:#d1d5db;stroke-width:3;rx:18}.focus{stroke:#8DC63F;stroke-width:6}.defer{stroke:#343895;stroke-width:4;stroke-dasharray:12 10}.drop{fill:#8DC63F}.blue{fill:#343895}</style>
  <text x="500" y="46" text-anchor="middle" class="title">This course focuses on single-phase TCS fluids</text>
  <rect x="70" y="105" width="260" height="330" class="card focus"/>
  <path d="M200 140c32 45 58 78 58 118 0 35-25 61-58 61s-58-26-58-61c0-40 26-73 58-118z" class="drop" opacity="0.88"/>
  <text x="200" y="350" text-anchor="middle" class="h">Treated water</text>
  <text x="200" y="382" text-anchor="middle" class="body">best thermal performance</text>
  <rect x="370" y="105" width="260" height="330" class="card focus"/>
  <path d="M500 140c32 45 58 78 58 118 0 35-25 61-58 61s-58-26-58-61c0-40 26-73 58-118z" fill="#A8D86A"/>
  <text x="500" y="350" text-anchor="middle" class="h">PG25</text>
  <text x="500" y="382" text-anchor="middle" class="body">biostatic operating benefit</text>
  <rect x="670" y="105" width="260" height="330" class="card defer"/>
  <path d="M800 148c32 45 58 78 58 118 0 35-25 61-58 61s-58-26-58-61c0-40 26-73 58-118z" class="blue" opacity="0.9"/>
  <text x="800" y="344" text-anchor="middle" class="h">
    <tspan x="800" dy="0">Two-phase</tspan>
    <tspan x="800" dy="28">refrigerants</tspan>
  </text>
  <text x="800" y="400" text-anchor="middle" class="body">defer to separate course</text>
  <text x="500" y="470" text-anchor="middle" class="body">Common governance exists. Actionable fluid guidance diverges quickly.</text>
</svg>
