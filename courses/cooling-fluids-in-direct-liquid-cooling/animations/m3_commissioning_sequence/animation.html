<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>New-System Commissioning Sequence</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      width: 1280px;
      height: 720px;
      margin: 0;
      overflow: hidden;
      background: #f7f9fc;
      font-family: Arial, Helvetica, sans-serif;
    }
    svg { display: block; width: 1280px; height: 720px; }
    text { letter-spacing: 0; }
    .stage-title { font-size: 20px; font-weight: 800; }
    .stage-note { font-size: 14px; font-weight: 700; }
    .equipment-title { font-size: 22px; font-weight: 800; fill: #343895; }
    .equipment-note { font-size: 15px; font-weight: 700; fill: #5f6062; }
    .micro-label { font-size: 13px; font-weight: 800; fill: #5f6062; }
    .status { font-size: 22px; font-weight: 800; fill: #1f2937; }
  </style>
</head>
<body>
<svg viewBox="0 0 1280 720" role="img" aria-label="Silent animation showing a new technology cooling system being flushed with cold plates isolated, flushed again with cold plates connected, and then filled with final fluid before sampling and recording a baseline.">
  <defs>
    <clipPath id="vial-clip"><rect x="927" y="546" width="42" height="54" rx="8"/></clipPath>
  </defs>

  <rect width="1280" height="720" fill="#f7f9fc"/>
  <rect x="30" y="24" width="1220" height="672" rx="24" fill="#ffffff" stroke="#d7dde8" stroke-width="2"/>

  <g id="stage-0" transform="translate(74 54)">
    <rect id="stage-bg-0" width="344" height="74" rx="14" fill="#eef0fb" stroke="#343895" stroke-width="3"/>
    <circle id="stage-dot-0" cx="35" cy="37" r="20" fill="#343895"/>
    <text x="35" y="44" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff">1</text>
    <text id="stage-title-0" x="67" y="31" class="stage-title" fill="#343895">ISOLATE + FLUSH</text>
    <text id="stage-note-0" x="67" y="54" class="stage-note" fill="#5f6062">capture construction debris</text>
  </g>
  <g id="stage-1" transform="translate(468 54)">
    <rect id="stage-bg-1" width="344" height="74" rx="14" fill="#f8fafc" stroke="#cbd2dc" stroke-width="3"/>
    <circle id="stage-dot-1" cx="35" cy="37" r="20" fill="#a6b0bf"/>
    <text x="35" y="44" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff">2</text>
    <text id="stage-title-1" x="67" y="31" class="stage-title" fill="#7a8492">CONNECT + REPEAT</text>
    <text id="stage-note-1" x="67" y="54" class="stage-note" fill="#7a8492">include cold plate pathways</text>
  </g>
  <g id="stage-2" transform="translate(862 54)">
    <rect id="stage-bg-2" width="344" height="74" rx="14" fill="#f8fafc" stroke="#cbd2dc" stroke-width="3"/>
    <circle id="stage-dot-2" cx="35" cy="37" r="20" fill="#a6b0bf"/>
    <text x="35" y="44" text-anchor="middle" font-size="20" font-weight="800" fill="#ffffff">3</text>
    <text id="stage-title-2" x="67" y="31" class="stage-title" fill="#7a8492">FINAL FILL + SAMPLE</text>
    <text id="stage-note-2" x="67" y="54" class="stage-note" fill="#7a8492">establish the baseline record</text>
  </g>

  <g id="system" transform="translate(0 8)">
    <path d="M226 357 H342 M484 357 H620 M620 357 H756 M1092 357 V512 H226 V425" fill="none" stroke="#d8dee7" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M620 357 V512" fill="none" stroke="#d8dee7" stroke-width="20" stroke-linecap="round"/>

    <g transform="translate(82 278)">
      <rect width="144" height="147" rx="18" fill="#eef0fb" stroke="#343895" stroke-width="4"/>
      <text x="72" y="36" text-anchor="middle" class="equipment-title">CDU / PUMP</text>
      <circle cx="72" cy="88" r="31" fill="#ffffff" stroke="#343895" stroke-width="5"/>
      <path id="pump-rotor" d="M72 61 L82 82 L105 88 L82 96 L72 119 L62 96 L39 88 L62 82 Z" fill="#343895"/>
      <text x="72" y="136" text-anchor="middle" class="equipment-note">circulate</text>
    </g>

    <g transform="translate(342 289)">
      <rect x="0" y="16" width="142" height="104" rx="20" fill="#ffffff" stroke="#5f6062" stroke-width="4"/>
      <ellipse cx="71" cy="17" rx="53" ry="16" fill="#f8fafc" stroke="#5f6062" stroke-width="4"/>
      <ellipse cx="71" cy="119" rx="53" ry="16" fill="#f8fafc" stroke="#5f6062" stroke-width="4"/>
      <g id="filter-dots" fill="#8b95a2">
        <circle cx="48" cy="42" r="3"/><circle cx="69" cy="40" r="3"/><circle cx="91" cy="43" r="3"/>
        <circle cx="39" cy="61" r="3"/><circle cx="60" cy="60" r="3"/><circle cx="82" cy="61" r="3"/><circle cx="103" cy="59" r="3"/>
        <circle cx="48" cy="80" r="3"/><circle cx="70" cy="80" r="3"/><circle cx="92" cy="81" r="3"/>
        <circle cx="39" cy="99" r="3"/><circle cx="60" cy="99" r="3"/><circle cx="82" cy="100" r="3"/><circle cx="103" cy="98" r="3"/>
      </g>
      <text x="71" y="151" text-anchor="middle" class="equipment-title">INLINE FILTER</text>
    </g>

    <g id="junction" transform="translate(620 357)">
      <circle r="25" fill="#ffffff" stroke="#5f6062" stroke-width="4"/>
      <path id="valve-arm" d="M-13 -13 L13 13" fill="none" stroke="#343895" stroke-width="7" stroke-linecap="round"/>
    </g>
    <text x="620" y="320" text-anchor="middle" class="micro-label">FLOW PATH</text>
    <text id="bypass-label" x="678" y="456" text-anchor="middle" class="micro-label">BYPASS ACTIVE</text>

    <g id="cold-plates" transform="translate(756 245)" opacity="0.34">
      <rect width="336" height="218" rx="20" fill="#f8fafc" stroke="#a6b0bf" stroke-width="4"/>
      <text x="168" y="35" text-anchor="middle" class="equipment-title">COLD PLATE PATHS</text>
      <g transform="translate(26 57)">
        <rect width="82" height="124" rx="12" fill="#eef0fb" stroke="#343895" stroke-width="3"/>
        <path d="M18 20 V104 M32 20 V104 M46 20 V104 M60 20 V104" stroke="#8dc63f" stroke-width="4" stroke-linecap="round"/>
      </g>
      <g transform="translate(127 57)">
        <rect width="82" height="124" rx="12" fill="#eef0fb" stroke="#343895" stroke-width="3"/>
        <path d="M18 20 V104 M32 20 V104 M46 20 V104 M60 20 V104" stroke="#8dc63f" stroke-width="4" stroke-linecap="round"/>
      </g>
      <g transform="translate(228 57)">
        <rect width="82" height="124" rx="12" fill="#eef0fb" stroke="#343895" stroke-width="3"/>
        <path d="M18 20 V104 M32 20 V104 M46 20 V104 M60 20 V104" stroke="#8dc63f" stroke-width="4" stroke-linecap="round"/>
      </g>
      <g id="isolation-mark" transform="translate(-9 109)">
        <circle r="25" fill="#fff7e8" stroke="#d88911" stroke-width="4"/>
        <path d="M-11 -11 L11 11 M11 -11 L-11 11" stroke="#d88911" stroke-width="6" stroke-linecap="round"/>
      </g>
    </g>

    <path id="active-path" d="M226 357 H342 H484 H620 V512 H226 V425" fill="none" stroke="#343895" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <g id="flow-particles"></g>

    <path id="debris-path" d="M226 357 H342" fill="none" stroke="none"/>
    <g id="debris-particles"></g>

    <g id="sample" opacity="0" transform="translate(0 8)">
      <path d="M948 504 V548" stroke="#8dc63f" stroke-width="7" stroke-linecap="round"/>
      <rect x="920" y="540" width="56" height="70" rx="10" fill="#ffffff" stroke="#5f6062" stroke-width="4"/>
      <rect id="sample-fill" x="927" y="595" width="42" height="0" fill="#8dc63f" clip-path="url(#vial-clip)"/>
      <text x="948" y="635" text-anchor="middle" class="micro-label">SAMPLE</text>
      <g id="record" transform="translate(980 503)">
        <rect width="210" height="112" rx="16" fill="#f4faef" stroke="#8dc63f" stroke-width="3"/>
        <path d="M25 55 L40 70 L69 37" fill="none" stroke="#8dc63f" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="140" y="47" text-anchor="middle" class="equipment-title">BASELINE</text>
        <text x="140" y="72" text-anchor="middle" class="equipment-note">record accepted</text>
      </g>
    </g>
  </g>

  <g>
    <rect id="status-bg" x="90" y="632" width="1100" height="46" rx="23" fill="#eef0fb" stroke="#343895" stroke-width="2"/>
    <text id="status" x="640" y="662" text-anchor="middle" class="status">Flush the construction loop while cold plates remain isolated.</text>
  </g>
</svg>

<script>
  const duration = 15;
  const bypassPath = 'M226 357 H342 H484 H620 V512 H226 V425';
  const coldPath = 'M226 357 H342 H484 H620 H756 C790 357 792 318 822 318 H1026 C1064 318 1068 357 1092 357 V512 H226 V425';
  const colors = ['#343895', '#00a7c4', '#8dc63f'];
  const paleColors = ['#eef0fb', '#eef7f9', '#f4faef'];
  const titles = ['ISOLATE + FLUSH', 'CONNECT + REPEAT', 'FINAL FILL + SAMPLE'];

  function clamp(value, min = 0, max = 1) { return Math.min(max, Math.max(min, value)); }
  function smooth(value) { const x = clamp(value); return x * x * (3 - 2 * x); }

  function makeParticles(groupId, count, radius, fill) {
    const group = document.getElementById(groupId);
    const nodes = [];
    for (let index = 0; index < count; index += 1) {
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('r', String(radius));
      circle.setAttribute('fill', fill);
      circle.setAttribute('stroke', '#ffffff');
      circle.setAttribute('stroke-width', '2');
      group.appendChild(circle);
      nodes.push(circle);
    }
    return nodes;
  }

  const flowParticles = makeParticles('flow-particles', 14, 7, colors[0]);
  const debrisParticles = makeParticles('debris-particles', 6, 5, '#5f6062');
  const activePath = document.getElementById('active-path');
  const debrisPath = document.getElementById('debris-path');

  function stageAt(t) {
    if (t < 5) return 0;
    if (t < 10) return 1;
    return 2;
  }

  function setStages(stage) {
    for (let index = 0; index < 3; index += 1) {
      const active = index === stage;
      document.getElementById(`stage-bg-${index}`).setAttribute('fill', active ? paleColors[index] : '#f8fafc');
      document.getElementById(`stage-bg-${index}`).setAttribute('stroke', active ? colors[index] : '#cbd2dc');
      document.getElementById(`stage-bg-${index}`).setAttribute('stroke-width', active ? '5' : '3');
      document.getElementById(`stage-dot-${index}`).setAttribute('fill', active ? colors[index] : '#a6b0bf');
      document.getElementById(`stage-title-${index}`).setAttribute('fill', active ? colors[index] : '#7a8492');
      document.getElementById(`stage-note-${index}`).setAttribute('fill', active ? '#5f6062' : '#8b95a2');
    }
  }

  function animateFlow(t, stage) {
    activePath.setAttribute('d', stage === 0 ? bypassPath : coldPath);
    activePath.setAttribute('stroke', colors[stage]);
    const length = activePath.getTotalLength();
    flowParticles.forEach((particle, index) => {
      const progress = (t * 0.18 - index / flowParticles.length + 2) % 1;
      const point = activePath.getPointAtLength(progress * length);
      particle.setAttribute('cx', String(point.x));
      particle.setAttribute('cy', String(point.y));
      particle.setAttribute('fill', colors[stage]);
    });
  }

  function animateDebris(t, stage) {
    const local = t % 5;
    const amount = stage === 0 ? 1 : stage === 1 ? 0.45 : 0;
    const length = debrisPath.getTotalLength();
    debrisParticles.forEach((particle, index) => {
      const progress = (local * 0.25 - index * 0.17 + 2) % 1;
      const point = debrisPath.getPointAtLength(progress * length);
      particle.setAttribute('cx', String(point.x));
      particle.setAttribute('cy', String(point.y + ((index % 3) - 1) * 8));
      particle.setAttribute('opacity', String(amount * (1 - smooth((progress - 0.76) / 0.24))));
    });
    document.getElementById('filter-dots').setAttribute('opacity', String(0.4 + amount * 0.6));
  }

  window.renderAt = function renderAt(rawTime) {
    const t = ((rawTime % duration) + duration) % duration;
    const stage = stageAt(t);
    const local = t % 5;
    setStages(stage);
    animateFlow(t, stage);
    animateDebris(t, stage);

    document.getElementById('pump-rotor').setAttribute('transform', `rotate(${t * 150} 72 88)`);
    document.getElementById('cold-plates').setAttribute('opacity', stage === 0 ? '0.34' : '1');
    document.getElementById('isolation-mark').setAttribute('opacity', stage === 0 ? '1' : '0');
    document.getElementById('valve-arm').setAttribute('transform', stage === 0 ? 'rotate(0)' : 'rotate(45)');
    document.getElementById('valve-arm').setAttribute('stroke', colors[stage]);
    document.getElementById('bypass-label').textContent = stage === 0 ? 'BYPASS ACTIVE' : 'PLATES ACTIVE';
    document.getElementById('bypass-label').setAttribute('fill', colors[stage]);

    const sampleProgress = stage === 2 ? smooth((local - 0.6) / 2.4) : 0;
    document.getElementById('sample').setAttribute('opacity', String(sampleProgress));
    document.getElementById('sample-fill').setAttribute('y', String(595 - 47 * sampleProgress));
    document.getElementById('sample-fill').setAttribute('height', String(47 * sampleProgress));
    document.getElementById('record').setAttribute('opacity', String(smooth((sampleProgress - 0.5) / 0.5)));

    const statuses = [
      'Flush the construction loop while cold plates remain isolated.',
      'Replace filters if needed, connect cold plates, and repeat the flush.',
      'Fill with final heat transfer fluid, sample, and record the baseline.'
    ];
    document.getElementById('status').textContent = statuses[stage];
    document.getElementById('status-bg').setAttribute('fill', paleColors[stage]);
    document.getElementById('status-bg').setAttribute('stroke', colors[stage]);
  };

  window.renderAt(0);
</script>
</body>
</html>
